<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<script>
(function() {
  // Przy każdym wejściu sprawdź czy plik się zmienił (przez HEAD request)
  // Jeśli tak — wymuś pełne przeładowanie z serwera
  var url = window.location.href.split('?')[0];
  var lastModKey = 'lspd_last_modified';
  var stored = localStorage.getItem(lastModKey);

  fetch(url, { method: 'HEAD', cache: 'no-store' })
    .then(function(res) {
      var lastMod = res.headers.get('last-modified') || res.headers.get('etag') || '';
      if (stored && lastMod && stored !== lastMod) {
        // Nowa wersja — wyczyść cache i przeładuj
        localStorage.setItem(lastModKey, lastMod);
        window.location.reload(true);
      } else if (lastMod) {
        localStorage.setItem(lastModKey, lastMod);
      }
    })
    .catch(function() {});
})();
</script>

async function sendDiscordLog(embed) {
  try {
    await fetch(DISCORD_WEBHOOK, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ embeds: [embed] })
    });
  } catch(e) { console.warn("Discord webhook error:", e); }
}

function discordEmbed(title, description, color, fields) {
  return {
    title,
    description: description || undefined,
    color,
    fields: fields || [],
    timestamp: new Date().toISOString(),
    footer: { text: "LSPD Database" }
  };
}

// Znajdź najniższą wolną odznakę w przedziale dla danego stopnia (z wiodącymi zerami)
function assignBadge(rank, officers, dept) {
  if (dept === "LSCSO") {
    const rng = RANK_BADGE_RANGES_LSCSO[rank];
    if (!rng) return "";
    const [min, max] = rng;
    const used = new Set(officers.filter(o=>o.dept==="LSCSO").map(o => parseInt(o.badge)).filter(n => !isNaN(n)));
    for (let b = min; b <= max; b++) {
      if (!used.has(b)) return String(b);
    }
    return "";
  }
  if (dept === "FIB") {
    const rng = RANK_BADGE_RANGES_FIB[rank];
    if (!rng) return "";
    const [min, max] = rng;
    const used = new Set(officers.filter(o=>o.dept==="FIB").map(o => parseInt(o.badge)).filter(n => !isNaN(n)));
    for (let b = min; b <= max; b++) {
      if (!used.has(b)) return String(b);
    }
    return "";
  }
  // LSPD (default)
  const rangeKey = RANK_TO_RANGE_KEY[rank];
  if (!rangeKey) return "";
  const [min, max] = RANK_BADGE_RANGES[rangeKey];
  const used = new Set(officers.filter(o=>!o.dept||o.dept==="LSPD").map(o => parseInt(o.badge)).filter(n => !isNaN(n)));
  const digits = Math.max(2, String(max).length);
  for (let b = min; b <= max; b++) {
    if (!used.has(b)) return String(b).padStart(digits, '0');
  }
  return "";
}

// Zwraca właściwy obiekt RANK_BADGES zależnie od dept
function getRankBadgesForDept(dept) {
  if (dept === "FIB") return RANK_BADGES_FIB;
  if (dept === "LSCSO") return RANK_BADGES_LSCSO;
  return RANK_BADGES;
}

// Zwraca listę stopni zależnie od dept
function getRanksForDept(dept) {
  if (dept === "FIB") return RANKS_FIB;
  if (dept === "LSCSO") return RANKS_LSCSO;
  return RANKS;
}

// ─── GRUPY STOPNI → kolor wiersza ────────────────────────────────────────────
function getRankGroup(rank) {
  if (["Chief of Police","Assistant Chief","Deputy Chief","Commander"].includes(rank)) return "highcommand";
  if (rank === "Captain") return "captain";
  if (["Lieutenant II","Lieutenant I"].includes(rank)) return "lieutenant";
  if (["Master Sergeant","Staff Sergeant","Sergeant"].includes(rank)) return "sergeant";
  if (["Officer III+1","Officer III","Officer II","Officer I"].includes(rank)) return "officer";
  if (rank === "Cadet") return "cadet";
  return "officer";
}

function getRankColor(rank) {
  const g = getRankGroup(rank);
  if (g === "highcommand") return { row:"rgba(128,0,128,0.10)", name:"#c084fc" };
  if (g === "captain")     return { row:"rgba(231,76,60,0.07)",  name:"#ff8a7a" };
  if (g === "lieutenant")  return { row:"rgba(155,89,182,0.07)", name:"#c39bd3" };
  if (g === "sergeant")    return { row:"rgba(30,95,196,0.10)",  name:"#7fb3ff" };
  if (g === "cadet")       return { row:"rgba(32,178,72,0.07)",  name:"#5dde85" };
  return { row:"rgba(255,255,255,0.02)", name:"var(--white)" };
}

// ─── BAZA DANYCH (Supabase) ──────────────────────────────────────────────────
const dbApi = {

  // ── Atomic patch jednej kolumny — zero race condition ─────────────────────
  // Dla log_data: najpierw pobierz świeży stan, zmerguj po id, potem zapisz
  // Dzięki temu nigdy nie nadpiszemy wpisów dodanych przez innych użytkowników
  async saveField(field, value) {
    if (!USE_CLOUD) throw new Error("Brak konfiguracji Supabase");
    let finalValue = value;
    if (field === "log_data") {
      // Pobierz świeży log z bazy
      const freshRes = await fetch(`${SUPABASE_URL}/rest/v1/lspd_data?id=eq.main&select=log_data`, {
        headers: { "apikey": SUPABASE_ANON, "Authorization": `Bearer ${SUPABASE_ANON}` }
      });
      if (freshRes.ok) {
        const rows = await freshRes.json();
        const freshLog = rows[0]?.log_data || [];
        // Zmerguj: weź wszystkie wpisy ze świeżego logu + dodaj nowe których tam nie ma
        const freshIds = new Set(freshLog.map(l => l.id));
        const localIds = new Set(value.map(l => l.id));
        // Wpisy usunięte lokalnie (są w bazie ale nie ma ich w value) — zachowaj usunięcie
        // Wpisy dodane lokalnie (są w value ale nie ma ich w bazie) — dodaj je
        const newEntries = value.filter(l => !freshIds.has(l.id));
        const deletedIds = new Set(freshLog.filter(l => !localIds.has(l.id)).map(l => l.id));
        // Baza: zachowaj wszystko czego nie usunięto lokalnie + dodaj nowe
        finalValue = [...freshLog.filter(l => !deletedIds.has(l.id)), ...newEntries];
        // Posortuj po id (chronologicznie)
        finalValue.sort((a, b) => a.id - b.id);
      }
    }
    const res = await fetch(`${SUPABASE_URL}/rest/v1/lspd_data?id=eq.main`, {
      method: "PATCH",
      headers: {
        "Content-Type": "application/json",
        "apikey": SUPABASE_ANON,
        "Authorization": `Bearer ${SUPABASE_ANON}`,
        "Prefer": "return=minimal"
      },
      body: JSON.stringify({ [field]: finalValue })
    });
    if (!res.ok) {
      const errText = await res.text();
      // Kolumna nie istnieje w Supabase — poinformuj admina
      if (errText.includes("column") || errText.includes("schema cache")) {
        console.error(`[Supabase] Kolumna '${field}' nie istnieje w tabeli lspd_data. Dodaj ją w Supabase Dashboard: Table Editor → lspd_data → Add Column → name: "${field}", type: jsonb, default: null`);
        throw new Error(`Kolumna '${field}' nie istnieje w Supabase. Dodaj ją ręcznie w Supabase Dashboard.`);
      }
      throw new Error(`Supabase PATCH [${field}] failed: ${errText}`);
    }
  },

  // ── Zapis całego stanu (używany tylko przy inicjalizacji) ───────────────────
  async save(data) {
    if (!USE_CLOUD) throw new Error("Brak konfiguracji Supabase");
    await Promise.all([
      this.saveField("officers", data.officers || []),
      this.saveField("log_data", data.log      || []),
      this.saveField("ftd",      data.ftd      || {}),
      this.saveField("iad",      data.iad      || {}),
      this.saveField("dtu",      data.dtu      || {}),
      this.saveField("swat",     data.swat     || {}),
    ]);
  },

  // ── Ładowanie całego stanu ──────────────────────────────────────────────────
  async load() {
    if (!USE_CLOUD) throw new Error("Brak konfiguracji Supabase");
    const res = await fetch(`${SUPABASE_URL}/rest/v1/lspd_data?id=eq.main&select=*`, {
      headers: {
        "apikey": SUPABASE_ANON,
        "Authorization": `Bearer ${SUPABASE_ANON}`
      }
    });
    if (!res.ok) throw new Error("Supabase load failed");
    const rows = await res.json();
    const row  = rows[0] || {};
    return {
      officers: (Array.isArray(row.officers) && row.officers.length > 0) ? row.officers : INIT.officers,
      log:      row.log_data || INIT.log,
      ftd:      row.ftd      || {fto:[], assignments:[]},
      iad:      row.iad      || {members:[], akta:[], raporty:[]},
      dtu:      row.dtu      || {members:[], kartoteka:[], sprawy:[]},
      swat:     row.swat     || {members:[], raporty:[], akcje:[]},
    };
  },

  // ── Atomic update pojedynczego oficera — bezpieczny zapis bez race condition ─
  // Pobiera świeży rekord, podmienia jednego oficera po ID, zapisuje tylko officers.
  // Używany przy edycji z panelu — eliminuje konflikt z auto-sync bota.
  async saveOfficerAtomic(updatedOfficer) {
    if (!USE_CLOUD) return;
    // 1. Pobierz świeży stan
    const res = await fetch(`${SUPABASE_URL}/rest/v1/lspd_data?id=eq.main&select=officers`, {
      headers: { "apikey": SUPABASE_ANON, "Authorization": `Bearer ${SUPABASE_ANON}` }
    });
    if (!res.ok) throw new Error("saveOfficerAtomic: fetch failed");
    const rows = await res.json();
    const fresh = (rows[0]?.officers) || [];
    // 2. Podmień oficera po ID
    const merged = fresh.map(o => o.id === updatedOfficer.id ? updatedOfficer : o);
    // 3. Wyślij tylko officers (nie ruszamy ftd/iad/dtu/swat)
    const patch = await fetch(`${SUPABASE_URL}/rest/v1/lspd_data?id=eq.main`, {
      method: "PATCH",
      headers: {
        "Content-Type": "application/json",
        "apikey": SUPABASE_ANON,
        "Authorization": `Bearer ${SUPABASE_ANON}`,
        "Prefer": "return=minimal"
      },
      body: JSON.stringify({ officers: merged })
    });
    if (!patch.ok) throw new Error("saveOfficerAtomic: patch failed");
  },

  // ── Atomic append — bezpieczny zapis bez race condition ──────────────────
  // Pobiera świeży rekord z Supabase, dołącza element do tablicy i zapisuje.
  // Eliminuje problem gdy 2 osoby jednocześnie dodają raport/aktę.
  async atomicAppend(field, subKey, newItem) {
    if (!USE_CLOUD) return null;
    // 1. Pobierz świeży stan pola
    const res = await fetch(`${SUPABASE_URL}/rest/v1/lspd_data?id=eq.main&select=${field}`, {
      headers: { "apikey": SUPABASE_ANON, "Authorization": `Bearer ${SUPABASE_ANON}` }
    });
    if (!res.ok) throw new Error("atomicAppend: fetch failed");
    const rows = await res.json();
    const freshField = rows[0]?.[field] || {};
    // 2. Dołącz nowy element do odpowiedniej tablicy
    const freshArr = freshField[subKey] || [];
    const newId = Date.now() + Math.floor(Math.random() * 1000);
    const itemWithId = { ...newItem, id: newId };
    const updated = { ...freshField, [subKey]: [...freshArr, itemWithId] };
    // 3. Zapisz
    const patch = await fetch(`${SUPABASE_URL}/rest/v1/lspd_data?id=eq.main`, {
      method: "PATCH",
      headers: {
        "Content-Type": "application/json",
        "apikey": SUPABASE_ANON,
        "Authorization": `Bearer ${SUPABASE_ANON}`,
        "Prefer": "return=minimal"
      },
      body: JSON.stringify({ [field]: updated })
    });
    if (!patch.ok) throw new Error("atomicAppend: patch failed");
    return itemWithId;
  },

  // ── Atomic update elementu w tablicy ──────────────────────────────────────
  async atomicUpdate(field, subKey, itemId, updatedItem) {
    if (!USE_CLOUD) return null;
    const res = await fetch(`${SUPABASE_URL}/rest/v1/lspd_data?id=eq.main&select=${field}`, {
      headers: { "apikey": SUPABASE_ANON, "Authorization": `Bearer ${SUPABASE_ANON}` }
    });
    if (!res.ok) throw new Error("atomicUpdate: fetch failed");
    const rows = await res.json();
    const freshField = rows[0]?.[field] || {};
    const freshArr = freshField[subKey] || [];
    const updated = { ...freshField, [subKey]: freshArr.map(x => x.id === itemId ? { ...updatedItem, id: itemId } : x) };
    const patch = await fetch(`${SUPABASE_URL}/rest/v1/lspd_data?id=eq.main`, {
      method: "PATCH",
      headers: {
        "Content-Type": "application/json",
        "apikey": SUPABASE_ANON,
        "Authorization": `Bearer ${SUPABASE_ANON}`,
        "Prefer": "return=minimal"
      },
      body: JSON.stringify({ [field]: updated })
    });
    if (!patch.ok) throw new Error("atomicUpdate: patch failed");
    return { ...updatedItem, id: itemId };
  },



  // ── Upload zdjęcia do Supabase Storage ─────────────────────────────────────
  // Przyjmuje: File lub base64 data URL, folder ("kartoteka" lub "sprawy"), id wpisu
  // Zwraca: publiczny URL zdjęcia
  async uploadPhoto(fileOrDataUrl, folder, entryId) {
    let blob;
    let ext = "jpg";
    if (typeof fileOrDataUrl === "string" && fileOrDataUrl.startsWith("data:")) {
      // Konwertuj base64 → Blob
      const arr = fileOrDataUrl.split(",");
      const mimeMatch = arr[0].match(/:(.*?);/);
      const mime = mimeMatch ? mimeMatch[1] : "image/jpeg";
      ext = mime.split("/")[1] || "jpg";
      const bstr = atob(arr[1]);
      const u8 = new Uint8Array(bstr.length);
      for (let i = 0; i < bstr.length; i++) u8[i] = bstr.charCodeAt(i);
      blob = new Blob([u8], { type: mime });
    } else {
      blob = fileOrDataUrl;
      ext = fileOrDataUrl.name?.split(".").pop() || "jpg";
    }

    const path = `${folder}/${entryId}_${Date.now()}.${ext}`;
    const res = await fetch(`${SUPABASE_URL}/storage/v1/object/dtu-photos/${path}`, {
      method: "POST",
      headers: {
        "apikey": SUPABASE_ANON,
        "Authorization": `Bearer ${SUPABASE_ANON}`,
        "Content-Type": blob.type || "image/jpeg",
        "x-upsert": "true"
      },
      body: blob
    });
    if (!res.ok) {
      const txt = await res.text();
      throw new Error(`Upload failed: ${txt}`);
    }
    return `${SUPABASE_URL}/storage/v1/object/public/dtu-photos/${path}`;
  },

  // ── Usuń zdjęcie ze Storage ─────────────────────────────────────────────────
  async deletePhoto(url) {
    if (!url || !url.includes("dtu-photos/")) return;
    const path = url.split("dtu-photos/")[1];
    await fetch(`${SUPABASE_URL}/storage/v1/object/dtu-photos/${path}`, {
      method: "DELETE",
      headers: {
        "apikey": SUPABASE_ANON,
        "Authorization": `Bearer ${SUPABASE_ANON}`
      }
    });
  }
};

function getStatus(o) {
  if (o.suspended)   return { label:"ZAWIESZONY", cls:"s-suspended" };
  if (o.redEntry)    return { label:"CZERWONY",   cls:"s-red"       };
  if (o.yellowEntry) return { label:"ŻÓŁTY",      cls:"s-yellow"    };
  if (o.onLeave)     return { label:"URLOP",       cls:"s-leave"     };
  return { label:"AKTYWNY", cls:"s-active" };
}

  if (status === "idle") return null;
  const cfg = {
    saving: { color:"var(--gold)",  text:"Zapisywanie..." },
    saved:  { color:"var(--green)", text:"Zapisano ✓"     },
    error:  { color:"var(--red)",   text:"Błąd zapisu!"   } }[status] || {};
  return (
    <div style={{
      position:"fixed", bottom:20, right:20, zIndex:9999,
      background:"rgba(8,16,31,0.96)", border:`1px solid ${cfg.color}`,
      borderRadius:4, padding:"8px 16px",

}

function FTDLoginModal({ onLogin, onClose }) {
  const [login, setLogin] = useState(""); const [pass, setPass] = useState(""); const [err, setErr] = useState("");
  const submit = () => {
    const f = ALL_CREDENTIALS.find(c=>c.login===login&&c.password===pass);
    f ? onLogin(f) : setErr("Nieprawidłowy login lub hasło.");
  };
  return (
    <div className="overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="login-card">
        <div className="login-logo" style={{fontSize:32,letterSpacing:4,color:"var(--accent)"}}>FTD</div>
        <div className="login-sub">FIELD TRAINING DIVISION — DOSTĘP</div>
        {err&&<div className="login-err">{err}</div>}
        <div className="fg" style={{marginBottom:12,textAlign:"left"}}><label>Login</label><input value={login} onChange={e=>setLogin(e.target.value)} onKeyDown={e=>e.key==="Enter"&&submit()} autoFocus/></div>
        <div className="fg" style={{marginBottom:20,textAlign:"left"}}><label>Hasło</label><input type="password" value={pass} onChange={e=>setPass(e.target.value)} onKeyDown={e=>e.key==="Enter"&&submit()}/></div>
        <div style={{display:"flex",gap:8}}>
          <button className="btn btn-primary" style={{flex:1,justifyContent:"center"}} onClick={submit}>ZALOGUJ</button>
          <button className="btn btn-red btn-sm" onClick={onClose}>✕</button>
        </div>
      </div>
    </div>
  );
}

function FTOModal({ entry, onSave, onClose, isNew, officers, existingFto }) {
  const blank = { id:null, name:"", nick:"", rank:"", internalRank:"FTO", seu:false, sv:false, nt:false, pwc:false, wu:false, k9:false, asu:false, notes:"" };
  const [form, setForm] = useState(entry || blank);
  const set = (k,v) => setForm(f=>({...f,[k]:v}));

  // Jeśli wybieramy z listy funkcjonariuszy
  const handleOfficerSelect = (name) => {
    const o = officers.find(x=>x.name===name);
    if(o) setForm(f=>({...f, name:o.name, nick:o.nick||"", rank:o.rank||""}));
    else setForm(f=>({...f, name}));
  };

  return (
    <div className="overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal">
        <div className="modal-title">{isNew?"DODAJ FTO":"EDYTUJ FTO"}</div>
        <div className="form-row">
          <div className="fg">
            <label>Funkcjonariusz</label>
            <select value={form.name} onChange={e=>handleOfficerSelect(e.target.value)}>
              <option value="">— wybierz —</option>
              {(officers||[]).filter(o=> !existingFto || existingFto.every(f=>f.name!==o.name) || o.name===form.name).map(o=><option key={o.id} value={o.name}>{o.name} · {o.rank}</option>)}
              <option value="__custom">✎ Wpisz ręcznie</option>
            </select>
          </div>
          {(form.name==="__custom"||!officers.find(o=>o.name===form.name))&&
            <div className="fg"><label>Imię i Nazwisko (ręcznie)</label><input value={form.name==="__custom"?"":form.name} onChange={e=>set("name",e.target.value)}/></div>}
          <div className="fg"><label>Nick OOC</label><input value={form.nick} onChange={e=>set("nick",e.target.value)}/></div>
          <div className="fg"><label>Stopień LSPD</label><input value={form.rank} onChange={e=>set("rank",e.target.value)}/></div>
          <div className="fg">
            <label>Stopień wewnętrzny FTD</label>
            <select value={form.internalRank||"FTO"} onChange={e=>set("internalRank",e.target.value)}>
              {FTD_INTERNAL_RANKS.map(r=><option key={r} value={r}>{r}</option>)}
            </select>
          </div>
        </div>
        <div style={{fontFamily:"'Oswald',sans-serif",fontSize:13,letterSpacing:2,color:"var(--gold)",margin:"14px 0 6px"}}>UPRAWNIENIA DO SZKOLEŃ</div>
        <div className="checks-grid">
          {FTD_TRAININGS.map(t=>(
            <label key={t} className="check-item">
              <input type="checkbox" checked={!!form[t.toLowerCase()]} onChange={e=>set(t.toLowerCase(),e.target.checked)}/>{t}
            </label>
          ))}
        </div>
        <div style={{marginTop:14}}><div className="fg"><label>Notatki</label><textarea value={form.notes} onChange={e=>set("notes",e.target.value)}/></div></div>
        <div className="modal-footer">
          <button className="btn btn-red btn-sm" onClick={onClose}>ANULUJ</button>
          <button className="btn btn-primary btn-sm" onClick={()=>onSave(form)}>ZAPISZ</button>
        </div>
      </div>
    </div>
  );
}

function FTOView({ ftdData, setFtdData, isFtdAdmin, officers }) {
  const ftoList = ftdData.fto || [];
  const setFto = (upd) => setFtdData(d=>({...d, fto: typeof upd==="function"?upd(d.fto||[]):upd}));
  // Zawsze pobieraj aktualny stopień z tablicy officers (nie z kopii w ftd)
  const getLiveRank = (name) => (officers||[]).find(o=>o.name===name)?.rank || null;
  const [modal, setModal] = useState(null);

  const save = (form, discordAnnounce=false) => {
    if(modal.isNew) setFto(p=>[...p,{...form, id:Date.now()}]);
    else setFto(p=>p.map(x=>x.id===form.id?form:x));
    setModal(null);
  };
  const remove = id => { if(window.confirm("Usunąć FTO?")) setFto(p=>p.filter(x=>x.id!==id)); };

  // Grupuj i sortuj wg stopnia wewnętrznego
  const grouped = FTD_INTERNAL_RANKS.map(ir => ({
    rank: ir,
    members: ftoList.filter(o=>(o.internalRank||"FTO")===ir)
  })).filter(g=>g.members.length>0 || isFtdAdmin);

  const rankColors = {
    "FTD Commander": { row:"rgba(200,168,75,0.12)", name:"#e8c96a", badge:"rgba(200,168,75,0.25)", border:"rgba(200,168,75,0.4)" },
    "FTO":           { row:"rgba(30,95,196,0.10)",  name:"var(--white)", badge:"rgba(30,95,196,0.2)", border:"rgba(30,95,196,0.35)" },
    "FTO Trainee":   { row:"rgba(46,204,113,0.07)", name:"var(--gray)",  badge:"rgba(46,204,113,0.15)", border:"rgba(46,204,113,0.25)" },
  };

  return (
    <div>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16,flexWrap:"wrap",gap:12}}>
        <div><div className="page-title">FTO — FIELD TRAINING OFFICERS</div><div className="page-sub">{ftoList.length} REKORDÓW</div></div>
        {isFtdAdmin&&<button className="btn btn-primary" onClick={()=>setModal({isNew:true})}>+ DODAJ FTO</button>}
      </div>

      {FTD_INTERNAL_RANKS.map(ir => {
        const members = ftoList.filter(o=>(o.internalRank||"FTO")===ir);
        if(members.length===0) return null;
        const rc = rankColors[ir] || rankColors["FTO"];
        return (
          <div key={ir} style={{marginBottom:24}}>
            <div style={{
              display:"flex",alignItems:"center",gap:12,marginBottom:8,
              borderBottom:`2px solid ${rc.border}`,paddingBottom:8
            }}>
              <div style={{
                fontFamily:"'Oswald',sans-serif",fontSize:13,fontWeight:700,letterSpacing:3,
                color:rc.name,background:rc.badge,border:`1px solid ${rc.border}`,
                padding:"4px 14px",borderRadius:3
              }}>{ir}</div>
              <span style={{fontFamily:"'Share Tech Mono',monospace",fontSize:10,color:"var(--gray)"}}>{members.length} {members.length===1?"osoba":"osób"}</span>
            </div>
            <div className="tbl-wrap">
              <table>
                <thead><tr>
                  <th>Imię i Nazwisko</th><th>Nick</th><th>Stopień LSPD</th>
                  {FTD_TRAININGS.map(t=><th key={t}>{t}</th>)}
                  <th>Notatki</th>
                  {isFtdAdmin&&<th>Akcje</th>}
                </tr></thead>
                <tbody>
                  {members.map(o=>(
                    <tr key={o.id} style={{background:rc.row}}>
                      <td className="name" style={{color:rc.name}}>{o.name}</td>
                      <td style={{fontFamily:"'Share Tech Mono',monospace",fontSize:11,color:"var(--gray)"}}>{o.nick}</td>
                      <td><span className="rk">{getLiveRank(o.name) || o.rank}</span></td>
                      {FTD_TRAININGS.map(t=><td key={t}><Ck val={!!o[t.toLowerCase()]}/></td>)}
                      <td style={{fontSize:12,color:"var(--gray)",maxWidth:200}}>{o.notes}</td>
                      {isFtdAdmin&&<td><div className="actions">
                        <button className="btn btn-gold btn-sm" onClick={()=>setModal({isNew:false,entry:o})}>EDYTUJ</button>
                        <button className="btn btn-red btn-sm" onClick={()=>remove(o.id)}>USUŃ</button>
                      </div></td>}
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </div>
        );
      })}
      {ftoList.length===0&&<div style={{textAlign:"center",padding:48,color:"var(--gray)",fontFamily:"'Share Tech Mono',monospace",fontSize:12}}>Brak FTO w bazie danych</div>}
      {modal&&<FTOModal entry={modal.entry} isNew={modal.isNew} onSave={save} onClose={()=>setModal(null)} officers={officers} existingFto={ftoList}/>}
    </div>
  );
}

function SzkoleniowcyView({ ftdData, setFtdData, isFtdAdmin }) {
  const ftoList = ftdData.fto || [];
  const mainTrainers = ftdData.mainTrainers || {};

  const setMainTrainer = (training, ftoId) => {
    setFtdData(d => ({
      ...d,
      mainTrainers: { ...(d.mainTrainers || {}), [training]: ftoId }
    }));
  };

  return (
    <div>
      <div style={{marginBottom:16}}>
        <div className="page-title">SZKOLENIOWCY</div>
        <div className="page-sub">Lista automatycznie generowana na podstawie zakładki FTO</div>
      </div>
      {FTD_TRAININGS.map(t=>{
        const qualified = ftoList.filter(o=>!!o[t.toLowerCase()]);
        const mainId = mainTrainers[t];
        const mainFto = qualified.find(o => String(o.id) === String(mainId));
        return (
          <div key={t} className="card" style={{marginBottom:12}}>
            <div className="card-title" style={{display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:8}}>
              <span>{t} <span className="tag">{qualified.length} FTO</span></span>
              {mainFto && <span style={{fontFamily:"'Share Tech Mono',monospace",fontSize:10,color:"var(--gold)"}}>★ GŁÓWNY: {mainFto.name}</span>}
            </div>
            {isFtdAdmin && qualified.length > 0 && (
              <div style={{marginBottom:10,display:"flex",alignItems:"center",gap:8}}>
                <label style={{fontFamily:"'Share Tech Mono',monospace",fontSize:10,color:"var(--gray)",whiteSpace:"nowrap"}}>Główny szkoleniowiec:</label>
                <select value={mainId || ""} onChange={e=>setMainTrainer(t, e.target.value||null)}
                  style={{fontSize:11,padding:"4px 8px",background:"var(--card)",color:"var(--white)",border:"1px solid var(--border)",borderRadius:3,fontFamily:"'Share Tech Mono',monospace"}}>
                  <option value="">— brak —</option>
                  {qualified.map(o=><option key={o.id} value={o.id}>{o.name} ({o.nick})</option>)}
                </select>
              </div>
            )}
            {qualified.length===0
              ? <div style={{color:"var(--dim)",fontSize:12}}>Brak uprawnionych FTO do tego szkolenia.</div>
              : <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
                  {qualified.map(o=>{
                    const isMain = String(o.id) === String(mainId);
                    return (
                      <div key={o.id} style={{
                        background: isMain?"rgba(255,196,0,0.12)":"rgba(30,95,196,0.1)",
                        border: isMain?"1px solid rgba(255,196,0,0.5)":"1px solid rgba(30,95,196,0.25)",
                        borderRadius:4,padding:"8px 14px",position:"relative"
                      }}>
                        {isMain&&<span style={{position:"absolute",top:4,right:6,fontSize:10,color:"var(--gold)"}}>★</span>}
                        <div style={{fontWeight:600,color:isMain?"var(--gold)":"var(--white)",fontSize:13}}>{o.name}</div>
                        <div style={{fontFamily:"'Share Tech Mono',monospace",fontSize:10,color:"var(--gray)",marginTop:2}}>{o.nick} · {o.internalRank||o.rank}</div>
                      </div>
                    );
                  })}
                </div>
            }
          </div>
        );
      })}
    </div>
  );
}

function ProwadzacyModal({ entry, onSave, onClose, isNew, officers, ftoList, existingAssignments }) {
  const blank = { id:null, cadet:"", cadetNick:"", prowadzacy:"" };
  const [form, setForm] = useState(entry || blank);
  const set = (k,v) => setForm(f=>({...f,[k]:v}));

  // Tylko kadeci bez przypisania (lub ten aktualnie edytowany)
  const allCadets = officers.filter(o=>o.rank==="Cadet");
  const assignedNames = new Set((existingAssignments||[]).map(a=>a.cadet));
  const cadets = allCadets.filter(o => !assignedNames.has(o.name) || o.name===form.cadet);

  const handleCadetSelect = (name) => {
    const o = officers.find(x=>x.name===name);
    set("cadet", name);
    if(o) set("cadetNick", o.nick||"");
  };

  return (
    <div className="overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal">
        <div className="modal-title">{isNew?"PRZYPISZ PROWADZĄCEGO":"EDYTUJ PRZYPISANIE"}</div>
        <div className="form-row">
          <div className="fg">
            <label>Kadet</label>
            <select value={form.cadet} onChange={e=>handleCadetSelect(e.target.value)}>
              <option value="">— wybierz kadeta —</option>
              {cadets.map(o=><option key={o.id} value={o.name}>{o.name} ({o.nick})</option>)}
              {cadets.length===0&&<option disabled>Brak kadetów w bazie</option>}
            </select>
          </div>
          <div className="fg">
            <label>Prowadzący (FTO)</label>
            <select value={form.prowadzacy} onChange={e=>set("prowadzacy",e.target.value)}>
              <option value="">— wybierz FTO —</option>
              {ftoList.map(o=><option key={o.id} value={o.name}>{o.name} ({o.nick}) · {o.rank}</option>)}
              {ftoList.length===0&&<option disabled>Brak FTO w bazie</option>}
            </select>
          </div>
        </div>
        <div className="modal-footer">
          <button className="btn btn-red btn-sm" onClick={onClose}>ANULUJ</button>
          <button className="btn btn-primary btn-sm" onClick={()=>onSave(form)}>ZAPISZ</button>
        </div>
      </div>
    </div>
  );
}

                <td style={{fontFamily:"'Share Tech Mono',monospace",fontSize:11,color:"var(--gray)"}}>{a.cadetNick}</td>
                <td style={{color:"var(--accent)",fontWeight:600}}>{a.prowadzacy}</td>
                {isFtdAdmin&&<td><div className="actions">
                  <button className="btn btn-gold btn-sm" onClick={()=>setModal({isNew:false,entry:a})}>EDYTUJ</button>
                  <button className="btn btn-red btn-sm" onClick={()=>remove(a.id)}>USUŃ</button>
                </div></td>}
              </tr>
            ))}
            {assignments.length===0&&<tr><td colSpan={4} style={{textAlign:"center",padding:32,color:"var(--gray)"}}>Brak przypisań</td></tr>}
          </tbody>
        </table>
      </div>
      {modal&&<ProwadzacyModal entry={modal.entry} isNew={modal.isNew} onSave={save} onClose={()=>setModal(null)} officers={officers} ftoList={ftoList} existingAssignments={assignments}/>}
    </div>
  );
}

function DTUClock() {
  const [t, setT] = React.useState(new Date());
  React.useEffect(()=>{ const i=setInterval(()=>setT(new Date()),1000); return ()=>clearInterval(i); },[]);
  return <span className="dtu-time">{t.toLocaleString("pl-PL",{hour:"2-digit",minute:"2-digit",second:"2-digit",day:"2-digit",month:"2-digit",year:"numeric"})}</span>;
}

  return (
    <div className="overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <style>{DTU_CSS}</style>
      <div style={{
        background:"#000",
        border:"1px solid #00ff41",

        padding:"40px",
        minWidth:380,
        fontFamily:"'Share Tech Mono',monospace",

          <div style={{fontSize:8,letterSpacing:3,color:"rgba(0,255,65,0.3)",marginTop:2}}>LSPD — DOSTĘP ZASTRZEŻONY</div>
        </div>
        <div style={{borderTop:"1px solid rgba(0,255,65,0.15)",paddingTop:24,marginBottom:24}}>
          <div style={{fontSize:9,letterSpacing:3,color:"rgba(0,255,65,0.5)",marginBottom:16}}>[ UWIERZYTELNIANIE ]</div>

              style={{width:"100%",background:"rgba(0,255,65,0.05)",border:"1px solid rgba(0,255,65,0.3)",color:"#00ff41",fontFamily:"'Share Tech Mono',monospace",fontSize:12,padding:"8px 12px",outline:"none",letterSpacing:2,boxSizing:"border-box"}}/>

              style={{width:"100%",background:"rgba(0,255,65,0.05)",border:"1px solid rgba(0,255,65,0.3)",color:"#00ff41",fontFamily:"'Share Tech Mono',monospace",fontSize:12,padding:"8px 12px",outline:"none",letterSpacing:4,boxSizing:"border-box"}}/>

function DTUMemberModal({ entry, onSave, onClose, isNew, officers, existingMembers }) {
  const blank = { id:null, officerId:"", name:"", nick:"", lspdRank:"", internalRank:"Junior Detective", notes:"", accessLevel:1 };
  const [form, setForm] = useState(entry||blank);
  const set = (k,v) => setForm(f=>({...f,[k]:v}));
  const pickOfficer = (e) => {
    const id = e.target.value;
    if(!id) { setForm(f=>({...f, officerId:"", name:"", nick:"", lspdRank:""})); return; }
    const o = (officers||[]).find(x=>String(x.id)===id);
    if(o) setForm(f=>({...f, officerId:id, name:o.name||"", nick:o.nick||o.callsign||"", lspdRank:o.rank||""}));
  };
  return (
    <div className="overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <style>{DTU_CSS}</style>
      <div style={{background:"#000",border:"1px solid #00ff41",boxShadow:"0 0 30px rgba(0,255,65,0.15)",padding:32,minWidth:480,maxWidth:560,fontFamily:"'Share Tech Mono',monospace",position:"relative"}}>
        <div style={{position:"absolute",top:0,left:0,right:0,height:2,background:"linear-gradient(90deg,transparent,#00ff41,transparent)"}}/>

        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14}}>
          {/* WYBÓR Z LISTY FUNKCJONARIUSZY */}

            <div style={{fontSize:9,letterSpacing:2,color:"rgba(0,255,65,0.5)",marginBottom:6}}>FUNKCJONARIUSZ <span style={{color:"rgba(0,255,65,0.3)"}}>(wybierz z bazy)</span>:</div>
            <select value={form.officerId||""} onChange={pickOfficer}
              className="dtu-select"
              style={{width:"100%",background:"rgba(0,255,65,0.05)",border:"1px solid rgba(0,255,65,0.25)",color:form.officerId?"#00ff41":"rgba(0,255,65,0.4)",fontFamily:"'Share Tech Mono',monospace",fontSize:12,padding:"8px 10px",outline:"none",boxSizing:"border-box"}}>
              <option value="">— wybierz funkcjonariusza —</option>
              {(officers||[]).filter(o=> !existingMembers || existingMembers.every(m=>m.name!==o.name) || o.name===form.name).sort((a,b)=>(a.name||"").localeCompare(b.name||"")).map(o=>(
                <option key={o.id} value={String(o.id)}>{o.name} · {o.rank}</option>

          {[["IMIĘ I NAZWISKO","name"],["NICK / CALLSIGN","nick"],["STOPIEŃ LSPD","lspdRank"]].map(([label,key])=>(
            <div key={key} style={{gridColumn:key==="name"?"1/-1":"auto"}}>
              <div style={{fontSize:9,letterSpacing:2,color:"rgba(0,255,65,0.5)",marginBottom:5}}>{label}:</div>
              <input value={form[key]} onChange={e=>set(key,e.target.value)}

              style={{width:"100%",background:"rgba(0,255,65,0.05)",border:"1px solid rgba(0,255,65,0.25)",color:"#00ff41",fontFamily:"'Share Tech Mono',monospace",fontSize:11,padding:"7px 10px",outline:"none",resize:"vertical",boxSizing:"border-box"}}/>

        </div>
      </div>
    </div>
  );
}

function DTUDatabaseTab({ isSuperAdmin, canAdd, canEdit, dtuData, setDtuData, officers }) {
  const members = dtuData.members||[];
  const setMembers = upd => setDtuData(d=>({...d, members: typeof upd==="function"?upd(d.members||[]):upd}));
  // Zawsze pobieraj aktualny stopień z tablicy officers (nie z kopii w dtu)
  const getLiveRank = (name) => (officers||[]).find(o=>o.name===name)?.rank || null;
  const [modal, setModal] = useState(null);
  const save = (form, discordAnnounce=false) => {
    if(modal.isNew) setMembers(p=>[...p,{...form,id:Date.now()}]);
    else setMembers(p=>p.map(x=>x.id===form.id?form:x));
    setModal(null);
  };
  const remove = id => { if(window.confirm("Usunąć agenta?")) setMembers(p=>p.filter(x=>x.id!==id)); };

  return (

// ─── DTU LIGHTBOX ────────────────────────────────────────────────────────────
function DTULightbox({ url, onClose }) {
  useEffect(()=>{
    const h = e => { if(e.key==="Escape") onClose(); };
    window.addEventListener("keydown", h);
    return ()=>window.removeEventListener("keydown", h);
  }, []);
  return (
    <div onClick={onClose} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.97)",zIndex:99999,display:"flex",alignItems:"center",justifyContent:"center",cursor:"zoom-out"}}>
      <img src={url} onClick={e=>e.stopPropagation()} style={{maxWidth:"92vw",maxHeight:"92vh",objectFit:"contain",border:"1px solid rgba(0,255,65,0.15)"}} alt="powiększenie"/>
      <div style={{position:"fixed",top:16,right:20,color:"rgba(0,255,65,0.35)",fontFamily:"'Share Tech Mono',monospace",fontSize:9,letterSpacing:2}}>ESC / KLIKNIJ ABY ZAMKNĄĆ</div>
    </div>
  );
}

// ─── DTU POJAZDY SECTION (reużywalna) ────────────────────────────────────────
function DTUPojazdySection({ pojazdy, setPojazdy, isSuperAdmin, canAdd, canEdit, allSprawyPojazdy, allKartotekaPojazdy, sourceLabel, lightboxSet }) {
  const [vModal, setVModal] = useState(null);

  const save = (form, discordAnnounce=false) => {
    if(vModal.isNew) setPojazdy(p=>[...p,{...form,id:Date.now()}]);
    else setPojazdy(p=>p.map(x=>x.id===form.id?form:x));
    setVModal(null);
  };
  const remove = id => { if(window.confirm("Usunąć pojazd?")) setPojazdy(p=>p.filter(x=>x.id!==id)); };

  // Znajdź powiązania po rejestracji
  const findLinks = (reg) => {
    if(!reg) return [];
    const r = reg.toUpperCase().trim();
    return (allSprawyPojazdy||[]).filter(v=>(v.rejestracja||"").toUpperCase().trim()===r && v._sourceLabel!==sourceLabel)
      .concat((allKartotekaPojazdy||[]).filter(v=>(v.rejestracja||"").toUpperCase().trim()===r && v._sourceLabel!==sourceLabel));
  };

  return (
    <div>
      <div style={{fontSize:9,letterSpacing:4,color:"rgba(0,255,65,0.4)",marginBottom:12,display:"flex",alignItems:"center",gap:12}}>
        <span>// POJAZDY — {pojazdy.length} REKORDÓW</span>
        <div style={{flex:1,height:1,background:"rgba(0,255,65,0.1)"}}/>
        {canAdd && <button onClick={()=>setVModal({isNew:true})}
          style={{padding:"4px 12px",background:"rgba(0,255,65,0.07)",border:"1px solid rgba(0,255,65,0.3)",color:"rgba(0,255,65,0.8)",fontFamily:"'Share Tech Mono',monospace",fontSize:9,letterSpacing:2,cursor:"pointer"}}>
          + DODAJ POJAZD

      {pojazdy.length===0 && (
        <div style={{padding:"20px",background:"rgba(0,255,65,0.02)",border:"1px dashed rgba(0,255,65,0.1)",color:"rgba(0,255,65,0.2)",fontSize:11,letterSpacing:2,textAlign:"center"}}>BRAK POJAZDÓW</div>
      )}

      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(300px,1fr))",gap:12}}>
        {pojazdy.map(v=>{
          const links = findLinks(v.rejestracja);
          const hasLink = links.length>0;
          return (
            <div key={v.id} style={{
              background: hasLink?"rgba(241,196,15,0.05)":"rgba(0,255,65,0.025)",
              border: hasLink?"2px solid rgba(241,196,15,0.5)":"1px solid rgba(0,255,65,0.12)",
              padding:16,position:"relative"

                <div style={{position:"absolute",top:8,right:8,fontSize:8,letterSpacing:1,color:"#f1c40f",background:"rgba(241,196,15,0.15)",border:"1px solid rgba(241,196,15,0.4)",padding:"2px 8px",fontFamily:"'Share Tech Mono',monospace",fontWeight:700}}>
                  🔗 POWIĄZANY
                </div>
              )}
              <div style={{display:"flex",gap:14,alignItems:"flex-start"}}>
                {/* Foto */}
                <div style={{width:90,height:68,background:"rgba(0,255,65,0.04)",border:"1px solid rgba(0,255,65,0.15)",flexShrink:0,overflow:"hidden",display:"flex",alignItems:"center",justifyContent:"center",cursor:v.foto?"zoom-in":"default"}}
                  onClick={()=>v.foto&&lightboxSet&&lightboxSet(v.foto)}>
                  {v.foto

                <div style={{display:"flex",gap:6,marginTop:10,justifyContent:"flex-end"}}>

                  <button onClick={()=>remove(v.id)} style={{padding:"3px 10px",background:"rgba(255,0,0,0.06)",border:"1px solid rgba(255,0,0,0.3)",color:"rgba(255,80,80,0.7)",fontFamily:"'Share Tech Mono',monospace",fontSize:9,cursor:"pointer"}}>USUŃ</button>
                </div>
              )}
            </div>
          );
        })}
      </div>

      {vModal && <DTUVehicleModal vehicle={vModal.vehicle} isNew={vModal.isNew} onSave={save} onClose={()=>setVModal(null)}/>}
    </div>
  );
}

function DTUKartotekaTab({ isSuperAdmin, canAdd, canEdit, dtuData, setDtuData, goToKartoteka, onGoToKartotekaDone, onGoToSprawa }) {
  const kartoteka = dtuData.kartoteka||[];
  const sprawy = dtuData.sprawy||[];
  const setKartoteka = upd => setDtuData(d=>({...d, kartoteka: typeof upd==="function"?upd(d.kartoteka||[]):upd}));
  const [modal, setModal] = useState(null);
  const [detail, setDetail] = useState(null);
  const [search, setSearch] = useState("");
  useEffect(()=>{ if(goToKartoteka){ setDetail(goToKartoteka); onGoToKartotekaDone&&onGoToKartotekaDone(); } },[goToKartoteka]);
  const STATUS_COLOR = { "OBSERWOWANY":"#f1c40f","PODEJRZANY":"#e67e22","ŚCIGANY":"#e74c3c","ZATRZYMANY":"#2ecc71","ARCHIWALNY":"rgba(0,255,65,0.3)" };

  const save = (form, discordAnnounce=false) => {
    if(modal.isNew) setKartoteka(p=>[...p,{...form,id:Date.now(),dataWpisu:new Date().toLocaleDateString("pl-PL")}]);
    else setKartoteka(p=>p.map(x=>x.id===form.id?{...form}:x));
    setModal(null);
  };
  const remove = id => { if(window.confirm("Usunąć wpis?")) { setKartoteka(p=>p.filter(x=>x.id!==id)); setDetail(null); } };

  const filtered = kartoteka.filter(k=>
    !search || `${k.imie} ${k.nazwisko} ${k.alias}`.toLowerCase().includes(search.toLowerCase())
  );

  const detailEntry = detail ? kartoteka.find(k=>k.id===detail) : null;

  return (
    <div>
      <div className="dtu-section-title">// <span>KARTOTEKA</span> — BAZA OSÓB · {kartoteka.length} WPISÓW</div>
      <div style={{display:"flex",gap:12,marginBottom:20,alignItems:"center"}}>
        <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="SZUKAJ..."
          style={{flex:1,background:"rgba(0,255,65,0.05)",border:"1px solid rgba(0,255,65,0.2)",color:"#00ff41",fontFamily:"'Share Tech Mono',monospace",fontSize:11,padding:"8px 12px",outline:"none"}}/>
        {canAdd && <button onClick={()=>setModal({isNew:true})} style={{padding:"8px 18px",background:"rgba(0,255,65,0.08)",border:"1px solid #00ff41",color:"#00ff41",fontFamily:"'Share Tech Mono',monospace",fontSize:10,letterSpacing:2,cursor:"pointer",whiteSpace:"nowrap"}}>+ NOWY WPIS</button>}
      </div>

      {filtered.length===0 && <div className="dtu-placeholder"><div>⬡</div><div>BRAK WPISÓW</div></div>}

      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(280px,1fr))",gap:12}}>
        {filtered.map(k=>{
          const sc = STATUS_COLOR[k.status]||"#888";
          return (
            <div key={k.id} onClick={()=>setDetail(k.id)}
              style={{background:"rgba(0,255,65,0.02)",border:`1px solid rgba(0,255,65,0.1)`,borderLeft:`3px solid ${sc}`,padding:16,position:"relative",cursor:"pointer",transition:"background .15s,border-color .15s"}}
              onMouseEnter={e=>{e.currentTarget.style.background="rgba(0,255,65,0.05)";e.currentTarget.style.borderColor="rgba(0,255,65,0.3)";}}
              onMouseLeave={e=>{e.currentTarget.style.background="rgba(0,255,65,0.02)";e.currentTarget.style.borderColor="rgba(0,255,65,0.1)";}}>
              <div style={{display:"flex",gap:12,alignItems:"flex-start"}}>
                <div style={{width:56,height:70,background:"rgba(0,255,65,0.04)",border:"1px solid rgba(0,255,65,0.15)",flexShrink:0,overflow:"hidden",display:"flex",alignItems:"center",justifyContent:"center"}}>
                  {k.foto
                    ? <img src={k.foto} style={{width:"100%",height:"100%",objectFit:"cover"}} alt="foto"/>
                    : <div style={{color:"rgba(0,255,65,0.15)",fontSize:7,textAlign:"center",letterSpacing:1}}>BRAK<br/>FOTO</div>}
                </div>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{color:"#00ff41",fontSize:14,fontWeight:600,letterSpacing:1}}>{k.imie} {k.nazwisko}</div>
                  {k.alias && <div style={{fontSize:9,color:"rgba(0,255,65,0.5)",letterSpacing:1,marginTop:2}}>AKA: {k.alias}</div>}
                  {k.telefon && <div style={{fontSize:9,color:"rgba(0,255,65,0.45)",letterSpacing:1,marginTop:2}}>📞 {k.telefon}</div>}
                  <div style={{marginTop:5,display:"inline-block",fontSize:8,letterSpacing:2,color:sc,border:`1px solid ${sc}55`,background:`${sc}11`,padding:"2px 7px"}}>{k.status}</div>
                  {k.opis && <div style={{marginTop:6,fontSize:10,color:"rgba(0,255,65,0.5)",lineHeight:1.5,overflow:"hidden",textOverflow:"ellipsis",display:"-webkit-box",WebkitLineClamp:2,WebkitBoxOrient:"vertical"}}>{k.opis}</div>}
                  <div style={{marginTop:5,fontSize:8,color:"rgba(0,255,65,0.25)",letterSpacing:1}}>WPIS: {k.dataWpisu||"—"}</div>
                </div>
              </div>
              <div style={{marginTop:8,fontSize:8,color:"rgba(0,255,65,0.2)",letterSpacing:1,textAlign:"right"}}>→ kliknij aby otworzyć</div>
            </div>
          );
        })}
      </div>
      {modal && <DTUKartotekaModal entry={modal.entry} isNew={modal.isNew} onSave={save} onClose={()=>setModal(null)}/>}
      {detailEntry && (
        <DTUKartotekaDetail
          entry={detailEntry}
          sprawy={sprawy}
          isSuperAdmin={isSuperAdmin}
          canAdd={canAdd}
          canEdit={canEdit}
          onClose={()=>setDetail(null)}
          onEdit={()=>{setModal({isNew:false,entry:detailEntry});setDetail(null);}}
          onDelete={()=>remove(detailEntry.id)}
          onGoToSprawa={id=>{ setDetail(null); onGoToSprawa&&onGoToSprawa(id); }}
          setDtuData={setDtuData}
          dtuData={dtuData}
        />
      )}
    </div>
  );
}

// ─── DTU SPRAWY TAB ──────────────────────────────────────────────────────────
function generateSprawaNum(sprawy) {
  const year = new Date().getFullYear();
  const num = String((sprawy||[]).length + 1).padStart(4,"0");
  return `DTU-${year}-${num}`;
}


function OsobySearch({ kartoteka, selected, onToggle }) {
  const [query, setQuery] = React.useState("");
  const results = query.trim().length >= 1
    ? kartoteka.filter(k => `${k.imie} ${k.nazwisko} ${k.alias}`.toLowerCase().includes(query.toLowerCase()))
    : [];
  const selectedItems = kartoteka.filter(k => selected.includes(k.id));

  return (
    <div>
      {/* Wybrane osoby */}
      {selectedItems.length > 0 && (
        <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:10}}>
          {selectedItems.map(k=>(
            <div key={k.id} style={{display:"flex",alignItems:"center",gap:6,fontSize:9,color:"#00ff41",background:"rgba(0,255,65,0.08)",border:"1px solid rgba(0,255,65,0.3)",padding:"3px 8px"}}>
              {k.imie} {k.nazwisko}{k.alias?` (${k.alias})`:""}
              <span onClick={()=>onToggle(k.id)} style={{cursor:"pointer",color:"rgba(255,80,80,0.7)",marginLeft:4,fontWeight:700}}>×</span>
            </div>
          ))}
        </div>
      )}
      {/* Wyszukiwarka */}
      <input
        value={query}
        onChange={e=>setQuery(e.target.value)}
        placeholder="WPISZ NAZWISKO..."
        style={{width:"100%",background:"rgba(0,255,65,0.05)",border:"1px solid rgba(0,255,65,0.2)",color:"#00ff41",fontFamily:"'Share Tech Mono',monospace",fontSize:11,padding:"7px 10px",outline:"none",boxSizing:"border-box",marginBottom:6}}
      />
      {/* Wyniki */}
      {query.trim().length >= 1 && (
        <div style={{border:"1px solid rgba(0,255,65,0.15)",maxHeight:160,overflowY:"auto"}}>
          {results.length === 0
            ? <div style={{padding:"8px 12px",fontSize:9,color:"rgba(0,255,65,0.3)",letterSpacing:2}}>BRAK WYNIKÓW</div>
            : results.map(k=>{
                const sel = selected.includes(k.id);
                return (
                  <div key={k.id} onClick={()=>{onToggle(k.id);setQuery("");}}
                    style={{display:"flex",alignItems:"center",gap:10,padding:"7px 12px",cursor:"pointer",
                      background: sel ? "rgba(0,255,65,0.08)" : "transparent",
                      borderBottom:"1px solid rgba(0,255,65,0.08)",transition:"background .1s"}}>
                    <div style={{width:10,height:10,border:`1px solid ${sel?"#00ff41":"rgba(0,255,65,0.3)"}`,background:sel?"#00ff41":"transparent",flexShrink:0}}/>
                    <div style={{fontSize:11,color:sel?"#00ff41":"rgba(0,255,65,0.6)"}}>
                      {k.imie} {k.nazwisko}
                      {k.alias && <span style={{opacity:.5}}> · {k.alias}</span>}
                      <span style={{marginLeft:8,fontSize:8,opacity:.4}}>{k.status}</span>
                    </div>
                  </div>
                );
              })
          }
        </div>
      )}
    </div>
  );
}

function DTUSprawaModal({ entry, onSave, onClose, isNew, kartoteka, dtuMembers }) {
  const blank = { id:null, numer:"", nazwa:"", opis:"", status:"AKTYWNA", osoby:[], zdjecia:[], dataOtwarcia:new Date().toLocaleDateString("pl-PL"), prowadzacy:"", accessLevel:1 };
  const [uploading, setUploading] = useState(false);
  const [form, setForm] = useState(entry||blank);
  const set = (k,v) => setForm(f=>({...f,[k]:v}));
  const STATUSY_SPRAWY = ["AKTYWNA","ZAWIESZONA","ZAKOŃCZONA","ARCHIWALNA"];
  const STATUS_COLOR = { "AKTYWNA":"#00ff41","ZAWIESZONA":"#f1c40f","ZAKOŃCZONA":"#2ecc71","ARCHIWALNA":"rgba(0,255,65,0.3)" };

  const toggleOsoba = (id) => {
    setForm(f=>({...f, osoby: f.osoby.includes(id) ? f.osoby.filter(x=>x!==id) : [...f.osoby,id]}));
  };

  const handleZdjecie = async (e) => {
    const file = e.target.files[0];
    if(!file) return;
    setUploading(true);
    try {
      const entryId = form.id || form.numer || Date.now();
      const url = await dbApi.uploadPhoto(file, "sprawy", entryId);
      setForm(f=>({...f, zdjecia: [...(f.zdjecia||[]), url]}));
    } catch(err) {
      alert("Błąd uploadu: " + err.message);
    } finally {
      setUploading(false);
      e.target.value = "";
    }
  };
  const removeZdjecie = (url) => setForm(f=>({...f, zdjecia:(f.zdjecia||[]).filter(x=>x!==url)}));

  return (
    <div className="overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <style>{DTU_CSS}</style>
      <div style={{background:"#000",border:"1px solid #00ff41",boxShadow:"0 0 30px rgba(0,255,65,0.15)",padding:32,minWidth:520,maxWidth:640,fontFamily:"'Share Tech Mono',monospace",position:"relative",maxHeight:"90vh",overflowY:"auto"}}>
        <div style={{position:"absolute",top:0,left:0,right:0,height:2,background:"linear-gradient(90deg,transparent,#00ff41,transparent)"}}/>
        <div style={{color:"#00ff41",fontSize:13,letterSpacing:3,marginBottom:24,textShadow:"0 0 8px #00ff41"}}>{isNew?"[ NOWA SPRAWA ]":"[ EDYTUJ SPRAWĘ ]"}</div>

        {isNew && <div style={{marginBottom:16,padding:"8px 12px",background:"rgba(0,255,65,0.05)",border:"1px solid rgba(0,255,65,0.15)",fontSize:9,letterSpacing:2,color:"rgba(0,255,65,0.6)"}}>
          NR SPRAWY: <span style={{color:"#00ff41"}}>{form.numer}</span>
        </div>}

        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14,marginBottom:14}}>
          <div style={{gridColumn:"1/-1"}}>
            <div style={{fontSize:9,letterSpacing:2,color:"rgba(0,255,65,0.5)",marginBottom:5}}>NAZWA SPRAWY:</div>
            <input value={form.nazwa} onChange={e=>set("nazwa",e.target.value)}
              style={{width:"100%",background:"rgba(0,255,65,0.05)",border:"1px solid rgba(0,255,65,0.2)",color:"#00ff41",fontFamily:"'Share Tech Mono',monospace",fontSize:12,padding:"7px 10px",outline:"none",boxSizing:"border-box"}}/>
          </div>
          <div>
            <div style={{fontSize:9,letterSpacing:2,color:"rgba(0,255,65,0.5)",marginBottom:5}}>PROWADZĄCY:</div>
            <select value={form.prowadzacy} onChange={e=>set("prowadzacy",e.target.value)}
              className="dtu-select"
              style={{width:"100%",background:"rgba(0,255,65,0.05)",border:"1px solid rgba(0,255,65,0.2)",color:form.prowadzacy?"#00ff41":"rgba(0,255,65,0.4)",fontFamily:"'Share Tech Mono',monospace",fontSize:11,padding:"7px 10px",outline:"none",boxSizing:"border-box"}}>
              <option value="">— wybierz prowadzącego —</option>
              {(dtuMembers||[]).sort((a,b)=>(a.name||"").localeCompare(b.name||"")).map(m=>(
                <option key={m.id} value={m.name}>{m.name} · {m.internalRank}</option>
              ))}
            </select>
          </div>
          <div>
            <div style={{fontSize:9,letterSpacing:2,color:"rgba(0,255,65,0.5)",marginBottom:5}}>POZIOM DOSTĘPU (ACCESS):</div>
            <div style={{display:"flex",gap:4}}>
              {[1,2,3].map(lvl=>{const ac={1:"#3baaff",2:"#f1c40f",3:"#e74c3c"}; return (
                <button key={lvl} onClick={()=>set("accessLevel",lvl)} style={{flex:1,padding:"7px 4px",fontSize:9,letterSpacing:1,cursor:"pointer",fontFamily:"'Share Tech Mono',monospace",fontWeight:700,
                  border:`1px solid ${ac[lvl]}55`,
                  background: form.accessLevel===lvl ? `${ac[lvl]}22` : "transparent",
                  color: form.accessLevel===lvl ? ac[lvl] : "rgba(0,255,65,0.25)"}}>
                  ACCESS {lvl}

            </div>
          </div>
          <div>

              {STATUSY_SPRAWY.map(s=>(

        </div>

        {/* Zdjęcia sprawy */}
        <div style={{marginTop:16}}>
          <div style={{fontSize:9,letterSpacing:2,color:"rgba(0,255,65,0.5)",marginBottom:8}}>ZDJĘCIA / DOWODY:</div>
          <div style={{display:"flex",flexWrap:"wrap",gap:8,marginBottom:8}}>
            {(form.zdjecia||[]).map((url,i)=>(
              <div key={i} style={{position:"relative",width:70,height:70}}>
                <img src={url} style={{width:70,height:70,objectFit:"cover",border:"1px solid rgba(0,255,65,0.2)"}} alt="dowód"/>
                <div onClick={()=>removeZdjecie(url)} style={{position:"absolute",top:2,right:2,width:16,height:16,background:"rgba(0,0,0,0.7)",border:"1px solid rgba(255,0,0,0.5)",color:"#ff5555",fontSize:10,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer"}}>×</div>
              </div>
            ))}
          </div>
          <label style={{display:"inline-block",padding:"5px 14px",background:"rgba(0,255,65,0.06)",border:"1px solid rgba(0,255,65,0.25)",color:uploading?"rgba(0,255,65,0.3)":"rgba(0,255,65,0.7)",fontSize:8,letterSpacing:2,cursor:uploading?"not-allowed":"pointer"}}>
            {uploading ? "UPLOADING..." : "+ DODAJ ZDJĘCIE"}

        <div style={{display:"flex",gap:8,marginTop:20}}>
          <button onClick={()=>onSave(form)} style={{flex:1,padding:"9px",background:"rgba(0,255,65,0.08)",border:"1px solid #00ff41",color:"#00ff41",fontFamily:"'Share Tech Mono',monospace",fontSize:10,letterSpacing:3,cursor:"pointer"}}>[ ZAPISZ ]</button>
          <button onClick={onClose} style={{padding:"9px 14px",background:"rgba(255,0,0,0.08)",border:"1px solid rgba(255,0,0,0.4)",color:"rgba(255,80,80,0.8)",fontFamily:"'Share Tech Mono',monospace",fontSize:10,cursor:"pointer"}}>✕</button>
        </div>
      </div>
    </div>
  );
}

  const setSprawy = upd => setDtuData(d=>({...d, sprawy: typeof upd==="function"?upd(d.sprawy||[]):upd}));
  const [modal, setModal] = useState(null);
  const [detail, setDetail] = useState(null);
  const [filterStatus, setFilterStatus] = useState("ALL");
  const [filterAccess, setFilterAccess] = useState("ALL");
  useEffect(()=>{ if(goToSprawa){ setDetail(goToSprawa); onGoToSprawaDone&&onGoToSprawaDone(); } },[goToSprawa]);
  const STATUS_COLOR = { "AKTYWNA":"#00ff41","ZAWIESZONA":"#f1c40f","ZAKOŃCZONA":"#2ecc71","ARCHIWALNA":"rgba(0,255,65,0.3)" };
  const ACCESS_COLOR = { 1:"#3baaff", 2:"#f1c40f", 3:"#e74c3c" };

  // Determine user access level: Admin/Zarząd sees all (level 3), others by credential
  const userAccessLevel = isSuperAdmin ? 3 : (dtuAdmin?.accessLevel || 1);

  const openNew = () => {
    const numer = generateSprawaNum(sprawy);
    setModal({isNew:true, entry:{id:null,numer,nazwa:"",opis:"",status:"AKTYWNA",osoby:[],zdjecia:[],dataOtwarcia:new Date().toLocaleDateString("pl-PL"),prowadzacy:"",accessLevel:1}});
  };

  const save = async (form, discordAnnounce=false) => {
    try {
      if(modal.isNew) {
        const result = await dbApi.atomicAppend("dtu", "sprawy", form);
        setSprawy(p=>[result,...p]);
      } else {
        const result = await dbApi.atomicUpdate("dtu", "sprawy", form.id, form);
        setSprawy(p=>p.map(x=>x.id===form.id?result:x));
      }
    } catch(e) {
      alert("Błąd zapisu sprawy: " + e.message);
    }
    setModal(null);
  };
  const remove = id => { if(window.confirm("Usunąć sprawę?")) { setSprawy(p=>p.filter(x=>x.id!==id)); setDetail(null); } };

  // Filter: higher access sees lower levels (accessLevel <= userAccessLevel)
  const visibleSprawy = sprawy.filter(s => (s.accessLevel||1) <= userAccessLevel);
  const filtered = visibleSprawy.filter(s => {
    const okStatus = filterStatus==="ALL" || s.status===filterStatus;
    const okAccess = filterAccess==="ALL" || String(s.accessLevel||1)===String(filterAccess);
    return okStatus && okAccess;
  });
  const STATUSY = ["ALL","AKTYWNA","ZAWIESZONA","ZAKOŃCZONA","ARCHIWALNA"];
  const detailEntry = detail ? sprawy.find(s=>s.id===detail) : null;

  return (
    <div>
      <div className="dtu-section-title">// <span>SPRAWY</span> — AKTYWNE DOCHODZENIA · {visibleSprawy.length} SPRAW</div>
      <div style={{display:"flex",gap:6,marginBottom:10,flexWrap:"wrap",alignItems:"center"}}>
        {STATUSY.map(s=>(
          <button key={s} onClick={()=>setFilterStatus(s)} style={{padding:"5px 12px",fontSize:8,letterSpacing:2,cursor:"pointer",fontFamily:"'Share Tech Mono',monospace",
            border:`1px solid ${filterStatus===s?"#00ff41":"rgba(0,255,65,0.2)"}`,
            background: filterStatus===s ? "rgba(0,255,65,0.1)" : "transparent",
            color: filterStatus===s ? "#00ff41" : "rgba(0,255,65,0.4)"}}>
            {s}
          </button>
        ))}
      </div>
      <div style={{display:"flex",gap:6,marginBottom:16,flexWrap:"wrap",alignItems:"center"}}>
        <span style={{fontSize:8,letterSpacing:2,color:"rgba(0,255,65,0.35)",fontFamily:"'Share Tech Mono',monospace"}}>ACCESS:</span>
        <button onClick={()=>setFilterAccess("ALL")} style={{padding:"4px 10px",fontSize:8,letterSpacing:2,cursor:"pointer",fontFamily:"'Share Tech Mono',monospace",
          border:`1px solid ${filterAccess==="ALL"?"#00ff41":"rgba(0,255,65,0.2)"}`,
          background: filterAccess==="ALL" ? "rgba(0,255,65,0.1)" : "transparent",
          color: filterAccess==="ALL" ? "#00ff41" : "rgba(0,255,65,0.4)"}}>ALL</button>
        {[1,2,3].filter(lvl=>lvl<=userAccessLevel).map(lvl=>(
          <button key={lvl} onClick={()=>setFilterAccess(String(lvl))} style={{padding:"4px 10px",fontSize:8,letterSpacing:2,cursor:"pointer",fontFamily:"'Share Tech Mono',monospace",
            border:`1px solid ${filterAccess===String(lvl)?ACCESS_COLOR[lvl]:"rgba(0,255,65,0.2)"}`,
            background: filterAccess===String(lvl) ? `${ACCESS_COLOR[lvl]}18` : "transparent",
            color: filterAccess===String(lvl) ? ACCESS_COLOR[lvl] : "rgba(0,255,65,0.4)"}}>
            ACCESS {lvl}
          </button>
        ))}
        {canAdd && <button onClick={openNew} style={{marginLeft:"auto",padding:"8px 18px",background:"rgba(0,255,65,0.08)",border:"1px solid #00ff41",color:"#00ff41",fontFamily:"'Share Tech Mono',monospace",fontSize:10,letterSpacing:2,cursor:"pointer"}}>+ NOWA SPRAWA</button>}
      </div>

      {filtered.length===0 && <div className="dtu-placeholder"><div>⬡</div><div>BRAK SPRAW</div></div>}

      <div style={{display:"flex",flexDirection:"column",gap:12}}>
        {filtered.map(s=>{
          const sc = STATUS_COLOR[s.status]||"#888";
          const ac = ACCESS_COLOR[s.accessLevel||1]||"#3baaff";
          const osobyPow = kartoteka.filter(k=>(s.osoby||[]).includes(k.id));
          return (
            <div key={s.id} onClick={()=>setDetail(s.id)}
              style={{background:"rgba(0,255,65,0.02)",border:`1px solid rgba(0,255,65,0.1)`,borderLeft:`3px solid ${sc}`,padding:18,cursor:"pointer",transition:"background .15s,border-color .15s"}}
              onMouseEnter={e=>{e.currentTarget.style.background="rgba(0,255,65,0.04)";e.currentTarget.style.borderColor="rgba(0,255,65,0.25)";}}
              onMouseLeave={e=>{e.currentTarget.style.background="rgba(0,255,65,0.02)";e.currentTarget.style.borderColor="rgba(0,255,65,0.1)";}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:12,flexWrap:"wrap"}}>
                <div>
                  <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}>
                    <span style={{fontFamily:"'Share Tech Mono',monospace",fontSize:10,color:"rgba(0,255,65,0.4)",letterSpacing:2}}>{s.numer}</span>
                    <span style={{fontSize:8,letterSpacing:2,color:sc,border:`1px solid ${sc}55`,background:`${sc}11`,padding:"2px 7px"}}>{s.status}</span>
                    <span style={{fontSize:8,letterSpacing:1,color:ac,border:`1px solid ${ac}55`,background:`${ac}11`,padding:"2px 7px",fontWeight:700}}>ACCESS {s.accessLevel||1}</span>
                    {(s.zdjecia||[]).length>0 && <span style={{fontSize:8,color:"rgba(0,255,65,0.3)",letterSpacing:1}}>📷 {s.zdjecia.length}</span>}
                  </div>
                  <div style={{color:"#00ff41",fontSize:15,fontWeight:600,letterSpacing:1,marginBottom:4}}>{s.nazwa||"— bez nazwy —"}</div>
                  {s.prowadzacy && <div style={{fontSize:9,color:"rgba(0,255,65,0.4)",letterSpacing:1}}>PROWADZĄCY: {s.prowadzacy}</div>}
                </div>
                <div style={{fontSize:8,color:"rgba(0,255,65,0.2)",alignSelf:"center",letterSpacing:1}}>→ kliknij</div>
              </div>
              {osobyPow.length>0 && (
                <div style={{marginTop:10,display:"flex",gap:6,flexWrap:"wrap"}}>
                  {osobyPow.map(o=>(
                    <span key={o.id} style={{fontSize:8,color:"rgba(0,255,65,0.5)",background:"rgba(0,255,65,0.05)",border:"1px solid rgba(0,255,65,0.12)",padding:"2px 8px"}}>
                      {o.imie} {o.nazwisko}
                    </span>
                  ))}
                </div>
              )}
              <div style={{marginTop:8,fontSize:8,color:"rgba(0,255,65,0.2)",letterSpacing:1}}>OTWARTA: {s.dataOtwarcia||"—"}</div>
            </div>
          );
        })}
      </div>
      {modal && <DTUSprawaModal entry={modal.entry} isNew={modal.isNew} onSave={save} onClose={()=>setModal(null)} kartoteka={kartoteka} dtuMembers={dtuMembers}/>}
      {detailEntry && (
        <DTUSprawaDetail
          entry={detailEntry}
          kartoteka={kartoteka}
          isSuperAdmin={isSuperAdmin}
          canAdd={canAdd}
          canEdit={canEdit}
          onClose={()=>setDetail(null)}
          onEdit={()=>{setModal({isNew:false,entry:detailEntry});setDetail(null);}}
          onDelete={()=>remove(detailEntry.id)}
          onGoToKartoteka={id=>{ setDetail(null); onGoToKartoteka&&onGoToKartoteka(id); }}
          setDtuData={setDtuData}
          dtuData={dtuData}
        />
      )}
    </div>
  );
}

function IADLoginModal({ onLogin, onClose }) {
  const [login, setLogin] = useState(""); const [pass, setPass] = useState(""); const [err, setErr] = useState("");
  const submit = () => {
    const f = IAD_CREDENTIALS.find(c=>c.login===login&&c.password===pass);
    f ? onLogin(f) : setErr("Nieprawidłowy login lub hasło.");
  };
  return (
    <div className="overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="login-card">
        <div className="login-logo" style={{fontSize:32,letterSpacing:4,color:"#c084fc"}}>IAD</div>
        <div className="login-sub">INTERNAL AFFAIRS DIVISION — DOSTĘP</div>
        {err&&<div className="login-err">{err}</div>}
        <div className="fg" style={{marginBottom:12,textAlign:"left"}}><label>Login</label><input value={login} onChange={e=>setLogin(e.target.value)} onKeyDown={e=>e.key==="Enter"&&submit()} autoFocus/></div>
        <div className="fg" style={{marginBottom:20,textAlign:"left"}}><label>Hasło</label><input type="password" value={pass} onChange={e=>setPass(e.target.value)} onKeyDown={e=>e.key==="Enter"&&submit()}/></div>
        <div style={{display:"flex",gap:8}}>
          <button className="btn" style={{flex:1,justifyContent:"center",background:"rgba(128,0,128,0.2)",border:"1px solid #c084fc",color:"#c084fc"}} onClick={submit}>ZALOGUJ</button>
          <button className="btn btn-red btn-sm" onClick={onClose}>✕</button>
        </div>
      </div>
    </div>
  );
}

const AKTA_KONSEKWENCJA_OPTS = ["PLUS","MINUS","ZAWIESZENIE","ZWOLNIENIE","NAGANA","POCHWALA"];
function getAktaColor(k) {
  if(k==="PLUS")       return { bg:"rgba(46,204,113,0.08)",  border:"rgba(46,204,113,0.3)",  text:"#2ecc71" };
  if(k==="MINUS")      return { bg:"rgba(231,76,60,0.08)",   border:"rgba(231,76,60,0.3)",   text:"#e74c3c" };
  if(k==="ZAWIESZENIE")return { bg:"rgba(241,196,15,0.08)",  border:"rgba(241,196,15,0.3)",  text:"#f1c40f" };
  if(k==="ZWOLNIENIE") return { bg:"rgba(231,76,60,0.18)",   border:"rgba(231,76,60,0.5)",   text:"#ff4444" };
  if(k==="NAGANA")    return { bg:"rgba(231,76,60,0.06)",   border:"rgba(231,76,60,0.25)",  text:"#e07830" };
  if(k==="POCHWALA")  return { bg:"rgba(46,204,113,0.06)",  border:"rgba(46,204,113,0.25)", text:"#27ae60" };
  return { bg:"rgba(255,255,255,0.03)", border:"rgba(255,255,255,0.1)", text:"var(--gray)" };
}

const IAD_AKTA_CHANNEL_WEBHOOK = "https://discord.com/api/webhooks/1474894360976818387/iD9K7sjZJ27TTOy64pu-CLknm3RY23fjThI8GsRD8FOPoLkHlznA8g4ECvYydmXktxnt";
const IAD_AKTA_CHANNEL_ID = "1473743212966318140";

async function sendAktaToDiscord(akta) {
  const konsColors = { "PLUS":0x2ecc71, "MINUS":0xe74c3c, "ZAWIESZENIE":0xf1c40f, "ZWOLNIENIE":0xff0000, "NAGANA":0xe07830, "POCHWALA":0x27ae60 };

  const color = konsColors[akta.konsekwencja] || 0x888888;
  const emoji = konsEmoji[akta.konsekwencja] || "📁";
  const konsLabel = akta.konsekwencja + (akta.konsekwencja==="ZAWIESZENIE"&&akta.zawieszenieCzas ? ` — ${akta.zawieszenieCzas}` : "");

  const embed = {

    ],
    timestamp: new Date().toISOString(),

function IADAktaView({ iadData, setIadData, isIadInspector, officers, iadMembers }) {
  const akta = iadData.akta || [];
  const setAkta = (upd) => setIadData(d=>({...d, akta: typeof upd==="function"?upd(d.akta||[]):upd}));
  const [modal, setModal] = useState(null);
  const save = async (form, discordAnnounce=false) => {
    try {
      if(modal.isNew) {
        // Atomic append — bezpieczny zapis bez race condition
        const saved = await dbApi.atomicAppend("iad", "akta", form);
        setAkta(p=>[...p, saved]);
        // Wyślij na Discord przez webhook (bot też obserwuje zmiany)
        sendAktaToDiscord(saved);
      } else {
        const result = await dbApi.atomicUpdate("iad", "akta", form.id, form);
        setAkta(p=>p.map(x=>x.id===form.id?result:x));
      }
    } catch(e) {
      alert("Błąd zapisu akty: " + e.message);
    }
    setModal(null);
  };
  const remove = id => { if(window.confirm("Usunąć akt?")) setAkta(p=>p.filter(x=>x.id!==id)); };

  return (
    <div>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16,flexWrap:"wrap",gap:12}}>
        <div><div className="page-title">AKTA</div><div className="page-sub">{akta.length} REKORDÓW</div></div>
        {isIadInspector&&<button className="btn btn-primary" onClick={()=>setModal({isNew:true})}>+ DODAJ AKTE</button>}
      </div>
      <div style={{display:"flex",flexDirection:"column",gap:10}}>
        {akta.map(a=>{
          const c = getAktaColor(a.konsekwencja);
          return (
            <div key={a.id} style={{background:c.bg,border:`1px solid ${c.border}`,borderRadius:6,padding:"16px 20px",borderLeft:`4px solid ${c.text}`}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",flexWrap:"wrap",gap:8}}>
                <div>
                  <div style={{fontSize:16,fontWeight:700,color:"var(--white)",marginBottom:4}}>{a.imieNazwisko}</div>
                  <div style={{display:"inline-block",fontFamily:"'Share Tech Mono',monospace",fontSize:11,color:c.text,background:`${c.bg}`,border:`1px solid ${c.border}`,padding:"3px 10px",borderRadius:3,fontWeight:700,letterSpacing:2}}>
                    {a.konsekwencja}{a.konsekwencja==="ZAWIESZENIE"&&a.zawieszenieCzas?` — ${a.zawieszenieCzas}`:""}
                  </div>
                </div>
                {isIadInspector&&<div className="actions">
                  <button className="btn btn-gold btn-sm" onClick={()=>setModal({isNew:false,entry:a})}>EDYTUJ</button>
                  <button className="btn btn-red btn-sm" onClick={()=>remove(a.id)}>USUŃ</button>
                </div>}
              </div>
              <div style={{marginTop:10,fontSize:13,color:"var(--gray)",lineHeight:1.6}}><strong style={{color:"var(--white)"}}>Powód:</strong> {a.powod}</div>
              <div style={{marginTop:8,display:"flex",gap:20,fontFamily:"'Share Tech Mono',monospace",fontSize:10,color:"var(--dim)"}}>
                <span>Podpisał: <span style={{color:"var(--gray)"}}>{a.podpisal}</span></span>
                <span>Data: <span style={{color:"var(--gray)"}}>{a.data}</span></span>
              </div>
            </div>
          );
        })}
        {akta.length===0&&<div style={{textAlign:"center",padding:48,color:"var(--gray)",fontFamily:"'Share Tech Mono',monospace",fontSize:12}}>Brak akt</div>}
      </div>
      {modal&&<AktaModal entry={modal.entry} isNew={modal.isNew} onSave={save} onClose={()=>setModal(null)} officers={officers} iadMembers={iadMembers}/>}
    </div>
  );
}

function RaportModal({ entry, onSave, onClose, isNew, officers }) {
  const today = new Date().toISOString().slice(0,10);
  const blank = {
    id:null, numer:"", imieNazwiskoFp:"", numerOdznakiFp:"", stopienFp:"",
    dotyczy:"", opisZdarzenia:"", dowody:"", oczekiwania:"",
    data:today, podpis:"", status:"pending"
  };
  const [form, setForm] = useState(entry||blank);
  const set=(k,v)=>setForm(f=>({...f,[k]:v}));

  const handleFpSelect = (name) => {
    const o = officers.find(x=>x.name===name);
    set("imieNazwiskoFp", name);
    if(o) { set("numerOdznakiFp", o.badge||""); set("stopienFp", o.rank||""); }
  };

  return (
    <div className="overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal" style={{maxWidth:750}}>
        <div className="modal-title">
          {isNew?"NOWY RAPORT IAD":"EDYTUJ RAPORT IAD"}
          {form.numer&&<span style={{fontSize:13,color:"var(--gray)",marginLeft:12}}>[{form.numer}]</span>}
        </div>
        <div style={{fontFamily:"'Oswald',sans-serif",fontSize:12,letterSpacing:2,color:"var(--gold)",margin:"4px 0 10px"}}>DANE FUNKCJONARIUSZA SKŁADAJĄCEGO RAPORT</div>
        <div className="form-row">
          <div className="fg"><label>Numer sprawy (IAD-XXX)</label><input placeholder="IAD-001" value={form.numer} onChange={e=>set("numer",e.target.value)}/></div>
          <div className="fg">
            <label>Imię i Nazwisko fp</label>
            <select value={form.imieNazwiskoFp} onChange={e=>handleFpSelect(e.target.value)}>
              <option value="">— wybierz funkcjonariusza —</option>
              {officers.map(o=><option key={o.id} value={o.name}>{o.name} ({o.nick}) · {o.rank}</option>)}
              <option value="__custom">✎ Wpisz ręcznie</option>
            </select>
          </div>
          {(form.imieNazwiskoFp==="__custom"||(form.imieNazwiskoFp&&!officers.find(o=>o.name===form.imieNazwiskoFp)))&&
            <div className="fg"><label>Imię i Nazwisko fp (ręcznie)</label><input value={form.imieNazwiskoFp==="__custom"?"":form.imieNazwiskoFp} onChange={e=>set("imieNazwiskoFp",e.target.value)}/></div>}
          <div className="fg"><label>Numer Odznaki fp</label><input value={form.numerOdznakiFp} onChange={e=>set("numerOdznakiFp",e.target.value)}/></div>
          <div className="fg"><label>Stopień w jedn. wewnętrznej</label><input value={form.stopienFp} onChange={e=>set("stopienFp",e.target.value)}/></div>
        </div>
        <div style={{fontFamily:"'Oswald',sans-serif",fontSize:12,letterSpacing:2,color:"var(--gold)",margin:"10px 0 8px"}}>TREŚĆ RAPORTU</div>
        <div className="form-row">
          <div className="fg" style={{gridColumn:"1/-1"}}><label>Dotyczy (Funkcjonariusz / Sytuacja)</label><input value={form.dotyczy} onChange={e=>set("dotyczy",e.target.value)}/></div>
        </div>
        <div className="fg" style={{marginBottom:10}}><label>Opis zdarzenia</label><textarea rows={4} value={form.opisZdarzenia} onChange={e=>set("opisZdarzenia",e.target.value)}/></div>
        <div className="fg" style={{marginBottom:10}}><label>Dowody rzeczowe (nagrania, dokumenty, świadkowie)</label><textarea rows={3} value={form.dowody} onChange={e=>set("dowody",e.target.value)}/></div>
        <div className="fg" style={{marginBottom:10}}><label>Oczekiwania / sugestia kary / zmiany</label><textarea rows={3} value={form.oczekiwania} onChange={e=>set("oczekiwania",e.target.value)}/></div>
        <div className="form-row">
          <div className="fg"><label>Data</label><input type="date" value={form.data} onChange={e=>set("data",e.target.value)}/></div>
          <div className="fg">
            <label>Podpis</label>
            <select value={form.podpis} onChange={e=>set("podpis",e.target.value)}>
              <option value="">— wybierz —</option>
              {officers.map(o=><option key={o.id} value={o.name}>{o.name} · {o.rank}</option>)}
              <option value="__custom">✎ Wpisz ręcznie</option>
            </select>
          </div>
          {(form.podpis==="__custom"||(form.podpis&&!officers.find(o=>o.name===form.podpis)))&&

        </div>
        <div className="modal-footer">
          <button className="btn btn-red btn-sm" onClick={onClose}>ANULUJ</button>

function IADRaportyView({ iadData, setIadData, isIadChief, isIadInspector, officers }) {
  const raporty = iadData.raporty || [];
  const setRaporty = (upd) => setIadData(d=>({...d, raporty: typeof upd==="function"?upd(d.raporty||[]):upd}));
  const [modal, setModal] = useState(null);
  const [detail, setDetail] = useState(null);

  const save = (form, discordAnnounce=false) => {
    if(modal.isNew) setRaporty(p=>[...p,{...form,id:Date.now()}]);
    else setRaporty(p=>p.map(x=>x.id===form.id?form:x));
    setModal(null);
  };
  const remove = id => { if(window.confirm("Usunąć raport?")) setRaporty(p=>p.filter(x=>x.id!==id)); };
  const updateStatus = (id, status) => setRaporty(p=>p.map(x=>x.id===id?{...x,status}:x));

  const statusCfg = {
    pending: { color:"var(--gray)", bg:"rgba(255,255,255,0.05)", border:"rgba(255,255,255,0.1)", label:"OCZEKUJE" },
    accepted:{ color:"#2ecc71",    bg:"rgba(46,204,113,0.08)",  border:"rgba(46,204,113,0.3)",  label:"ZAAKCEPTOWANY" },
    rejected:{ color:"#e74c3c",    bg:"rgba(231,76,60,0.08)",   border:"rgba(231,76,60,0.3)",   label:"ODRZUCONY" },
  };

  // Refresh detail when raporty change
  const detailRaport = detail ? raporty.find(r=>r.id===detail) : null;

  return (
    <div>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16,flexWrap:"wrap",gap:12}}>
        <div><div className="page-title">RAPORTY IAD</div><div className="page-sub">{raporty.length} RAPORTÓW</div></div>
        {isIadInspector&&<button className="btn btn-primary" onClick={()=>setModal({isNew:true})}>+ NOWY RAPORT</button>}
      </div>

      <div style={{display:"flex",flexDirection:"column",gap:8}}>
        {raporty.map(r=>{
          const sc = statusCfg[r.status||"pending"];
          return (
            <div key={r.id} onClick={()=>setDetail(r.id)} style={{
              display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:10,
              background:sc.bg,border:`1px solid ${sc.border}`,borderRadius:5,padding:"14px 18px",
              cursor:"pointer",transition:"all .15s",borderLeft:`3px solid ${sc.color}`
            }}
            onMouseEnter={e=>e.currentTarget.style.transform="translateX(3px)"}
            onMouseLeave={e=>e.currentTarget.style.transform=""}>
              <div>
                <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:3}}>
                  <span style={{fontFamily:"'Share Tech Mono',monospace",fontSize:11,color:"#c084fc",fontWeight:700}}>{r.numer||"IAD-???"}</span>
                  <span style={{fontFamily:"'Share Tech Mono',monospace",fontSize:10,color:sc.color,background:sc.bg,border:`1px solid ${sc.border}`,padding:"2px 8px",borderRadius:2,letterSpacing:1}}>{sc.label}</span>
                </div>
                <div style={{fontSize:14,color:"var(--white)",fontWeight:600}}>{r.dotyczy||"—"}</div>
                <div style={{fontFamily:"'Share Tech Mono',monospace",fontSize:10,color:"var(--dim)",marginTop:3}}>Złożył: {r.imieNazwiskoFp} · {r.data}</div>
              </div>
              <div style={{display:"flex",gap:6}} onClick={e=>e.stopPropagation()}>
                {isIadChief&&<button className="btn btn-red btn-sm" onClick={()=>remove(r.id)}>USUŃ</button>}
                <span style={{fontFamily:"'Share Tech Mono',monospace",fontSize:10,color:"var(--dim)",alignSelf:"center"}}>→ szczegóły</span>
              </div>
            </div>
          );
        })}
        {raporty.length===0&&<div style={{textAlign:"center",padding:48,color:"var(--gray)",fontFamily:"'Share Tech Mono',monospace",fontSize:12}}>Brak raportów</div>}
      </div>

      {modal&&<RaportModal entry={modal.entry} isNew={modal.isNew} onSave={save} onClose={()=>setModal(null)} officers={officers}/>}
      {detailRaport&&(
        <RaportDetail
          raport={detailRaport}
          isIadChief={isIadChief}
          onClose={()=>setDetail(null)}
          onUpdateStatus={(s)=>updateStatus(detailRaport.id,s)}
          onEdit={()=>{setModal({isNew:false,entry:detailRaport});setDetail(null);}}
        />
      )}
    </div>
  );
}

// ─── SWAT CLOCK ──────────────────────────────────────────────────────────────
function SWATClock() {
  const [t,setT] = useState(new Date());
  useEffect(()=>{ const i=setInterval(()=>setT(new Date()),1000); return ()=>clearInterval(i); },[]);
  return <span className="swat-time">{t.toLocaleString("pl-PL",{hour:"2-digit",minute:"2-digit",second:"2-digit",day:"2-digit",month:"2-digit",year:"numeric"})}</span>;
}

// ─── SWAT LOGIN MODAL ────────────────────────────────────────────────────────
function SWATLoginModal({ onLogin, onClose }) {
  const [login,setLogin]=useState(""); const [pass,setPass]=useState(""); const [err,setErr]=useState("");
  const submit = () => {
    const f = SWAT_CREDENTIALS.find(c=>c.login===login && c.password===pass);
    if(f) onLogin(f); else setErr("ODMOWA DOSTĘPU — NIEPRAWIDŁOWE DANE LOGOWANIA");
  };
  return (
    <div className="swat-modal-overlay">
      <style>{SWAT_CSS}</style>

          <div style={{fontSize:9,letterSpacing:4,color:"rgba(224,48,48,0.5)",marginTop:6}}>SPECIAL WEAPONS AND TACTICS</div>

        <div className="swat-field">
