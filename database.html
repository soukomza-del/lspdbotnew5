function LogView({ log, setLog, officers, isAdmin }) {
  const [search, setSearch] = useState("");
  const [showForm, setShowForm] = useState(false);
  const [detailLog, setDetailLog] = useState(null);

  // Formularz dostępny dla WSZYSTKICH (nie tylko admina)
  const today = new Date().toISOString().slice(0,10);
  const emptyForm = { name:"", date:today, start:"", end:"", hours:"", report:"" };
  const [form, setForm] = useState(emptyForm);
  const setF = (k,v) => setForm(f=>({...f,[k]:v}));

  const filtered = log.filter(l=>{ const q=search.toLowerCase(); return !q||l.name.toLowerCase().includes(q)||(l.report||"").toLowerCase().includes(q); });

  const [submitting, setSubmitting] = useState(false);
  const submit = async () => {
    if(!form.name||!form.hours){ alert("Wypełnij wymagane pola (funkcjonariusz + godziny)."); return; }
    setSubmitting(true);
    const newEntry = {...form, id: Date.now()};
    try {
      // Pobierz ŚWIEŻY log z Supabase tuż przed zapisem — zapobiega nadpisaniu
      const freshRes = await fetch(`${SUPABASE_URL}/rest/v1/lspd_data?id=eq.main&select=log_data`, {
        headers: { "apikey": SUPABASE_ANON, "Authorization": `Bearer ${SUPABASE_ANON}` }
      });
      const freshRows = freshRes.ok ? await freshRes.json() : [];
      const freshLog  = freshRows[0]?.log_data || [];

      // Zapisz świeży log + nowy wpis
      const patchRes = await fetch(`${SUPABASE_URL}/rest/v1/lspd_data?id=eq.main`, {
        method: "PATCH",
        headers: {
          "Content-Type":  "application/json",
          "apikey":        SUPABASE_ANON,
          "Authorization": `Bearer ${SUPABASE_ANON}`,
          "Prefer":        "return=minimal"
        },
        body: JSON.stringify({ log_data: [...freshLog, newEntry] })
      });
      if (!patchRes.ok) throw new Error(await patchRes.text());

      // Zaktualizuj UI natychmiast
      setLog(prev => {
        const ids = new Set(prev.map(l => l.id));
        const merged = [...prev];
        freshLog.forEach(l => { if (!ids.has(l.id)) merged.push(l); });
        if (!ids.has(newEntry.id)) merged.push(newEntry);
        return merged;
      });

      sendDiscordLog(discordEmbed(
        "📋 Dodano raport ze służby", null, 0x9b59b6,
        [
          { name: "Funkcjonariusz", value: form.name,                          inline: true  },
          { name: "Data",           value: form.date || "—",                   inline: true  },
          { name: "Godziny",        value: form.hours ? form.hours+"h" : "—",  inline: true  },
          { name: "Czas służby",    value: (form.start && form.end) ? `${form.start}–${form.end}` : "—", inline: true },
          { name: "Raport",         value: (form.report || "—").slice(0, 300), inline: false },
        ]
      ));
      setForm(emptyForm);
      setShowForm(false);
    } catch(e) {
      alert("Błąd zapisu raportu! Spróbuj ponownie. (" + e.message + ")");
    } finally {
      setSubmitting(false);
    }
  };
  const remove = id => {
    if(window.confirm("Usunąć wpis?")) {
      const entry = log.find(l=>l.id===id);
      setLog(p=>p.filter(l=>l.id!==id));
      if(entry) sendDiscordLog(discordEmbed(
        "🗑️ Usunięto wpis z dziennika",
        null,
        0xe67e22,
        [
          { name: "Funkcjonariusz", value: entry.name || "—", inline: true },
          { name: "Data",           value: entry.date || "—", inline: true },
          { name: "Godziny",        value: entry.hours ? entry.hours+"h" : "—", inline: true },
        ]
      ));
    }
  };

  return (
    <div>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8,flexWrap:"wrap",gap:12}}>
        <div><div className="page-title">DZIENNIK SŁUŻB</div><div className="page-sub">{log.length} WPISÓW</div></div>
        <button className="btn btn-primary" onClick={()=>setShowForm(s=>!s)}>
          {showForm ? "✕ ANULUJ" : "+ DODAJ RAPORT"}
        </button>
      </div>

      {showForm && (
        <div className="card" style={{marginBottom:20,border:"1px solid rgba(200,168,75,.2)"}}>
          <div style={{fontFamily:"'Oswald',sans-serif",fontSize:16,letterSpacing:3,color:"var(--gold)",marginBottom:16}}>NOWY RAPORT ZE SŁUŻBY</div>
          <div className="form-row">
            <div className="fg"><label>Funkcjonariusz *</label>
              <select value={form.name} onChange={e=>setF("name",e.target.value)}>
                <option value="">— wybierz —</option>
                {officers.map(o=><option key={o.id}>{o.name}</option>)}
              </select>
            </div>
            <div className="fg"><label>Data *</label><input type="date" value={form.date} onChange={e=>setF("date",e.target.value)}/></div>
          </div>
          <div className="form-row">
            <div className="fg"><label>Początek służby</label><input type="time" value={form.start} onChange={e=>setF("start",e.target.value)}/></div>
            <div className="fg"><label>Koniec służby</label><input type="time" value={form.end} onChange={e=>setF("end",e.target.value)}/></div>
            <div className="fg"><label>Liczba godzin *</label><input type="number" step="0.5" min="0" value={form.hours} onChange={e=>setF("hours",e.target.value)}/></div>
          </div>
          <div className="fg" style={{marginBottom:16}}><label>Raport ze służby</label><textarea rows={4} value={form.report} onChange={e=>setF("report",e.target.value)} placeholder="Opis przebiegu służby..."/></div>
          <div style={{display:"flex",gap:8}}>
            <button className="btn btn-primary" onClick={submit} disabled={submitting}>{submitting ? "ZAPISYWANIE..." : "ZAPISZ RAPORT"}</button>
            <button className="btn btn-red btn-sm" onClick={()=>{setShowForm(false);setForm(emptyForm);}}>ANULUJ</button>
          </div>
        </div>
      )}

      {detailLog && (
        <div className="overlay" onClick={e=>e.target===e.currentTarget&&setDetailLog(null)}>
          <div className="modal" style={{maxWidth:680}}>
            <div className="modal-title">RAPORT ZE SŁUŻBY</div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(160px,1fr))",gap:10,marginBottom:16}}>
              <div style={{background:"var(--card)",border:"1px solid var(--border)",borderRadius:4,padding:"10px 14px"}}>
                <div style={{fontFamily:"'Share Tech Mono',monospace",fontSize:9,color:"var(--gray)",letterSpacing:2,marginBottom:4}}>FUNKCJONARIUSZ</div>
                <div style={{fontWeight:700,color:"var(--white)"}}>{detailLog.name}</div>
              </div>
              <div style={{background:"var(--card)",border:"1px solid var(--border)",borderRadius:4,padding:"10px 14px"}}>
                <div style={{fontFamily:"'Share Tech Mono',monospace",fontSize:9,color:"var(--gray)",letterSpacing:2,marginBottom:4}}>DATA</div>
                <div style={{color:"var(--white)"}}>{detailLog.date}</div>
              </div>
              <div style={{background:"var(--card)",border:"1px solid var(--border)",borderRadius:4,padding:"10px 14px"}}>
                <div style={{fontFamily:"'Share Tech Mono',monospace",fontSize:9,color:"var(--gray)",letterSpacing:2,marginBottom:4}}>CZAS</div>
                <div style={{color:"var(--white)"}}>{detailLog.start&&detailLog.end?`${detailLog.start}–${detailLog.end}`:detailLog.start||"—"}</div>

              <div style={{background:"var(--card)",border:"1px solid var(--accent)",borderRadius:4,padding:"10px 14px"}}>
                <div style={{fontFamily:"'Share Tech Mono',monospace",fontSize:9,color:"var(--gray)",letterSpacing:2,marginBottom:4}}>GODZINY</div>
                <div style={{fontFamily:"'Share Tech Mono',monospace",fontWeight:700,color:"var(--accent)",fontSize:18}}>{detailLog.hours}h</div>

            </div>
            <div style={{fontFamily:"'Share Tech Mono',monospace",fontSize:10,color:"var(--gray)",letterSpacing:2,marginBottom:8}}>TREŚĆ RAPORTU</div>
            <div style={{fontSize:13,color:"var(--gray)",lineHeight:1.8,whiteSpace:"pre-wrap",background:"rgba(255,255,255,0.02)",border:"1px solid var(--border)",borderLeft:"3px solid var(--accent)",padding:"14px 16px",borderRadius:3,maxHeight:"50vh",overflowY:"auto"}}>{detailLog.report}</div>

      <div className="search-bar"><input className="search-input" placeholder="Szukaj po nazwisku lub treści..." value={search} onChange={e=>setSearch(e.target.value)}/></div>
      <div className="tbl-wrap">
        <table>

          <tbody>
            {[...filtered].reverse().map(l=>(
              <tr key={l.id} style={{cursor:"pointer"}} onClick={()=>setDetailLog(l)}>
                <td style={{fontFamily:"'Share Tech Mono',monospace",fontSize:11,whiteSpace:"nowrap"}}>{l.date}</td>
                <td style={{fontFamily:"'Share Tech Mono',monospace",fontSize:11,color:"var(--accent)"}}>{(()=>{const o=officers.find(o=>o.name===l.name);return o?.badge?"#"+o.badge:"—";})()}</td>

        ))}
      </div>
    </div>
  );
}

// ─── KALENDARZ URLOPÓW ────────────────────────────────────────────────────────
function KalendarzUrlopow({ officers }) {
  const today = new Date();
  const [year,  setYear]  = useState(today.getFullYear());
  const [month, setMonth] = useState(today.getMonth()); // 0-11
  const [tooltip, setTooltip] = useState(null);
  const [expanded, setExpanded] = useState(null); // key "day" dla rozwiniętej komórki

  const MONTHS_PL = ["Styczeń","Luty","Marzec","Kwiecień","Maj","Czerwiec",
                     "Lipiec","Sierpień","Wrzesień","Październik","Listopad","Grudzień"];
  const DAYS_PL   = ["Pon","Wto","Śro","Czw","Pią","Sob","Nie"];

  // Parsuj datę — obsługuje d/m/Y, d.m.Y, d/m/yy, d.m.yy
  function parseDate(str) {
    if(!str) return null;
    const s = str.trim().replace(/\./g, "/");
    const parts = s.split("/");
    if(parts.length !== 3) return null;
    let [d, m, y] = parts.map(Number);
    if(!d || !m || !y) return null;
    if(y < 100) y += 2000; // 26 → 2026
    return new Date(y, m-1, d);
  }

  // Zbierz wszystkich na urlopie z datami
  const leaveEntries = officers
    .filter(o => o.onLeave)
    .map((o, i) => {
      const endDate   = o.leaveEndDate   ? parseDate(o.leaveEndDate)   : null;
      const startDate = o.leaveStartDate ? parseDate(o.leaveStartDate) : null;
      const hue = ((o.id || i) * 137 + 30) % 360;
      return { name: o.name || "—", nick: o.nick || "", rank: o.rank || "", startDate, endDate, hue, noDate: !endDate };
    });

  // Buduj siatkę dni miesiąca
  const firstDay = new Date(year, month, 1);
  const lastDay  = new Date(year, month+1, 0);
  const totalDays = lastDay.getDate();

  let startDow = firstDay.getDay() - 1;
  if(startDow < 0) startDow = 6;

  function prevMonth() {
    if(month === 0) { setMonth(11); setYear(y => y-1); }
    else setMonth(m => m-1);
  }
  function nextMonth() {
    if(month === 11) { setMonth(0); setYear(y => y+1); }
    else setMonth(m => m+1);
  }

  // Znajdź urlopy na dany dzień
  function getEntriesForDay(day) {
    const date = new Date(year, month, day);
    date.setHours(12);
    return leaveEntries.filter(e => {
      if(e.noDate) return false; // brak daty — nie pokazuj na kalendarzu (tylko w legendzie)
      if(e.startDate) {
        const start = new Date(e.startDate); start.setHours(0);
        const end   = new Date(e.endDate);   end.setHours(23);
        return date >= start && date <= end;
      } else {
        const end = new Date(e.endDate); end.setHours(23);
        const endStart = new Date(e.endDate); endStart.setHours(0);
        return date >= endStart && date <= end;
      }
    });
  }

  function isToday(day) {
    return day === today.getDate() && month === today.getMonth() && year === today.getFullYear();
  }

  // Buduj komórki
  const cells = [];
  for(let i = 0; i < startDow; i++) cells.push(null);
  for(let d = 1; d <= totalDays; d++) cells.push(d);

  // Statystyki miesięczne — osoby z datami w tym miesiącu + osoby bez dat (zawsze)
  const onLeaveThisMonth = leaveEntries.filter(e => {
    if(e.noDate) return true; // brak daty — zawsze pokazuj
    const end   = e.endDate;
    const start = e.startDate || new Date(year, month, 1);
    return end >= new Date(year, month, 1) && start <= new Date(year, month+1, 0);
  });

  return (
    <div style={{padding:"28px 24px",maxWidth:1100,margin:"0 auto"}}>
      {/* Nagłówek */}
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:28,flexWrap:"wrap",gap:12}}>
        <div>
          <div style={{fontFamily:"'Oswald',sans-serif",fontSize:26,fontWeight:700,letterSpacing:4,color:"var(--gold)"}}>
            KALENDARZ URLOPÓW
          </div>
          <div style={{fontFamily:"'Share Tech Mono',monospace",fontSize:11,color:"var(--dim)",letterSpacing:2,marginTop:4}}>
            {onLeaveThisMonth.length > 0
              ? `${onLeaveThisMonth.length} FUNKCJONARIUSZ${onLeaveThisMonth.length===1?"":"Y/ÓW"} NA URLOPIE W TYM MIESIĄCU`
              : "BRAK URLOPÓW W TYM MIESIĄCU"}
          </div>
        </div>
        {/* Nawigacja */}
        <div style={{display:"flex",alignItems:"center",gap:12}}>
          <button onClick={prevMonth} style={{background:"none",border:"1px solid var(--border)",color:"var(--gray)",fontFamily:"'Oswald',sans-serif",fontSize:18,width:36,height:36,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>‹</button>
          <div style={{fontFamily:"'Oswald',sans-serif",fontSize:20,fontWeight:600,letterSpacing:3,color:"var(--white)",minWidth:220,textAlign:"center"}}>
            {MONTHS_PL[month].toUpperCase()} {year}
          </div>
          <button onClick={nextMonth} style={{background:"none",border:"1px solid var(--border)",color:"var(--gray)",fontFamily:"'Oswald',sans-serif",fontSize:18,width:36,height:36,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>›</button>
          <button onClick={()=>{setMonth(today.getMonth());setYear(today.getFullYear());}}
            style={{background:"rgba(200,168,75,0.1)",border:"1px solid var(--gold)",color:"var(--gold)",fontFamily:"'Oswald',sans-serif",fontSize:11,letterSpacing:2,padding:"6px 14px",cursor:"pointer"}}>
            DZIŚ
          </button>
        </div>
      </div>

      {/* Legenda urlopowanych */}
      {onLeaveThisMonth.length > 0 && (
        <div style={{display:"flex",flexWrap:"wrap",gap:8,marginBottom:20}}>
          {onLeaveThisMonth.map((e,i) => (
            <div key={i} style={{display:"flex",alignItems:"center",gap:6,padding:"4px 10px",background:`hsla(${e.hue},60%,50%,0.1)`,border:`1px solid hsla(${e.hue},60%,50%,0.4)`,borderRadius:3}}>
              <div style={{width:10,height:10,borderRadius:"50%",background:`hsl(${e.hue},60%,55%)`}}/>
              <span style={{fontFamily:"'Share Tech Mono',monospace",fontSize:10,color:`hsl(${e.hue},60%,70%)`}}>{e.name}</span>
              <span style={{fontFamily:"'Share Tech Mono',monospace",fontSize:9,color:"var(--dim)"}}>
                {e.noDate ? "⚠ brak daty" : `do ${e.endDate.toLocaleDateString("pl-PL")}`}
              </span>
            </div>
          ))}
        </div>
      )}

      {/* Siatka kalendarza */}
      <div style={{border:"1px solid var(--border)",borderRadius:4,overflow:"hidden"}}>
        {/* Nagłówki dni tygodnia */}
        <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",background:"rgba(200,168,75,0.06)",borderBottom:"1px solid var(--border)"}}>
          {DAYS_PL.map(d => (
            <div key={d} style={{padding:"10px 0",textAlign:"center",fontFamily:"'Oswald',sans-serif",fontSize:11,letterSpacing:3,color:"var(--gold)",fontWeight:600}}>
              {d}
            </div>
          ))}
        </div>

        {/* Komórki dni */}
        <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)"}}>
          {cells.map((day, idx) => {
            if(!day) return (
              <div key={`empty-${idx}`} style={{minHeight:90,background:"rgba(0,0,0,0.2)",borderRight:"1px solid var(--border)",borderBottom:"1px solid var(--border)"}}/>
            );
            const entries = getEntriesForDay(day);
            const tod = isToday(day);
            const cellKey = `${year}-${month}-${day}`;
            const isExpanded = expanded === cellKey;
            const visibleEntries = isExpanded ? entries : entries.slice(0,2);
            const hiddenCount = entries.length - 2;
            return (
              <div key={day}
                style={{
                  minHeight:90,
                  borderRight:"1px solid var(--border)",
                  borderBottom:"1px solid var(--border)",
                  background: tod ? "rgba(200,168,75,0.07)" : "transparent",
                  padding:"6px 4px 4px 6px",
                  position:"relative",
                  transition:"background .15s",
                }}
                onMouseEnter={entries.length > 0 && !isExpanded ? (ev) => {
                  const rect = ev.currentTarget.getBoundingClientRect();
                  setTooltip({x: rect.left, y: rect.bottom + window.scrollY, entries, day});
                } : undefined}
                onMouseLeave={() => setTooltip(null)}
              >
                {/* Numer dnia */}
                <div style={{
                  fontFamily:"'Share Tech Mono',monospace",
                  fontSize:12,
                  fontWeight: tod ? 700 : 400,
                  color: tod ? "var(--gold)" : entries.length > 0 ? "var(--white)" : "var(--dim)",
                  marginBottom:4,
                  display:"flex",
                  alignItems:"center",
                  gap:4,
                }}>
                  {tod && <span style={{width:6,height:6,borderRadius:"50%",background:"var(--gold)",display:"inline-block"}}/>}
                  {day}
                </div>

                {/* Paski urlopów */}
                <div style={{display:"flex",flexDirection:"column",gap:2}}>
                  {visibleEntries.map((e,i) => (
                    <div key={i} style={{
                      background:`hsl(${e.hue},55%,35%)`,
                      borderLeft:`3px solid hsl(${e.hue},65%,55%)`,
                      padding:"2px 5px",
                      borderRadius:2,
                      fontFamily:"'Share Tech Mono',monospace",
                      fontSize:9,
                      color:`hsl(${e.hue},80%,85%)`,
                      whiteSpace:"nowrap",
                      overflow:"hidden",
                      textOverflow:"ellipsis",
                      letterSpacing:0.5,
                    }}>
                      {e.name.split(" ")[0]}
                    </div>
                  ))}
                  {/* Przycisk rozwijania */}
                  {entries.length > 2 && (
                    <div
                      onClick={e=>{ e.stopPropagation(); setExpanded(isExpanded ? null : cellKey); setTooltip(null); }}
                      style={{
                        fontFamily:"'Share Tech Mono',monospace",
                        fontSize:8,
                        color: isExpanded ? "var(--gold)" : "var(--accent)",
                        paddingLeft:4,
                        cursor:"pointer",
                        marginTop:1,
                        letterSpacing:0.5,
                      }}
                    >
                      {isExpanded ? "▲ zwiń" : `▼ +${hiddenCount} więcej`}
                    </div>
                  )}
                </div>
              </div>
            );
          })}
        </div>
      </div>

      {/* Tooltip */}
      {tooltip && (
        <div style={{
          position:"fixed",
          left: Math.min(tooltip.x, window.innerWidth - 260),
          top: tooltip.y + 8,
          background:"#0d1829",
          border:"1px solid var(--border)",
          borderRadius:6,
          padding:"12px 16px",
          zIndex:9999,
          minWidth:220,
          boxShadow:"0 8px 32px rgba(0,0,0,0.6)",
          pointerEvents:"none",
        }}>
          <div style={{fontFamily:"'Oswald',sans-serif",fontSize:11,letterSpacing:3,color:"var(--gold)",marginBottom:10}}>
            {tooltip.day} {MONTHS_PL[month]} {year}
          </div>
          {tooltip.entries.map((e,i) => (
            <div key={i} style={{display:"flex",flexDirection:"column",gap:2,marginBottom:10,paddingBottom:10,borderBottom: i < tooltip.entries.length-1 ? "1px solid var(--border)" : "none"}}>
              <div style={{display:"flex",alignItems:"center",gap:6}}>
                <div style={{width:8,height:8,borderRadius:"50%",background:`hsl(${e.hue},60%,55%)`,flexShrink:0}}/>
                <span style={{fontFamily:"'Share Tech Mono',monospace",fontSize:11,color:"var(--white)",fontWeight:700}}>{e.name}</span>
              </div>
              <div style={{fontFamily:"'Share Tech Mono',monospace",fontSize:9,color:"var(--dim)",paddingLeft:14,letterSpacing:1}}>
                {e.rank}
              </div>
              <div style={{fontFamily:"'Share Tech Mono',monospace",fontSize:9,color:"var(--dim)",paddingLeft:14}}>
                {e.startDate ? `${e.startDate.toLocaleDateString("pl-PL")} — ` : "do "}
                <span style={{color:`hsl(${e.hue},60%,70%)`}}>{e.endDate.toLocaleDateString("pl-PL")}</span>
              </div>
            </div>
          ))}
        </div>
      )}

      {/* Brak urlopujących */}
      {leaveEntries.length === 0 && (
        <div style={{textAlign:"center",padding:"48px 0",fontFamily:"'Share Tech Mono',monospace",fontSize:12,color:"var(--dim)",letterSpacing:2}}>
          BRAK AKTYWNYCH URLOPÓW W SYSTEMIE
        </div>
      )}
    </div>
  );
}

function App() {
  const [loading,    setLoading]    = useState(true);
  const [showLogin,  setShowLogin]  = useState(false);
  const [saveStatus, setSaveStatus] = useState("idle");

  // Sesja — zapamiętana w sessionStorage (trwa do zamknięcia karty)
  const [admin, setAdminRaw] = useState(() => {
    try { const s = sessionStorage.getItem("lspd-session"); return s ? JSON.parse(s) : null; } catch { return null; }
  });
  const setAdmin = (user) => {
    setAdminRaw(user);
    try { user ? sessionStorage.setItem("lspd-session", JSON.stringify(user)) : sessionStorage.removeItem("lspd-session"); } catch {}
  };

  // Aktywna zakładka — zapamiętana w sessionStorage
  const [page, setPageRaw] = useState(() => {
    try { return sessionStorage.getItem("lspd-page") || "dashboard"; } catch { return "dashboard"; }
  });
  const setPage = (p) => {
    setPageRaw(p);
    try { sessionStorage.setItem("lspd-page", p); } catch {}
  };

  const [officers, setOfficersRaw] = useState([]);
  const [log,      setLogRaw]      = useState([]);
  const [regs,     setRegsRaw]     = useState([]);
  const [ftdData,  setFtdDataRaw]  = useState({fto:[], assignments:[]});
  const [iadData,  setIadDataRaw]  = useState({members:[], akta:[], raporty:[]});
  const [dtuData,  setDtuDataRaw]  = useState({members:[], kartoteka:[], sprawy:[]});
  const [swatData, setSwatDataRaw] = useState({members:[], raporty:[], akcje:[]});
  const [showUnitsMenu, setShowUnitsMenu] = useState(false);
  const [showFtdLogin,  setShowFtdLogin]  = useState(false);
  const [showIadLogin,  setShowIadLogin]  = useState(false);
  const [showDtuLogin,  setShowDtuLogin]  = useState(false);
  const [showSwatLogin, setShowSwatLogin] = useState(false);
  const [ftdAdmin,      setFtdAdmin]      = useState(null);
  const [swatAdmin,     setSwatAdminRaw] = useState(() => {
    try { const s = sessionStorage.getItem("lspd-swat-session"); return s ? JSON.parse(s) : null; } catch { return null; }
  });
  const setSwatAdmin = (user) => {
    setSwatAdminRaw(user);
    try { user ? sessionStorage.setItem("lspd-swat-session", JSON.stringify(user)) : sessionStorage.removeItem("lspd-swat-session"); } catch {}
  };
  const [dtuAdmin,      setDtuAdminRaw]  = useState(() => {
    try { const s = sessionStorage.getItem("lspd-dtu-session"); return s ? JSON.parse(s) : null; } catch { return null; }
  });
  const setDtuAdmin = (user) => {
    setDtuAdminRaw(user);
    try { user ? sessionStorage.setItem("lspd-dtu-session", JSON.stringify(user)) : sessionStorage.removeItem("lspd-dtu-session"); } catch {}
  };
  const [iadAdmin,      setIadAdminRaw]  = useState(() => {
    try { const s = sessionStorage.getItem("lspd-iad-session"); return s ? JSON.parse(s) : null; } catch { return null; }
  });
  const setIadAdmin = (user) => {
    setIadAdminRaw(user);
    try { user ? sessionStorage.setItem("lspd-iad-session", JSON.stringify(user)) : sessionStorage.removeItem("lspd-iad-session"); } catch {}
  };

  // Refs żeby mieć zawsze aktualne wartości w callbackach
  const officersRef = useRef([]);
  const logRef      = useRef([]);
  const regsRef     = useRef([]);
  const ftdRef      = useRef({fto:[], assignments:[]});
  const iadRef      = useRef({members:[], akta:[], raporty:[]});
  const dtuRef      = useRef({members:[], kartoteka:[], sprawy:[]});
  const swatRef     = useRef({members:[], raporty:[], akcje:[]});

  // Refy aktualizowane synchronicznie wewnątrz setterów — nie przez useEffect
  // (useEffect odpala się po renderze, co powoduje race condition przy równoległych zapisach)

  // Ładowanie danych
  useEffect(() => {
    if (!USE_CLOUD) { setLoading(false); return; }
    dbApi.load()
      .then(data => {
        const officers = (Array.isArray(data.officers) && data.officers.length > 0) ? data.officers : INIT.officers;
        const log      = data.log      || INIT.log;
        const ftd      = data.ftd      || {fto:[], assignments:[]};
        const iad      = data.iad      || {members:[], akta:[], raporty:[]};
        const dtu      = data.dtu      || {members:[], kartoteka:[], sprawy:[]};
        const swat     = data.swat     || {members:[], raporty:[], akcje:[]};
        // Ustaw refy synchronicznie razem ze stanem — zapobiega race condition
        officersRef.current = officers;
        logRef.current      = log;
        ftdRef.current      = ftd;
        iadRef.current      = iad;
        dtuRef.current      = dtu;
        swatRef.current     = swat;
        // ─────────────────────────────────────────────────────────────────
        const finalOfficers = officers;
        const finalLog = log;
        setOfficersRaw(finalOfficers);
        setLogRaw(finalLog);
        setFtdDataRaw(ftd);
        setIadDataRaw(iad);
        setDtuDataRaw(dtu);
        setSwatDataRaw(swat);
        // Inicjalizuj prevRef natychmiast — żeby WebSocket nie robił false positive
        prevRef.current = { officers: finalOfficers, log: finalLog, ftd, iad, dtu, swat };
        setLoading(false);
      })
      .catch(e => {
        console.error("Supabase load error:", e);
        alert("Błąd połączenia z Supabase. Sprawdź konfigurację (SUPABASE_URL i SUPABASE_ANON).");
        setLoading(false);
      });
  }, []);

  // Auto-save z debounce
  const saveTimer = useRef(null);
  // ── Ref blokujący WebSocket przed nadpisaniem stanu podczas trwającego zapisu ──
  // Klucz = nazwa pola (np. "officers"), wartość = timestamp końca blokady
  const pendingSaveRef = useRef({});

  // ── Pomocnik: debounced zapis tylko JEDNEJ kolumny — zero race condition ──────
  const saveField = useCallback((field, value) => {
    if (!USE_CLOUD) return;
    setSaveStatus("saving");
    // Zablokuj WebSocket na 3 sekundy dla tego pola — zapobiega cofnięciu zmiany
    pendingSaveRef.current[field] = Date.now() + 3000;
    dbApi.saveField(field, value)
      .then(() => {
        setSaveStatus("saved");
        // Przedłuż blokadę jeszcze o 1s po zapisie (WebSocket może przyjść z opóźnieniem)
        pendingSaveRef.current[field] = Date.now() + 1000;
        setTimeout(() => setSaveStatus("idle"), 2000);
      })
      .catch(e => {
        console.error(`Supabase saveField[${field}] error:`, e);
        delete pendingSaveRef.current[field];
        setSaveStatus("error");
        setTimeout(() => setSaveStatus("idle"), 3000);
      });
  }, []);

  // Zachowane dla kompatybilności wstecznej (nie używane przez settery)
  const save = useCallback(() => {}, []);

  // ── SUPABASE REALTIME — natychmiastowe aktualizacje przez WebSocket ──────
  const [toasts, setToasts] = useState([]);
  const addToast = useCallback((msg, type="info") => {
    const id = Date.now() + Math.random();
    setToasts(p => [...p, { id, msg, type }]);
    setTimeout(() => setToasts(p => p.filter(t => t.id !== id)), 5000);
  }, []);

  // Refy do porównywania poprzednich stanów (nie triggerują re-renderu)
  const prevRef = useRef({ officers:[], log:[], ftd:{}, iad:{}, dtu:{}, swat:{} });

  // ── Generuj toasty na podstawie różnicy prev→next ─────────────────────────
  const diffToasts = useCallback((field, prev, next) => {
    if (field === "officers") {
      const po = prev || []; const no = next || [];
      // Jeśli poprzedni stan był pusty — to inicjalizacja, nie zmiana. Pomijamy.
      if (po.length === 0) return;
      if (JSON.stringify(po) === JSON.stringify(no)) return;
      const prevMap = Object.fromEntries(po.map(o => [o.id, o]));
      const newMap  = Object.fromEntries(no.map(o => [o.id, o]));
      const RANKS = ["Chief of Police","Assistant Chief","Deputy Chief","Commander","Captain","Lieutenant II","Lieutenant I","Master Sergeant","Staff Sergeant","Sergeant","Officer III+1","Officer III","Officer II","Officer I","Cadet"];
      no.filter(o => !prevMap[o.id]).forEach(o => addToast(`➕ Dodano: ${o.name}`, "officer"));
      po.filter(o => !newMap[o.id]).forEach(o => addToast(`🗑️ Usunięto: ${o.name}`, "fire"));
      no.filter(o => prevMap[o.id]).forEach(o => {
        const p = prevMap[o.id];
        if (p.rank !== o.rank) {
          const up = RANKS.indexOf(o.rank) < RANKS.indexOf(p.rank);
          addToast(`${up?"⬆️":"⬇️"} ${o.name}: ${p.rank} → ${o.rank}`, up ? "promo" : "demo");
        }
        if (p.suspended !== o.suspended) addToast(`${o.suspended?"⏸️ Zawieszono":"▶️ Odwieszono"}: ${o.name}`, "officer");
        if (p.onLeave !== o.onLeave)     addToast(`${o.onLeave?"🏖️ Urlop":"✅ Powrót z urlopu"}: ${o.name}`, "info");
        if (p.name !== o.name)           addToast(`✏️ Zmiana nazwy: ${p.name} → ${o.name}`, "officer");
      });
    } else if (field === "log") {
      const pl = prev || []; const nl = next || [];
      const prevIds = new Set(pl.map(l => l.id));
      nl.filter(l => !prevIds.has(l.id)).forEach(l => addToast(`📋 Nowy raport: ${l.name}`, "log"));
      if (nl.length < pl.length) addToast("🗑️ Usunięto wpis z dziennika", "info");
    } else if (field === "iad") {
      const prevAkta = (prev?.akta || []); const newAkta = (next?.akta || []);
      const prevIds = new Set(prevAkta.map(a => a.id));
      newAkta.filter(a => !prevIds.has(a.id)).forEach(a => addToast(`📁 Nowy wpis IAD: ${a.imieNazwisko} (${a.konsekwencja})`, "iad"));
    } else if (field === "dtu") {
      const pd = prev || {}; const nd = next || {};
      const prevSIds = new Set((pd.sprawy||[]).map(s => s.id));
      const prevKIds = new Set((pd.kartoteka||[]).map(k => k.id));
      (nd.sprawy||[]).filter(s => !prevSIds.has(s.id)).forEach(s => addToast(`🔍 Nowa sprawa DTU: ${s.nazwa||s.numer}`, "dtu"));
      (nd.kartoteka||[]).filter(k => !prevKIds.has(k.id)).forEach(k => addToast(`🔍 Nowy wpis kartoteki: ${k.imie} ${k.nazwisko}`, "dtu"));
      (nd.sprawy||[]).forEach(s => {
        const old = (pd.sprawy||[]).find(x => x.id === s.id);
        if (old && old.status !== s.status) addToast(`🔍 DTU ${s.numer||s.nazwa}: ${old.status} → ${s.status}`, "dtu");
      });
    } else if (field === "swat") {
      const ps = prev || {}; const ns = next || {};
      const prevAIds = new Set((ps.akcje||[]).map(a => a.id));
      const prevRIds = new Set((ps.raporty||[]).map(r => r.id));
      (ns.akcje||[]).filter(a => !prevAIds.has(a.id)).forEach(a => addToast(`⚡ Nowa akcja SWAT: ${a.title}`, "swat"));
      (ns.raporty||[]).filter(r => !prevRIds.has(r.id)).forEach(() => addToast(`📄 Nowy raport SWAT`, "swat"));
    } else if (field === "ftd") {
      const pf = prev || {}; const nf = next || {};
      const prevFIds = new Set((pf.fto||[]).map(f => f.id));
      (nf.fto||[]).filter(f => !prevFIds.has(f.id)).forEach(f => addToast(`🎓 Nowy FTO: ${f.name}`, "ftd"));
    }
  }, [addToast]);

  const setOfficers = useCallback(upd => {
    setOfficersRaw(prev => {
      const next = typeof upd === "function" ? upd(prev) : upd;
      officersRef.current = next;
      diffToasts("officers", prevRef.current.officers, next);
      prevRef.current = { ...prevRef.current, officers: next };
      saveField("officers", next);
      return next;
    });
  }, [saveField, diffToasts]);

  const setLog = useCallback(upd => {
    setLogRaw(prev => {
      const next = typeof upd === "function" ? upd(prev) : upd;
      logRef.current = next;
      diffToasts("log", prevRef.current.log, next);
      prevRef.current = { ...prevRef.current, log: next };
      saveField("log_data", next);
      return next;
    });
  }, [saveField, diffToasts]);

  const setRegs = useCallback(upd => {
    setRegsRaw(prev => {
      const next = typeof upd === "function" ? upd(prev) : upd;
      regsRef.current = next;
      return next;
    });
  }, [saveField]);

  const setFtdData = useCallback(upd => {
    setFtdDataRaw(prev => {
      const next = typeof upd === "function" ? upd(prev) : upd;
      ftdRef.current = next;
      diffToasts("ftd", prevRef.current.ftd, next);
      prevRef.current = { ...prevRef.current, ftd: next };
      saveField("ftd", next);
      return next;
    });
  }, [saveField, diffToasts]);

  const setIadData = useCallback(upd => {
    setIadDataRaw(prev => {
      const next = typeof upd === "function" ? upd(prev) : upd;
      iadRef.current = next;
      diffToasts("iad", prevRef.current.iad, next);
      prevRef.current = { ...prevRef.current, iad: next };
      saveField("iad", next);
      return next;
    });
  }, [saveField, diffToasts]);

  const setDtuData = useCallback(upd => {
    setDtuDataRaw(prev => {
      const next = typeof upd === "function" ? upd(prev) : upd;
      dtuRef.current = next;
      diffToasts("dtu", prevRef.current.dtu, next);
      prevRef.current = { ...prevRef.current, dtu: next };
      saveField("dtu", next);
      return next;
    });
  }, [saveField, diffToasts]);

  const setSwatData = useCallback(upd => {
    setSwatDataRaw(prev => {
      const next = typeof upd === "function" ? upd(prev) : upd;
      swatRef.current = next;
      diffToasts("swat", prevRef.current.swat, next);
      prevRef.current = { ...prevRef.current, swat: next };
      saveField("swat", next);
      return next;
    });
  }, [saveField, diffToasts]);

  useEffect(() => {
    if (!USE_CLOUD) return;

    // Supabase Realtime — nasłuchuj na zmiany wiersza id=main
    const supabaseWS = `${SUPABASE_URL.replace("https://","wss://")}/realtime/v1/websocket?apikey=${SUPABASE_ANON}&vsn=1.0.0`;
    let ws;
    let heartbeat;
    let reconnectTimer;
    let joined = false;

    const handleRow = (row) => {
      const prev = prevRef.current;

      const applyField = (field, rawKey, nextVal) => {
        const prevVal = prev[field];
        // Jeśli officers prev jest puste — prevRef nie jest jeszcze zainicjalizowany,
        // pomijamy diff żeby nie spamować toastami przy pierwszym WebSocket evencie
        if (field === "officers" && (prevVal || []).length === 0) {
          if ((nextVal || []).length > 0) {
            prevRef.current = { ...prevRef.current, officers: nextVal };
            setOfficersRaw(nextVal); officersRef.current = nextVal;
          }
          return;
        }
        // ── Blokada: jeśli właśnie trwa zapis tego pola — ignoruj WebSocket event ──
        // Zapobiega cofnięciu zmiany gdy Realtime przychodzi przed zakończeniem PATCH-a
        const lockUntil = pendingSaveRef.current[field];
        if (lockUntil && Date.now() < lockUntil) return;
        if (JSON.stringify(nextVal) === JSON.stringify(prevVal)) return;
        diffToasts(field, prevVal, nextVal);
        prevRef.current = { ...prevRef.current, [field]: nextVal };
        if (field === "officers") { setOfficersRaw(nextVal); officersRef.current = nextVal; }
        else if (field === "log")  { setLogRaw(nextVal);      logRef.current      = nextVal; }
        else if (field === "ftd")  { setFtdDataRaw(nextVal);  ftdRef.current      = nextVal; }
        else if (field === "iad")  { setIadDataRaw(nextVal);  iadRef.current      = nextVal; }
        else if (field === "dtu")  { setDtuDataRaw(nextVal);  dtuRef.current      = nextVal; }
        else if (field === "swat") { setSwatDataRaw(nextVal); swatRef.current     = nextVal; }
      };

      if (row.officers  !== undefined) applyField("officers", "officers",  row.officers  || []);
      if (row.log_data  !== undefined) applyField("log",      "log_data",  row.log_data  || []);
      if (row.ftd       !== undefined) applyField("ftd",      "ftd",       row.ftd       || {});
      if (row.iad       !== undefined) applyField("iad",      "iad",       row.iad       || {});
      if (row.dtu       !== undefined) applyField("dtu",      "dtu",       row.dtu       || {});
      if (row.swat      !== undefined) applyField("swat",     "swat",      row.swat      || {});
    };

    const connect = () => {
      ws = new WebSocket(supabaseWS);

      ws.onopen = () => {
        // Dołącz do kanału realtime
        ws.send(JSON.stringify({
          topic: "realtime:public:lspd_data:id=eq.main",
          event: "phx_join",
          payload: { config: { broadcast: { self: false }, presence: { key: "" }, postgres_changes: [{ event: "UPDATE", schema: "public", table: "lspd_data", filter: "id=eq.main" }] } },
          ref: "1"
        }));
        joined = true;
        // Heartbeat co 30s
        heartbeat = setInterval(() => {
          if (ws.readyState === WebSocket.OPEN) {
            ws.send(JSON.stringify({ topic: "phoenix", event: "heartbeat", payload: {}, ref: "hb" }));
          }
        }, 30000);
      };

      ws.onmessage = (e) => {
        try {
          const msg = JSON.parse(e.data);
          if (msg.event === "postgres_changes" && msg.payload?.data?.record) {
            handleRow(msg.payload.data.record);
          }
        } catch {}
      };

      ws.onclose = () => {
        clearInterval(heartbeat);
        joined = false;
        // Reconnect po 3s
        reconnectTimer = setTimeout(connect, 3000);
      };

      ws.onerror = () => { ws.close(); };
    };

    connect();

    return () => {
      clearTimeout(reconnectTimer);
      clearInterval(heartbeat);
      if (ws) { joined = false; ws.close(); }
    };
  }, [addToast]);

  const PAGES = [
    {id:"officers",   label:"Funkcjonariusze"},
    {id:"log",        label:"Dziennik"},
    {id:"kalendarz",  label:"Kalendarz urlopów"},
    {id:"wyplaty",    label:"💰 Wypłaty"},
  ];

  const UNITS = [
    {id:"dtu",  label:"DTU",  available:true},
    {id:"swat", label:"SWAT", available:true},
    {id:"ftd",  label:"FTD",  available:true},
    {id:"iad",  label:"IAD",  available:true},
  ];

  // ftdAdmin — zalogowany do FTD (lub zarząd)
  const isFtdAdmin = !!(ftdAdmin || admin);
  // iadAdmin role checks
  const isIadChief = !!(admin || (iadAdmin && (iadAdmin.iadRole==="Chief of IAD"||iadAdmin.iadRole==="Assistant Chief of IAD")));
  const isIadInspector = !!(isIadChief || (iadAdmin && (iadAdmin.iadRole==="Inspector II"||iadAdmin.iadRole==="Inspector")));
  // Raporty widoczne dla KAŻDEGO zalogowanego jako IAD (inspector, asst chief, chief) lub zarząd
  const isIadAuthorized = !!(admin || iadAdmin);

  const handleUnitClick = (unit) => {
    setShowUnitsMenu(false);
    if(!unit.available) return;
    if(unit.id === "dtu") {
      if(dtuAdmin || admin) { setPage("dtu"); }
      else { setShowDtuLogin(true); }
      return;
    }
    if(unit.id === "swat") {
      if(swatAdmin || admin) { setPage("swat"); }
      else { setShowSwatLogin(true); }
      return;
    }
    setPage(unit.id);
  };

  if (loading) return (
    <>
      <style>{CSS}</style>
      <div className="loading-wrap">
        <div className="loading-logo">LSPD</div>
        <div className="loading-bar"><div className="loading-inner"/></div>
        <div className="loading-text">"Łączenie z Supabase..."</div>
      </div>
    </>
  );

  return (
    <>
      <style>{CSS}</style>
      <SaveIndicator status={saveStatus}/>
      {showLogin&&<LoginModal onLogin={u=>{setAdmin(u);setShowLogin(false);}} onClose={()=>setShowLogin(false)}/>}
      {showFtdLogin&&<FTDLoginModal onLogin={u=>{setFtdAdmin(u);setShowFtdLogin(false);}} onClose={()=>setShowFtdLogin(false)}/>}
      {showIadLogin&&<IADLoginModal onLogin={u=>{setIadAdmin(u);setShowIadLogin(false);}} onClose={()=>setShowIadLogin(false)}/> }
      {showDtuLogin&&<DTULoginModal onLogin={u=>{setDtuAdmin(u);setShowDtuLogin(false);setPage("dtu");}} onClose={()=>setShowDtuLogin(false)}/>}
      {showSwatLogin&&<SWATLoginModal onLogin={u=>{setSwatAdmin(u);setShowSwatLogin(false);setPage("swat");}} onClose={()=>setShowSwatLogin(false)}/>}

      <div className="app">
        <header className="topbar">
          <div className="topbar-stripe"/>
          <div className="topbar-inner">
            <div style={{cursor:"pointer",flexShrink:0}} onClick={()=>setPage("dashboard")}>
              <div className="topbar-logo">LSPD</div>
              <div className="topbar-sub">Database ☁</div>
            </div>
            <a className="back-btn" href="index2.html">← MENU</a>
            <nav className="topbar-nav">
              {PAGES.map(p=>(
                <button key={p.id} className={`nav-btn ${page===p.id?"active":""}`} onClick={()=>setPage(p.id)}>{p.label}</button>
              ))}
              <div style={{position:"relative"}}>
                <button
                  className={`nav-btn ${UNITS.some(u=>u.id===page)?"active":""}`}
                  onClick={()=>setShowUnitsMenu(s=>!s)}
                  style={{display:"flex",alignItems:"center",gap:4}}
                >
                  UNITS <span style={{fontSize:9}}>{showUnitsMenu?"▲":"▼"}</span>
                </button>
                {showUnitsMenu&&(
                  <div style={{position:"absolute",top:"100%",left:0,background:"#0d1829",border:"1px solid var(--border)",borderRadius:4,minWidth:130,zIndex:300,overflow:"hidden"}} onMouseLeave={()=>setShowUnitsMenu(false)}>
                    {UNITS.map(u=>(
                      <button key={u.id} onClick={()=>handleUnitClick(u)} style={{
                        display:"block",width:"100%",textAlign:"left",
                        padding:"10px 16px",background:"none",border:"none",
                        fontFamily:"'Oswald',sans-serif",fontSize:12,letterSpacing:2,
                        color: u.available ? (page===u.id?"var(--gold)":"var(--white)") : "var(--dim)",
                        cursor: u.available ? "pointer" : "not-allowed",
                        borderBottom:"1px solid var(--border)",
                      }}>
                        {u.label} {!u.available&&<span style={{fontSize:9,color:"var(--dim)"}}>— WKRÓTCE</span>}
                      </button>
                    ))}
                  </div>
                )}
              </div>
            </nav>
            <div className="topbar-auth">
              <span className={`status-dot ${(admin||ftdAdmin||iadAdmin)?"dot-on":"dot-off"}`}/>
              {admin
                ? <><span style={{fontFamily:"'Share Tech Mono',monospace",fontSize:11,color:"var(--gold)"}}>{admin.role}</span><button className="btn btn-red btn-sm" onClick={()=>setAdmin(null)}>WYLOGUJ</button></>
                : ftdAdmin
                  ? <><span style={{fontFamily:"'Share Tech Mono',monospace",fontSize:11,color:"var(--accent)"}}>{ftdAdmin.role}</span><button className="btn btn-red btn-sm" onClick={()=>setFtdAdmin(null)}>WYLOGUJ</button></>
                  : iadAdmin
                    ? <><span style={{fontFamily:"'Share Tech Mono',monospace",fontSize:11,color:"#c084fc"}}>{iadAdmin.role}</span><button className="btn btn-red btn-sm" onClick={()=>setIadAdmin(null)}>WYLOGUJ</button></>
                    : dtuAdmin
                      ? <><span style={{fontFamily:"'Share Tech Mono',monospace",fontSize:11,color:"#00ff41"}}>{dtuAdmin.role}</span><button className="btn btn-red btn-sm" onClick={()=>{setDtuAdmin(null);setPage("dashboard");}}>WYLOGUJ</button></>
                      : swatAdmin
                        ? <><span style={{fontFamily:"'Share Tech Mono',monospace",fontSize:11,color:"#e03030"}}>{swatAdmin.role}</span><button className="btn btn-red btn-sm" onClick={()=>{setSwatAdmin(null);setPage("dashboard");}}>WYLOGUJ</button></>
                    : <div style={{display:"flex",gap:6}}>
                        <button className="btn btn-gold btn-sm" onClick={()=>setShowLogin(true)}>ZARZĄD</button>
                        <button className="btn btn-sm" style={{border:"1px solid var(--accent)",color:"var(--accent)",background:"rgba(30,95,196,0.1)"}} onClick={()=>setShowFtdLogin(true)}>FTD</button>
                        <button className="btn btn-sm" style={{border:"1px solid #c084fc",color:"#c084fc",background:"rgba(128,0,128,0.1)"}} onClick={()=>setShowIadLogin(true)}>IAD</button>
                        <button className="btn btn-sm" style={{border:"1px solid #00ff41",color:"#00ff41",background:"rgba(0,255,65,0.07)"}} onClick={()=>setShowDtuLogin(true)}>DTU</button>
                        <button className="btn btn-sm" style={{border:"1px solid #e03030",color:"#e03030",background:"rgba(224,48,48,0.08)"}} onClick={()=>setShowSwatLogin(true)}>SWAT</button>
                      </div>
              }
            </div>
          </div>
        </header>

        <main className="main" style={(page==="dtu"||page==="swat")?{padding:0,background:"#000"}:{}}>
          {page==="dtu" && (dtuAdmin||admin)
            ? <DTUView dtuAdmin={dtuAdmin||{role:"Zarząd",badge:"ZRZ",dtuRole:"DTU Admin"}} onLogout={()=>{setDtuAdmin(null);setPage("dashboard");}} dtuData={dtuData} setDtuData={setDtuData} officers={officers||[]}/>
            : page==="dtu"
              ? <div style={{padding:48,textAlign:"center",color:"var(--dim)",fontFamily:"'Share Tech Mono',monospace"}}>BRAK DOSTĘPU — WYMAGANE LOGOWANIE DTU</div>
              : null}
          {page==="swat" && (swatAdmin||admin)
            ? <SWATView swatAdmin={swatAdmin||{role:"Zarząd",badge:"ZRZ",swatRole:"Commander"}} onLogout={()=>{setSwatAdmin(null);setPage("dashboard");}} swatData={swatData} setSwatData={setSwatData} officers={officers||[]}/>
            : page==="swat"
              ? <div style={{padding:48,textAlign:"center",color:"#e03030",fontFamily:"'Share Tech Mono',monospace",background:"#0b0d11",minHeight:"100vh"}}>BRAK DOSTĘPU — WYMAGANE LOGOWANIE SWAT</div>
              : null}
          {page!=="dtu" && page!=="swat" && <>
            {page==="dashboard"   && <Dashboard    officers={officers} log={log} iadData={iadData} ftdData={ftdData} onNavigate={setPage}/>}
            {page==="officers"    && <OfficersView officers={officers} setOfficers={setOfficers} isAdmin={!!admin} log={log||[]}/>}
            {page==="log"         && <LogView      log={log} setLog={setLog} officers={officers} isAdmin={!!admin}/>}
            {page==="kalendarz"   && <KalendarzUrlopow officers={officers||[]}/> }
            {page==="wyplaty"     && <WyplatyView  officers={officers||[]} log={log||[]} iadData={iadData} ftdData={ftdData} swatData={swatData} dtuData={dtuData}/>}
            {page==="ftd"         && <FTDView      ftdData={ftdData} setFtdData={setFtdData} isFtdAdmin={isFtdAdmin} officers={officers}/>}
            {page==="iad"         && <IADView      iadData={iadData} setIadData={setIadData} isIadChief={isIadChief} isIadInspector={isIadInspector} isIadAuthorized={isIadAuthorized} officers={officers}/>}
          </>}
        </main>

        <footer style={{borderTop:"1px solid var(--border)",padding:"16px 24px",display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:8}}>
          <div style={{fontFamily:"'Oswald',sans-serif",fontSize:16,fontWeight:700,letterSpacing:4,color:"var(--gold)"}}>LSPD</div>
          <div style={{fontFamily:"'Share Tech Mono',monospace",fontSize:10,color:"var(--dim)"}}>
            "☁ Supabase Cloud" · DATABASE v4.0
          </div>
        </footer>
      </div>

      {/* ── TOAST NOTIFICATIONS ── */}
      <div style={{position:"fixed",bottom:24,right:24,display:"flex",flexDirection:"column",gap:8,zIndex:9999,pointerEvents:"none"}}>
        {toasts.map(t => {
          const colors = {
            log:     { bg:"rgba(155,89,182,0.15)",  border:"rgba(155,89,182,0.5)"  },
            iad:     { bg:"rgba(231,76,60,0.15)",   border:"rgba(231,76,60,0.5)"   },
            dtu:     { bg:"rgba(0,255,65,0.1)",     border:"rgba(0,255,65,0.4)"    },
            swat:    { bg:"rgba(224,48,48,0.15)",   border:"rgba(224,48,48,0.5)"   },
            officer: { bg:"rgba(30,95,196,0.15)",   border:"rgba(30,95,196,0.5)"   },
            promo:   { bg:"rgba(46,204,113,0.15)",  border:"rgba(46,204,113,0.5)"  },
            demo:    { bg:"rgba(231,76,60,0.12)",   border:"rgba(231,76,60,0.4)"   },
            fire:    { bg:"rgba(231,76,60,0.18)",   border:"rgba(231,76,60,0.6)"   },
            ftd:     { bg:"rgba(200,168,75,0.12)",  border:"rgba(200,168,75,0.45)" },
            info:    { bg:"rgba(30,95,196,0.12)",   border:"rgba(30,95,196,0.4)"   },
          };
          const c = colors[t.type] || colors.info;
          return (
            <div key={t.id} style={{
              background: c.bg,
              border: `1px solid ${c.border}`,
              borderRadius: 6,
              padding: "10px 16px",
              fontFamily: "'Share Tech Mono',monospace",
              fontSize: 12,
              color: "var(--white)",
              maxWidth: 320,
              boxShadow: "0 4px 20px rgba(0,0,0,0.4)",
              animation: "toastIn .25s ease",
              pointerEvents: "auto",
            }}>
              {t.msg}
            </div>
          );
        })}
      </div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
