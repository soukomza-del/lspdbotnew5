// ─── SWAT MEMBER MODAL ───────────────────────────────────────────────────────
function SWATMemberModal({ entry, onSave, onClose, isNew, officers, existingMembers }) {
  const blank = {id:null,name:"",nick:"",pseudo:"",badge:"",lspdRank:"",swatRank:"Operator",team:"Alfa",spec:"Brak",notes:""};
  const [form,setForm] = useState(entry?{...entry}:{...blank});
  const set = (k,v) => setForm(f=>({...f,[k]:v}));
  const isCmd = ["Commander","Deputy Commander"].includes(form.swatRank);

  const handleOfficerPick = (name) => {
    if(!name) { set("name",""); set("nick",""); set("lspdRank",""); return; }
    const o = (officers||[]).find(x=>x.name===name);
    if(o) { set("name",o.name); set("nick",o.nick||""); set("lspdRank",o.rank||""); }
    else set("name", name);
  };
  const availableOfficers = (officers||[]).filter(o=>
    !existingMembers || existingMembers.every(m=>m.name!==o.name) || o.name===form.name
  );

  const handleSave = (e) => {
    e.preventDefault();
    e.stopPropagation();
    if(!form.name) { alert("Podaj imię i nazwisko funkcjonariusza."); return; }
    onSave({...form, id:form.id||Date.now()});
  };

  return (
    <div className="swat-modal-overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <style>{SWAT_CSS}</style>
      <div className="swat-modal-box" onClick={e=>e.stopPropagation()}>
        <div className="swat-modal-title">{isNew?"// DODAJ OPERATORA":"// EDYTUJ OPERATORA"}</div>
        <div className="swat-field">
          <div className="swat-field-label">FUNKCJONARIUSZ (wybierz z bazy)</div>
          <select className="swat-select" value={form.name||""} onChange={e=>handleOfficerPick(e.target.value)}>
            <option value="">— wybierz —</option>
            {availableOfficers.sort((a,b)=>(a.name||"").localeCompare(b.name||"")).map(o=>(
              <option key={o.id} value={o.name}>{o.name} · {o.rank}</option>
            ))}
          </select>
        </div>
        {[["Imię Nazwisko IC","name"],["Nick OOC","nick"],["Pseudonim SWAT","pseudo"],["Odznaka SWAT","badge"],["Stopień LSPD","lspdRank"]].map(([lbl,k])=>(
          <div key={k} className="swat-field">
            <div className="swat-field-label">{lbl}</div>
            <input className="swat-input" value={form[k]||""} onChange={e=>set(k,e.target.value)}/>
          </div>
        ))}
        <div className="swat-field">
          <div className="swat-field-label">STOPIEŃ SWAT</div>
          <select className="swat-select" value={form.swatRank} onChange={e=>set("swatRank",e.target.value)}>
            {SWAT_RANKS.map(r=><option key={r} value={r}>{r}</option>)}
          </select>
        </div>
        {!isCmd && (
          <div className="swat-field">
            <div className="swat-field-label">ZESPÓŁ</div>
            <select className="swat-select" value={form.team||"Alfa"} onChange={e=>set("team",e.target.value)}>
              {SWAT_TEAMS.map(t=><option key={t} value={t}>Zespół {t}</option>)}
            </select>
          </div>
        )}
        <div className="swat-field">
          <div className="swat-field-label">SPECJALIZACJA</div>
          <select className="swat-select" value={form.spec||"Brak"} onChange={e=>set("spec",e.target.value)}>
            {SWAT_SPECS.map(s=><option key={s} value={s}>{s}</option>)}
          </select>
        </div>
        <div className="swat-field">
          <div className="swat-field-label">NOTATKI</div>
          <input className="swat-input" value={form.notes||""} onChange={e=>set("notes",e.target.value)}/>
        </div>
        <div className="swat-btn-row">
          <button className="swat-btn-primary" type="button" onClick={handleSave}>ZAPISZ</button>
          <button className="swat-btn-cancel" type="button" onClick={onClose}>ANULUJ</button>
        </div>
      </div>
    </div>
  );
}

// ─── SWAT OPERATORS TAB ──────────────────────────────────────────────────────
function SWATOperatorsTab({ isSuperAdmin, swatData, setSwatData, officers }) {
  // Zawsze pobieraj aktualny stopień z tablicy officers (nie z kopii w swat)
  const members = swatData.members||[];
  const setMembers = upd => setSwatData(d=>({...d,members:typeof upd==="function"?upd(d.members||[]):upd}));
  const [modal,setModal] = useState(null);

  const save = (form, discordAnnounce=false) => {
    if(modal.isNew) setMembers(p=>[...p,form]);
    else            setMembers(p=>p.map(x=>x.id===form.id?form:x));
    setModal(null);
  };
  const remove = id => { if(window.confirm("Usunąć operatora z bazy SWAT?")) setMembers(p=>p.filter(x=>x.id!==id)); };

  const getLiveRank = (name) => (officers||[]).find(o=>o.name===name)?.rank || null;
  const isCmd = m => ["Commander","Deputy Commander"].includes(m.swatRank);
  const commanders = members.filter(isCmd);
  const teamMembers = team => members.filter(m=>!isCmd(m)&&m.team===team);

  const renderRow = (m) => {
    const nc  = SWAT_RANK_NAME[m.swatRank]||"#e03030";
    const bg  = SWAT_RANK_ROW[m.swatRank]||"rgba(224,48,48,0.03)";
    const sc  = SWAT_SPEC_COLOR[m.spec]||"#888";
    return (
      <div key={m.id} className="swat-member-row"
        style={{background:bg,borderLeftColor:nc}}>
        <div className="swat-nick-box" style={{color:nc,background:nc+"22",border:`1px solid ${nc}44`}}>
          {m.nick||"—"}
        </div>
        <div style={{flex:1,minWidth:0}}>
          <div style={{display:"flex",alignItems:"center",gap:6}}>
            <div style={{color:nc,fontSize:13,fontWeight:600,letterSpacing:1,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{m.name||"—"}</div>
            {m.pseudo&&<div style={{fontFamily:"'Share Tech Mono',monospace",fontSize:9,color:nc,background:nc+"18",border:`1px solid ${nc}44`,borderRadius:2,padding:"1px 6px",whiteSpace:"nowrap"}}>"{m.pseudo}"</div>}
            {m.badge&&<div style={{fontFamily:"'Share Tech Mono',monospace",fontSize:9,color:"var(--gray)",background:"rgba(255,255,255,0.04)",border:"1px solid var(--border)",borderRadius:2,padding:"1px 6px",whiteSpace:"nowrap"}}>#{m.badge}</div>}
          </div>
          <div style={{fontSize:9,color:"rgba(224,48,48,0.38)",letterSpacing:1,marginTop:2}}>{getLiveRank(m.name) || m.lspdRank || ""}</div>
        </div>
        <div className="swat-spec-pill" style={{color:sc,borderColor:sc+"55",background:sc+"12"}}>{m.spec||"—"}</div>
        <div className="swat-rank-label">{m.swatRank}</div>
        {m.notes&&<div style={{fontSize:9,color:"rgba(224,48,48,0.32)",maxWidth:160,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{m.notes}</div>}
        {isSuperAdmin&&<div style={{display:"flex",gap:5,flexShrink:0}}>
          <button className="swat-btn-edit" onClick={()=>setModal({isNew:false,entry:m})}>EDYTUJ</button>
          <button className="swat-btn-del"  onClick={()=>remove(m.id)}>USUŃ</button>
        </div>}
      </div>
    );
  };

  return (
    <div>
      <style>{SWAT_CSS}</style>
      <div className="swat-sec-title">// <span>SWAT OPERATORS DATABASE</span> — PERSONEL JEDNOSTKI · {members.length} OPERATORÓW</div>
      {isSuperAdmin&&<button onClick={()=>setModal({isNew:true})} style={{marginBottom:24,padding:"8px 18px",background:"rgba(224,48,48,0.08)",border:"1px solid #e03030",color:"#e03030",fontFamily:"'Share Tech Mono',monospace",fontSize:10,letterSpacing:2,cursor:"pointer"}}>+ DODAJ OPERATORA</button>}

      {/* COMMAND */}
      <div className="swat-cmd-block">
        <div className="swat-cmd-header">
          <div style={{fontSize:16,color:"#e03030"}}>⬛</div>
          <div className="swat-cmd-label">COMMAND</div>
          <div className="swat-cmd-count">{commanders.length} / 2 · OFICEROWIE DOWODZENIA</div>
        </div>
        <div style={{padding:"8px 0 4px"}}>
          {commanders.length>0
            ? commanders.map(renderRow)
            : <div style={{fontSize:9,letterSpacing:2,color:"rgba(224,48,48,0.22)",padding:"12px 18px"}}>BRAK DANYCH DOWODZENIA</div>
          }
        </div>
      </div>

      {/* TEAMS */}
      {SWAT_TEAMS.map((team,ti) => {
        const emoji  = ["🔴","🟡","🟢"][ti];
        const tc     = SWAT_TEAM_COLORS[team];
        const tm     = teamMembers(team);
        const tl     = tm.find(m=>m.swatRank==="Team Leader");
        return (

            <div className="swat-team-header" style={{borderLeftColor:tc.accent,borderColor:tc.border}}>
              <div style={{fontSize:14}}>{emoji}</div>

              {tl&&<div className="swat-team-tl" style={{color:tc.accent}}>TL: {tl.name||tl.nick||"—"}</div>}

    </div>
  );

// ─── PHOTO UPLOAD HELPER ─────────────────────────────────────────────────────
function PhotoUploader({ photos, onChange }) {
  const handleFiles = (e) => {
    const files = Array.from(e.target.files);
    const readers = files.map(file => new Promise(res => {
      const r = new FileReader();
      r.onload = () => res({ name: file.name, data: r.result });
      r.readAsDataURL(file);
    }));
    Promise.all(readers).then(newPhotos => onChange([...(photos||[]), ...newPhotos]));
    e.target.value = "";
  };
  const remove = (i) => onChange((photos||[]).filter((_,idx)=>idx!==i));
  return (
    <div className="fg">
      <label>Zdjęcia</label>
      <input type="file" accept="image/*" multiple onChange={handleFiles} style={{color:"var(--gray)",fontSize:12}}/>
      {photos&&photos.length>0&&(
        <div style={{display:"flex",flexWrap:"wrap",gap:8,marginTop:8}}>
          {photos.map((p,i)=>(
            <div key={i} style={{position:"relative"}}>
              <img src={p.data} alt={p.name} style={{height:80,borderRadius:4,border:"1px solid var(--border)",objectFit:"cover"}}/>
              <button onClick={()=>remove(i)} style={{position:"absolute",top:-6,right:-6,background:"#e03030",border:"none",borderRadius:"50%",width:18,height:18,color:"#fff",fontSize:10,cursor:"pointer",lineHeight:"18px",textAlign:"center"}}>✕</button>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// ─── SWAT RAPORTY ─────────────────────────────────────────────────────────────
function SWATRaportyTab({ swatData, setSwatData, isSuperAdmin, isOperator, swatAdmin }) {
  const canAdd = isSuperAdmin || isOperator;
  const raporty = swatData?.raporty || [];
  const [showForm, setShowForm] = useState(false);
  const [detail, setDetail] = useState(null);
  const [editing, setEditing] = useState(null);
  const [lightbox, setLightbox] = useState(null);
  const [submitting, setSubmitting] = useState(false);
  const today = new Date().toISOString().slice(0,10);
  const emptyForm = { name:"", date:today, start:"", end:"", hours:"", report:"", photos:[] };
  const [form, setForm] = useState(emptyForm);
  const setF = (k,v) => setForm(f=>({...f,[k]:v}));

  const openEdit = (r) => { setEditing(r.id); setForm({...r}); setDetail(null); setShowForm(true); };

  const submit = async () => {
    if(!form.name||!form.report){ alert("Wypełnij wymagane pola (funkcjonariusz + raport)."); return; }
    setSubmitting(true);
    try {
      if(editing) {
        // Update — atomic żeby nie nadpisać cudzego raportu
        const saved = await dbApi.atomicUpdate("swat", "raporty", editing, form);

        const saved = await dbApi.atomicAppend("swat", "raporty", form);
        setSwatData(d=>({...d, raporty:[...(d.raporty||[]), saved]}));
      }
      setForm(emptyForm); setShowForm(false);
    } catch(e) {
      alert("Błąd zapisu: " + e.message);

  };

    if(window.confirm("Usunąć raport?")) {
      setSwatData(d=>({...d, raporty:(d.raporty||[]).filter(r=>r.id!==id)}));

              {detail.hours&&<div style={{background:"var(--card)",border:"1px solid rgba(224,48,48,0.4)",borderRadius:4,padding:"10px 14px"}}>

            <div style={{fontSize:13,color:"var(--gray)",lineHeight:1.8,whiteSpace:"pre-wrap",background:"rgba(255,255,255,0.02)",border:"1px solid var(--border)",borderLeft:"3px solid #e03030",padding:"14px 16px",borderRadius:3,maxHeight:"40vh",overflowY:"auto",marginBottom:16}}>{detail.report}</div>

                  ))}

      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
        <div style={{fontFamily:"'Share Tech Mono',monospace",fontSize:11,color:"var(--gray)"}}>{raporty.length} RAPORTÓW</div>
        {canAdd&&<button className="swat-btn-primary" onClick={()=>{setEditing(null);setForm(emptyForm);setShowForm(s=>!s);}}>
          {showForm?"✕ ANULUJ":"+ DODAJ RAPORT"}
        </button>}
      </div>

      {showForm&&(
        <div style={{background:"rgba(224,48,48,0.04)",border:"1px solid rgba(224,48,48,0.2)",borderRadius:4,padding:16,marginBottom:16}}>

// ─── SWAT AKCJE ───────────────────────────────────────────────────────────────
function SWATAkcjeTab({ swatData, setSwatData, isSuperAdmin, isOperator }) {
  const akcje   = swatData?.akcje    || [];
  const members = swatData?.members  || [];
  const [showForm,   setShowForm]   = useState(false);
  const [detail,     setDetail]     = useState(null);
  const [editing,    setEditing]    = useState(null);
  const [lightbox,   setLightbox]   = useState(null);
  const [submitting, setSubmitting] = useState(false);
  const today = new Date().toISOString().slice(0,10);

  // Commanderzy zawsze dostępni na liście (niezależnie od zespołu)
  const commanders = members.filter(m => ["Commander","Deputy Commander"].includes(m.swatRank));

  const emptyForm = { title:"", date:today, location:"", selectedTeams:[], selectedMembers:[], description:"", result:"", photos:[] };
  const [form, setForm] = useState(emptyForm);
  const setF = (k,v) => setForm(f=>({...f,[k]:v}));
  const canAdd = isSuperAdmin || isOperator;

  const toggleTeam = (team) => {
    setForm(f => {
      const teams = f.selectedTeams.includes(team)
        ? f.selectedTeams.filter(t => t !== team)
        : [...f.selectedTeams, team];
      // Jeśli odznaczamy zespół — usuń jego operatorów z selectedMembers
      const teamMemberIds = members.filter(m => m.team === team).map(m => m.id);
      const mems = teams.includes(team)
        ? f.selectedMembers
        : f.selectedMembers.filter(id => !teamMemberIds.includes(id));
      return {...f, selectedTeams: teams, selectedMembers: mems};
    });
  };

  const toggleMember = (id) => {
    setForm(f => ({
      ...f,
      selectedMembers: f.selectedMembers.includes(id)
        ? f.selectedMembers.filter(x => x !== id)
        : [...f.selectedMembers, id]
    }));
  };

  // Zbierz listę uczestników jako string (do wyplat i wyświetlania)
  const buildParticipants = (f) => {
    const cmdIds  = commanders.map(m => m.id);
    const allIds  = [...new Set([
      ...commanders.filter(m => f.selectedMembers.includes(m.id)).map(m => m.id),
      ...f.selectedMembers
    ])];
    return members
      .filter(m => allIds.includes(m.id))
      .map(m => m.name)
      .join(", ");
  };

  const openEdit = (a) => {
    // Rekonstruuj selectedTeams i selectedMembers ze starych danych
    const parts = (a.participants || "").split(",").map(s => s.trim().toLowerCase());
    const selMems = members.filter(m => parts.includes((m.name||"").toLowerCase())).map(m => m.id);
    const selTeams = SWAT_TEAMS.filter(t => members.some(m => m.team===t && selMems.includes(m.id)));
    setEditing(a.id);
    setForm({...a, selectedTeams: selTeams, selectedMembers: selMems});
    setDetail(null); setShowForm(true);
  };

  const submit = async () => {
    if(!form.title||!form.description){ alert("Wypełnij wymagane pola (nazwa + opis)."); return; }
    setSubmitting(true);
    try {
      const participants = buildParticipants(form);
      const saved = {...form, participants};
      if(editing) {
        const result = await dbApi.atomicUpdate("swat", "akcje", editing, saved);
        setSwatData(d=>({...d, akcje:(d.akcje||[]).map(a=>a.id===editing?result:a)}));
        setEditing(null);
      } else {
        const result = await dbApi.atomicAppend("swat", "akcje", saved);
        setSwatData(d=>({...d, akcje:[...(d.akcje||[]), result]}));
      }
      setForm(emptyForm); setShowForm(false);
    } catch(e) {
      alert("Błąd zapisu akcji: " + e.message);
    } finally { setSubmitting(false); }
  };

  const remove = (id) => {
    if(window.confirm("Usunąć akcję?")) {
      setSwatData(d=>({...d, akcje:(d.akcje||[]).filter(a=>a.id!==id)}));
      if(detail?.id===id) setDetail(null);
    }
  };

  const teamColors = { Alfa:"#e03030", Bravo:"#e07830", Charlie:"#30a0e0", Delta:"#2ecc71" };

  return (
    <div>
      <style>{SWAT_CSS}</style>
      <Lightbox src={lightbox} onClose={()=>setLightbox(null)}/>
      <div className="swat-sec-title">// <span>AKCJE</span> — REJESTR PRZEPROWADZONYCH OPERACJI</div>

      {detail && (
        <div className="overlay" onClick={e=>e.target===e.currentTarget&&setDetail(null)}>
          <div className="modal" style={{maxWidth:740}}>
            <div className="modal-title">RAPORT AKCJI — {detail.title}</div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(150px,1fr))",gap:10,marginBottom:16}}>
              {[["DATA",detail.date],["LOKALIZACJA",detail.location],["WYNIK",detail.result]].map(([l,v])=>v?(
                <div key={l} style={{background:"var(--card)",border:"1px solid var(--border)",borderRadius:4,padding:"10px 14px"}}>
                  <div style={{fontFamily:"'Share Tech Mono',monospace",fontSize:9,color:"var(--gray)",letterSpacing:2,marginBottom:4}}>{l}</div>
                  <div style={{color: l==="WYNIK"?(detail.result==="SUKCES"?"#2ecc71":detail.result==="NIEPOWODZENIE"?"#e03030":"#e67e22"):"var(--white)",fontSize:12,fontWeight:l==="WYNIK"?700:400}}>{v}</div>
                </div>

            </div>
            {detail.participants && (

                <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                  {detail.participants.split(",").map(p=>p.trim()).filter(Boolean).map(p=>(
                    <span key={p} style={{fontFamily:"'Share Tech Mono',monospace",fontSize:11,padding:"3px 10px",background:"rgba(224,48,48,0.1)",border:"1px solid rgba(224,48,48,0.25)",borderRadius:3,color:"var(--white)"}}>{p}</span>

                </div>

            <div style={{fontSize:13,color:"var(--gray)",lineHeight:1.8,whiteSpace:"pre-wrap",background:"rgba(255,255,255,0.02)",border:"1px solid var(--border)",borderLeft:"3px solid #e03030",padding:"14px 16px",borderRadius:3,maxHeight:"35vh",overflowY:"auto",marginBottom:16}}>{detail.description}</div>
            {detail.photos&&detail.photos.length>0&&(

                <div style={{display:"flex",flexWrap:"wrap",gap:8,marginBottom:16}}>

// ─── FTD VIEW ─────────────────────────────────────────────────────────────────
function StatystykiView({ ftdData, officers }) {
  const ftoList = ftdData.fto || [];
  const TRAININGS = ["SEU","SV","NT","PWC","WU","K9","ASU","Mary"];
  const [sortKey, setSortKey] = useState("totalConducted");
  const [sortDir, setSortDir] = useState(-1);

  const ftoNames = new Set(ftoList.map(f => f.name));

  const now7 = new Date();
  now7.setDate(now7.getDate() - 7);
  const cutoff7 = now7.toISOString().slice(0, 10); // "YYYY-MM-DD"

  const stats = ftoList.map(fto => {
    const canTrain = TRAININGS.filter(t => !!fto[t.toLowerCase()]);
    const conducted = {};
    const conducted7 = {};
    let totalConducted = 0;
    let total7 = 0;
    TRAININGS.forEach(t => {
      const ftoKey  = t.toLowerCase() + "_fto";
      const dateKey = t.toLowerCase() + "_date";
      const matching = (officers||[]).filter(o =>
        !!o[t.toLowerCase()] &&
        (o[ftoKey] || "").trim().toLowerCase() === fto.name.trim().toLowerCase()
      );
      const count  = matching.length;
      const count7 = matching.filter(o => (o[dateKey] || "") >= cutoff7).length;
      conducted[t]  = count;
      conducted7[t] = count7;
      if (canTrain.includes(t)) { totalConducted += count; total7 += count7; }
    });
    return {
      id: fto.id,
      name: fto.name,
      nick: fto.nick,
      internalRank: fto.internalRank || "FTO",
      canTrain,
      canTrainCount: canTrain.length,
      conducted,
      conducted7,
      totalConducted,
      total7,
    };
  });

  const sorted = [...stats].sort((a, b) => {
    const va = a[sortKey], vb = b[sortKey];
    if (typeof va === "string") return sortDir * va.localeCompare(vb);
    return sortDir * (va - vb);
  });

  const handleSort = key => {
    if (sortKey === key) setSortDir(d => -d);
    else { setSortKey(key); setSortDir(-1); }
  };

  const SortTh = ({k, label, title}) => (
    <th onClick={() => handleSort(k)}
        style={{cursor:"pointer",userSelect:"none",whiteSpace:"nowrap"}}
        title={title}>
      {label} {sortKey===k ? (sortDir===-1?"↓":"↑") : <span style={{opacity:0.3}}>↕</span>}
    </th>
  );

  const rankColors = {
    "FTD Commander": "#e8c96a",
    "FTO":           "var(--white)",
    "FTO Trainee":   "var(--gray)",
  };

  const globalTotals = {};
  const untracked = {};
  TRAININGS.forEach(t => {
    const ftoKey = t.toLowerCase() + "_fto";
    globalTotals[t] = (officers||[]).filter(o => !!o[t.toLowerCase()]).length;
    untracked[t]    = (officers||[]).filter(o => !!o[t.toLowerCase()] && !o[ftoKey]).length;
  });
  const totalOfficers = (officers||[]).length;

  return (
    <div>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16,flexWrap:"wrap",gap:12}}>
        <div>
          <div className="page-title">STATYSTYKI SZKOLEŃ</div>
          <div className="page-sub">{ftoList.length} FTO · {totalOfficers} OFICERÓW W BAZIE</div>
        </div>
      </div>

      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(120px,1fr))",gap:10,marginBottom:28}}>
        {TRAININGS.map(t => {
          const count = globalTotals[t];
          const pct = totalOfficers > 0 ? Math.round(count/totalOfficers*100) : 0;
          const qualifiedFTO = ftoList.filter(f => !!f[t.toLowerCase()]).length;
          return (
            <div key={t} style={{
              background:"var(--card)",border:"1px solid var(--border)",borderRadius:6,
              padding:"12px 14px",display:"flex",flexDirection:"column",gap:4
            }}>
              <div style={{fontFamily:"'Oswald',sans-serif",fontSize:18,fontWeight:700,letterSpacing:3,color:"var(--accent)"}}>{t}</div>
              <div style={{fontFamily:"'Share Tech Mono',monospace",fontSize:24,fontWeight:700,color:"var(--white)",lineHeight:1}}>{count}</div>
              <div style={{fontFamily:"'Share Tech Mono',monospace",fontSize:10,color:"var(--gray)"}}>oficerów zdało</div>
              <div style={{height:3,background:"var(--border)",borderRadius:2,marginTop:4,overflow:"hidden"}}>
                <div style={{height:"100%",width:`${pct}%`,background:"var(--accent)",borderRadius:2,transition:"width 0.6s ease"}}/>
              </div>
              <div style={{fontFamily:"'Share Tech Mono',monospace",fontSize:10,color:"var(--gray)",display:"flex",justifyContent:"space-between",marginTop:2}}>
                <span>{qualifiedFTO} FTO</span>
                {untracked[t] > 0 && <span style={{color:"rgba(255,180,0,0.7)"}} title="Stare wpisy bez przypisanego FTO">{untracked[t]} bez FTO</span>}
              </div>
            </div>
          );
        })}
      </div>

      <div style={{fontFamily:"'Oswald',sans-serif",fontSize:13,fontWeight:700,letterSpacing:3,color:"var(--gray)",marginBottom:10}}>ZESTAWIENIE PER FTO</div>
      <div className="tbl-wrap">
        <table>
          <thead>
            <tr>
              <SortTh k="name"           label="Imię i Nazwisko" title="Sortuj po nazwisku"/>
              <SortTh k="internalRank"   label="Stopień FTD"    title="Sortuj po stopniu FTD"/>
              <SortTh k="canTrainCount"  label="Upraw."               title="Ile szkoleń może prowadzić"/>
              {TRAININGS.map(t => (
                <th key={t} style={{minWidth:46,textAlign:"center"}} title={`Ile osób przeszkolił z ${t}`}>{t}</th>
              ))}
              <SortTh k="total7"         label="⏱ Ost. 7 dni"   title="Szkolenia przeprowadzone w ostatnich 7 dniach"
                style={{background:"rgba(30,95,196,0.1)",color:"#6ab0f5"}}/>
              <SortTh k="totalConducted" label="Σ Razem"         title="Łącznie przeprowadzonych szkoleń"/>
            </tr>
          </thead>
          <tbody>
            {sorted.map(fto => (
              <tr key={fto.id}>
                <td className="name" style={{color: rankColors[fto.internalRank] || "var(--white)"}}>
                  {fto.name}
                  <div style={{fontFamily:"'Share Tech Mono',monospace",fontSize:10,color:"var(--gray)",fontWeight:400}}>{fto.nick}</div>
                </td>
                <td>
                  <span style={{
                    fontFamily:"'Share Tech Mono',monospace",fontSize:10,letterSpacing:1,padding:"2px 8px",borderRadius:3,
                    background: fto.internalRank==="FTD Commander" ? "rgba(200,168,75,0.2)" : fto.internalRank==="FTO Trainee" ? "rgba(46,204,113,0.12)" : "rgba(30,95,196,0.18)",
                    color: rankColors[fto.internalRank] || "var(--white)"
                  }}>{fto.internalRank}</span>
                </td>
                <td style={{textAlign:"center"}}>
                  <span style={{
                    fontFamily:"'Share Tech Mono',monospace",fontSize:12,fontWeight:700,
                    color: fto.canTrainCount === TRAININGS.length ? "var(--accent)" : fto.canTrainCount >= 4 ? "var(--white)" : "var(--gray)"
                  }}>{fto.canTrainCount}/{TRAININGS.length}</span>
                </td>
                {TRAININGS.map(t => {
                  const canDo  = fto.canTrain.includes(t);
                  const count  = fto.conducted[t];
                  const count7 = fto.conducted7[t];
                  return (
                    <td key={t} style={{textAlign:"center",padding:"8px 6px"}}>
                      {canDo ? (
                        <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:1}}>
                          <span style={{fontFamily:"'Share Tech Mono',monospace",fontSize:13,fontWeight:700,color:count>0?"var(--accent)":"rgba(255,255,255,0.2)"}}>{count}</span>
                          {count7 > 0 && <span style={{fontFamily:"'Share Tech Mono',monospace",fontSize:9,color:"#6ab0f5"}}>+{count7} tyg.</span>}
                        </div>
                      ) : (
                        <span style={{color:"rgba(255,255,255,0.08)",fontSize:14}}>—</span>
                      )}
                    </td>
                  );
                })}
                <td style={{textAlign:"center",background:"rgba(30,95,196,0.07)"}}>
                  <span style={{
                    fontFamily:"'Oswald',sans-serif",fontSize:18,fontWeight:700,
                    color: fto.total7 > 0 ? "#6ab0f5" : "var(--gray)"
                  }}>{fto.total7}</span>
                </td>
                <td style={{textAlign:"center"}}>
                  <span style={{
                    fontFamily:"'Oswald',sans-serif",fontSize:20,fontWeight:700,
                    color: fto.totalConducted > 10 ? "var(--accent)" : fto.totalConducted > 4 ? "var(--white)" : "var(--gray)"
                  }}>{fto.totalConducted}</span>
                </td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
      {ftoList.length===0 && <div style={{textAlign:"center",padding:48,color:"var(--gray)",fontFamily:"'Share Tech Mono',monospace",fontSize:12}}>Brak FTO w bazie danych</div>}
      <div style={{marginTop:16,fontFamily:"'Share Tech Mono',monospace",fontSize:10,color:"var(--gray)",lineHeight:1.9}}>
        * Liczby pokazują ilu oficerów dany FTO osobiście przeszkolił (przez bota Jarvis)<br/>
        * — = FTO nie posiada uprawnień do tego szkolenia<br/>
        * <span style={{color:"rgba(255,180,0,0.7)"}}>bez FTO</span> = stare wpisy sprzed wdrożenia systemu
      </div>
    </div>
  );
}

const RANK_ORDER = ["Cadet","Officer I","Officer II","Officer III","Officer III+1","Sergeant","Staff Sergeant","Master Sergeant","Lieutenant I","Lieutenant II","Captain","Commander","Deputy Chief","Assistant Chief","Chief of Police"];

function OfficerModal({ officer, onSave, onClose, isNew }) {
  const blank = { badge:"", name:"", nick:"", rank:"Officer I", dept:"LSPD", suspended:false, redEntry:false, yellowEntry:false, onLeave:false, commandBureau:false, highCommand:false, swat:false, iad:false, ftd:false, fac:false, seu:false, sv:false, nt:false, pwc:false, wu:false, k9:false, asu:false, cmdIad:false, cmdSwat:false, cmdFtd:false, cmdDtu:false, notes:"" };
  const [form, setForm] = useState({...(officer||blank), dept:(officer?.dept||"LSPD"), commandBureau:!!(officer?.commandBureau), highCommand:!!(officer?.highCommand)});
  const [discordAnnounce, setDiscordAnnounce] = useState(false);
  const [announceReason, setAnnounceReason] = useState("");
  const set = (k,v) => setForm(f=>({...f,[k]:v}));

  // Gdy zmienia się dept — resetuj rank do pierwszego z nowej listy
  const handleDeptChange = (newDept) => {
    const newRanks = getRanksForDept(newDept);
    setForm(f=>({...f, dept:newDept, rank:newRanks[newRanks.length-1]}));
  };

  const currentRanks  = getRanksForDept(form.dept);
  const currentBadges = getRankBadgesForDept(form.dept);

  // Ogłoszenia awans/degradacja — dla wszystkich jednostek
  const rankChanged  = !isNew && officer && form.rank !== officer.rank;
  const getRankIdx = (rank, dept) => {
    if (dept === "LSCSO") return RANKS_LSCSO.indexOf(rank);
    if (dept === "FIB")   return RANKS_FIB.indexOf(rank);
    return RANK_ORDER.indexOf(rank);
  };
  const oldIdx       = officer ? getRankIdx(officer.rank, form.dept) : -1;
  const newIdx       = getRankIdx(form.rank, form.dept);
  const isPromotion  = rankChanged && newIdx > oldIdx;
  const isDemotion   = rankChanged && newIdx < oldIdx;
  const announceType = isPromotion ? "AWANS" : isDemotion ? "DEGRADACJA" : null;
  const announceClr  = isPromotion ? "#2ecc71" : "#e74c3c";

  // Kolor akcentu zależny od jednostki
  const deptColor = form.dept === "FIB" ? "#ff4444" : form.dept === "LSCSO" ? "#f59e0b" : "var(--accent)";
  const deptBg    = form.dept === "FIB" ? "rgba(220,50,50,0.08)"  : form.dept === "LSCSO" ? "rgba(245,158,11,0.08)"  : "rgba(30,95,196,0.08)";
  const deptBorder= form.dept === "FIB" ? "rgba(220,50,50,0.35)"  : form.dept === "LSCSO" ? "rgba(245,158,11,0.35)"  : "rgba(30,95,196,0.3)";

  return (

// ─── WYPŁATY ──────────────────────────────────────────────────────────────────
function WyplatyView({ officers, log, iadData, ftdData, swatData, dtuData }) {
  const [search, setSearch] = useState("");
  const [sortKey, setSortKey] = useState("total");
  const [sortDir, setSortDir] = useState(-1);

  const cfg = (typeof WYPLATY_CONFIG !== "undefined") ? WYPLATY_CONFIG : {};
  const stawki    = cfg.stawkiGodzinowe    || {};
  const bPlus     = cfg.bonus_plus         ?? 15000;
  const bMinus    = cfg.kara_minus         ?? -15000;
  const bSzkol    = cfg.bonus_szkolenie    ?? 10000;
  const bIADwpis  = cfg.bonus_iad_wpis     ?? 5000;
  const bSWAT     = cfg.bonus_swat_akcja   ?? 10000;
  const bDTU      = cfg.bonus_dtu_sprawa   ?? 10000;

  // Cutoff — ostatnie 7 dni (format YYYY-MM-DD)
  const cutoff = (() => { const d = new Date(); d.setDate(d.getDate() - 7); return d.toISOString().slice(0,10); })();
  const inLast7 = (dateStr) => !!dateStr && dateStr >= cutoff;

  const fmtPLN = (v) => {
    const abs = Math.abs(Math.round(v)).toLocaleString("pl-PL");
    return (v < 0 ? "-" : "") + "$" + abs;
  };

  // ── Przygotuj dane per oficer ──────────────────────────────────────────────
  const rows = (officers || []).map(o => {
    const name = (o.name || "").trim();
    const rank = o.rank || "";
    const odept = o.dept || "LSPD";

    // 1. Godziny z dziennika (wszystkie — brak daty cutoff dla godzin)
    const hours = (log || [])
      .filter(l => (l.name || "").trim() === name)
      .reduce((s, l) => s + parseFloat(l.hours || 0), 0);
    const stawka = stawki[`${odept}:${rank}`] ?? stawki[rank] ?? 0;
    const zarobek_godziny = Math.round(hours * stawka);

    // 2. IAD akta — plusy i minusy dla tego oficera (tylko ostatnie 7 dni)
    const aktaOsobiste = (iadData?.akta || []).filter(
      a => (a.imieNazwisko || "").trim().toLowerCase() === name.toLowerCase()
           && inLast7(a.data)
    );
    const plusy    = aktaOsobiste.filter(a => a.konsekwencja === "PLUS").length;
    const minusy   = aktaOsobiste.filter(a => a.konsekwencja === "MINUS").length;
    const nagany   = aktaOsobiste.filter(a => a.konsekwencja === "NAGANA").length;
    const pochwaly = aktaOsobiste.filter(a => a.konsekwencja === "POCHWALA").length;
    const bNagana  = cfg.kara_nagana   ?? -30000;
    const bPochwala= cfg.bonus_pochwala ?? 30000;
    const zarobek_iad_kara = plusy * bPlus + minusy * bMinus + nagany * bNagana + pochwaly * bPochwala;

    // 3. FTO — szkolenia przeprowadzone w ostatnich 7 dniach (_date pole)
    const TRAININGS = ["seu","sv","nt","pwc","wu","k9","asu","mary"];
    let szkolen_przeprowadzonych = 0;
    TRAININGS.forEach(t => {
      szkolen_przeprowadzonych += (officers || []).filter(
        x => !!x[t] &&
             (x[t + "_fto"] || "").trim().toLowerCase() === name.toLowerCase() &&
             inLast7(x[t + "_date"])
      ).length;
    });
    const zarobek_szkolenia = szkolen_przeprowadzonych * bSzkol;

    // 4. IAD inspektorzy — wpisy podpisane w ostatnich 7 dniach
    const wpisy_iad = (iadData?.akta || []).filter(
      a => (a.podpisal || "").trim().toLowerCase() === name.toLowerCase()
           && inLast7(a.data)
    ).length;
    const zarobek_iad_wpisy = wpisy_iad * bIADwpis;

    // 5. SWAT — akcje z ostatnich 7 dni
    const swat_akcje = (swatData?.akcje || []).filter(a => {
      const parts = (a.participants || "").toLowerCase();
      return parts.includes(name.toLowerCase()) && inLast7(a.date);
    }).length;
    const zarobek_swat = swat_akcje * bSWAT;

    // 6. DTU — aktywne sprawy prowadzone przez tego oficera
    const dtu_sprawy = (dtuData?.sprawy || []).filter(s =>
      s.status === "AKTYWNA" &&
      (s.prowadzacy || "").trim().toLowerCase() === name.toLowerCase()
    ).length;
    const zarobek_dtu = dtu_sprawy * bDTU;

    const total = zarobek_godziny + zarobek_iad_kara + zarobek_szkolenia +
                  zarobek_iad_wpisy + zarobek_swat + zarobek_dtu;

    return {
      id: o.id,
      name,
      rank,
      badge: o.badge || "—",
      hours: Math.round(hours * 10) / 10,
      stawka,
      zarobek_godziny,
      plusy,
      minusy,
      nagany,
      pochwaly,
      zarobek_iad_kara,
      szkolen_przeprowadzonych,
      zarobek_szkolenia,
      wpisy_iad,
      zarobek_iad_wpisy,
      swat_akcje,
      zarobek_swat,
      dtu_sprawy,
      zarobek_dtu,
      total,
    };
  });

  const filtered = rows.filter(r =>
    !search || r.name.toLowerCase().includes(search.toLowerCase()) ||
    r.rank.toLowerCase().includes(search.toLowerCase())
  );

  const sorted = [...filtered].sort((a, b) => {
    const va = a[sortKey], vb = b[sortKey];
    if (typeof va === "string") return sortDir * va.localeCompare(vb);
    return sortDir * ((va || 0) - (vb || 0));
  });

  const handleSort = key => {
    if (sortKey === key) setSortDir(d => -d);
    else { setSortKey(key); setSortDir(-1); }
  };

  const SortTh = ({ k, label, title, style = {} }) => (
    <th onClick={() => handleSort(k)}
        style={{ cursor: "pointer", userSelect: "none", whiteSpace: "nowrap", ...style }}
        title={title}>
      {label} {sortKey === k ? (sortDir === -1 ? "↓" : "↑") : <span style={{ opacity: 0.3 }}>↕</span>}
    </th>
  );

  const totalSum = sorted.reduce((s, r) => s + r.total, 0);

  return (
    <div>
      {/* Nagłówek */}
      <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 20, flexWrap: "wrap", gap: 12 }}>
        <div>
          <div style={{ fontFamily: "'Oswald',sans-serif", fontSize: 28, fontWeight: 700, letterSpacing: 4, marginBottom: 4 }}>
            SYSTEM <span style={{ color: "var(--accent)" }}>WYPŁAT</span>
          </div>
          <div style={{ fontFamily: "'Share Tech Mono',monospace", fontSize: 11, color: "var(--gray)", letterSpacing: 2 }}>
            LSPD — PAYROLL SYSTEM · {sorted.length} FUNKCJONARIUSZY
          </div>
        </div>
        <div style={{ display: "flex", flexDirection: "column", alignItems: "flex-end", gap: 4 }}>
          <div style={{ fontFamily: "'Share Tech Mono',monospace", fontSize: 10, color: "var(--gray)" }}>SUMA ŁĄCZNA</div>
          <div style={{ fontFamily: "'Oswald',sans-serif", fontSize: 26, fontWeight: 700, color: "var(--accent)" }}>
            {fmtPLN(totalSum)}
          </div>
        </div>
      </div>

      {/* Legenda stawek */}
      <div style={{ background: "var(--card)", border: "1px solid var(--border)", borderRadius: 6, padding: "12px 16px", marginBottom: 20 }}>
        <div style={{ fontFamily: "'Oswald',sans-serif", fontSize: 11, letterSpacing: 3, color: "var(--gray)", marginBottom: 10 }}>BONUSY JEDNOSTEK</div>
        <div style={{ display: "flex", flexWrap: "wrap", gap: "8px 24px", fontFamily: "'Share Tech Mono',monospace", fontSize: 11 }}>
          {[
            ["✅ PLUS w aktach", fmtPLN(bPlus)],
            ["❌ MINUS w aktach", fmtPLN(bMinus)],
            ["⚠️ Nagana IAD", fmtPLN(cfg.kara_nagana ?? -30000)],
            ["🌟 Pochwała IAD", fmtPLN(cfg.bonus_pochwala ?? 30000)],
            ["🎓 Szkolenie FTO", fmtPLN(bSzkol)],
            ["📋 Wpis IAD", fmtPLN(bIADwpis)],
            ["⚡ Akcja SWAT", fmtPLN(bSWAT)],
            ["🔍 Aktywna sprawa DTU", fmtPLN(bDTU)],
          ].map(([label, val]) => (
            <span key={label} style={{ color: "var(--gray)" }}>
              {label}: <span style={{ color: val.startsWith("-") ? "#e74c3c" : "var(--accent)", fontWeight: 700 }}>{val}</span>
            </span>
          ))}
        </div>
      </div>

      {/* Wyszukiwarka */}
      <input
        type="text"
        placeholder="Szukaj po nazwisku lub stopniu..."
        value={search}
        onChange={e => setSearch(e.target.value)}
        style={{
          background: "var(--card)", border: "1px solid var(--border)", borderRadius: 4,
          color: "var(--white)", fontFamily: "'Share Tech Mono',monospace", fontSize: 12,
          padding: "8px 14px", width: "100%", maxWidth: 340, marginBottom: 16, boxSizing: "border-box"
        }}
      />

      {/* Tabela — zgrupowane kolumny */}
      <div className="tbl-wrap">
        <table>
          <thead>
            {/* Wiersz grup */}
            <tr>
              <th colSpan={3} style={{borderBottom:"none",paddingBottom:2}}></th>
              <th colSpan={2} style={{textAlign:"center",background:"rgba(30,95,196,0.12)",borderBottom:"2px solid rgba(30,95,196,0.4)",color:"#6ab0f5",fontFamily:"'Share Tech Mono',monospace",fontSize:9,letterSpacing:2,paddingBottom:4}}>GODZINY</th>
              <th colSpan={5} style={{textAlign:"center",background:"rgba(46,204,113,0.08)",borderBottom:"2px solid rgba(46,204,113,0.35)",color:"#2ecc71",fontFamily:"'Share Tech Mono',monospace",fontSize:9,letterSpacing:2,paddingBottom:4}}>IAD — AKTA (7 DNI)</th>
              <th colSpan={2} style={{textAlign:"center",background:"rgba(200,168,75,0.08)",borderBottom:"2px solid rgba(200,168,75,0.35)",color:"var(--accent)",fontFamily:"'Share Tech Mono',monospace",fontSize:9,letterSpacing:2,paddingBottom:4}}>FTO — SZKOLENIA (7 DNI)</th>
              <th colSpan={2} style={{textAlign:"center",background:"rgba(46,204,113,0.05)",borderBottom:"2px solid rgba(46,204,113,0.25)",color:"#2ecc71",fontFamily:"'Share Tech Mono',monospace",fontSize:9,letterSpacing:2,paddingBottom:4}}>IAD — WPISY (7 DNI)</th>
              <th colSpan={2} style={{textAlign:"center",background:"rgba(224,48,48,0.08)",borderBottom:"2px solid rgba(224,48,48,0.35)",color:"#e03030",fontFamily:"'Share Tech Mono',monospace",fontSize:9,letterSpacing:2,paddingBottom:4}}>SWAT (7 DNI)</th>
              <th colSpan={2} style={{textAlign:"center",background:"rgba(160,100,255,0.08)",borderBottom:"2px solid rgba(160,100,255,0.35)",color:"#c084fc",fontFamily:"'Share Tech Mono',monospace",fontSize:9,letterSpacing:2,paddingBottom:4}}>DTU — SPRAWY</th>
              <th style={{background:"rgba(200,168,75,0.08)",borderBottom:"2px solid var(--accent)"}}></th>
            </tr>
            {/* Wiersz kolumn */}
            <tr>
              <SortTh k="badge" label="Nr" title="Odznaka"/>
              <SortTh k="name"  label="Imię i Nazwisko"/>
              <SortTh k="rank"  label="Stopień"/>
              <SortTh k="hours"           label="Godz." title="Godziny z dziennika" style={{background:"rgba(30,95,196,0.06)"}}/>
              <SortTh k="zarobek_godziny" label="$"     title="Zarobek z godzin"   style={{background:"rgba(30,95,196,0.06)"}}/>
              <SortTh k="plusy"        label="✅" title="Plusy w aktach IAD (ostatnie 7 dni)"  style={{background:"rgba(46,204,113,0.05)"}}/>
              <SortTh k="minusy"       label="❌" title="Minusy w aktach IAD (ostatnie 7 dni)" style={{background:"rgba(46,204,113,0.05)"}}/>
              <SortTh k="nagany"       label="⚠️" title="Nagany IAD (ostatnie 7 dni)"          style={{background:"rgba(46,204,113,0.05)"}}/>
              <SortTh k="pochwaly"     label="🌟" title="Pochwały IAD (ostatnie 7 dni)"        style={{background:"rgba(46,204,113,0.05)"}}/>
              <SortTh k="zarobek_iad_kara" label="$"  title="Bonus/kara z akt IAD"            style={{background:"rgba(46,204,113,0.05)"}}/>

              <SortTh k="zarobek_szkolenia"        label="$"    title="Bonus za szkolenia"              style={{background:"rgba(200,168,75,0.05)"}}/>
              <SortTh k="wpisy_iad"       label="Szt." title="Wpisy wystawione przez IAD (7 dni)" style={{background:"rgba(46,204,113,0.03)"}}/>

function Dashboard({ officers, log, iadData, ftdData, onNavigate }) {
  const active    = officers.filter(o=>!o.suspended&&!o.onLeave).length;
  const suspended = officers.filter(o=>o.suspended).length;
  const getLiveRank = (name) => (officers||[]).find(o=>o.name===name)?.rank || null;

  // Szkoleniowcy FTD — lista FTO z FTD
  const ftoList = (ftdData?.fto || []).slice().sort((a,b)=>
    (a.internalRank==="FTD Commander"?0:a.internalRank==="FTO"?1:2) -
    (b.internalRank==="FTD Commander"?0:b.internalRank==="FTO"?1:2)
  );

  // Wpisy IAD — akta
  const aktaList = [...(iadData?.akta||[])].reverse().slice(0,5);

  const KONS_COLOR = { PLUS:"#2ecc71", MINUS:"#e74c3c", ZAWIESZENIE:"#f1c40f", ZWOLNIENIE:"#ff0000" };

  return (
    <div>
      <div style={{marginBottom:24}}>
        <div style={{fontFamily:"'Oswald',sans-serif",fontSize:28,fontWeight:700,letterSpacing:4}}>PANEL GŁÓWNY <span style={{color:"var(--gold)"}}>LSPD</span></div>
        <div style={{fontFamily:"'Share Tech Mono',monospace",fontSize:11,color:"var(--gray)",letterSpacing:2,marginTop:4}}>LOS SANTOS POLICE DEPARTMENT — SYSTEM ZARZĄDZANIA</div>
      </div>
      {!USE_CLOUD&&<div className="alert alert-red">⚠ <strong>BRAK KONFIGURACJI SUPABASE</strong> — uzupełnij SUPABASE_URL i SUPABASE_ANON w pliku.</div>}
      {USE_CLOUD&&<div className="alert alert-blue">☁ <strong>SUPABASE</strong> — dane i zdjęcia synchronizowane w chmurze.</div>}

      <div className="stats-row">
        <div className="stat-card blue"><div className="stat-num" style={{color:"var(--accent)"}}>{officers.length}</div><div className="stat-label">Funkcjonariuszy</div></div>
        <div className="stat-card green"><div className="stat-num" style={{color:"var(--green)"}}>{active}</div><div className="stat-label">Aktywnych</div></div>
        <div className="stat-card red"><div className="stat-num" style={{color:"var(--red)"}}>{suspended}</div><div className="stat-label">Zawieszonych</div></div>
        <div className="stat-card gold"><div className="stat-num" style={{color:"var(--gold)"}}>{log.length}</div><div className="stat-label">Wpisów Dziennika</div></div>
      </div>

      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(300px,1fr))",gap:16}}>

        {/* Rekrutacja / Dowódcy */}
        <div className="card">
          <div className="card-title">Rekrutacja <span className="tag">DOWÓDCY</span></div>
          <div style={{fontSize:11,color:"var(--dim)",marginBottom:12,fontFamily:"'Share Tech Mono',monospace",letterSpacing:1}}>DOWÓDCY WYDZIAŁÓW I ZASADA REKRUTACJI</div>

          {(() => {
            const unitDef = [
              { unit:"IAD",  color:"#c084fc", cmdKey:"cmdIad",  method:"obserwacja i powołanie" },
              { unit:"SWAT", color:"#e74c3c", cmdKey:"cmdSwat", method:"obserwacja i powołanie" },
              { unit:"FTD",  color:"#2ecc71", cmdKey:"cmdFtd",  method:"ticket — podanie" },
              { unit:"DTU",  color:"#3b82f6", cmdKey:"cmdDtu",  method:"obserwacja i powołanie" },
            ];
            const RANK_ORDER_CMD = ["Chief of Police","Assistant Chief","Deputy Chief","Commander","Captain","Lieutenant II","Lieutenant I","Master Sergeant","Staff Sergeant","Sergeant","Officer III+1","Officer III","Officer II","Officer I","Cadet"];
            return unitDef.map(u => {
              let members = [];
              members = (officers||[]).filter(o=>!!o[u.cmdKey]).sort((a,b)=>RANK_ORDER_CMD.indexOf(a.rank)-RANK_ORDER_CMD.indexOf(b.rank));
              return (
            <div key={u.unit} style={{display:"flex",alignItems:"flex-start",gap:10,marginBottom:10,padding:"8px 10px",background:"rgba(255,255,255,0.02)",border:"1px solid var(--border)",borderRadius:4}}>
              <span style={{fontFamily:"'Share Tech Mono',monospace",fontSize:11,fontWeight:700,color:u.color,minWidth:36,marginTop:2}}>{u.unit}</span>
              <div style={{flex:1}}>
                {members.length === 0
                  ? <div style={{fontSize:12,color:"var(--dim)",fontFamily:"'Share Tech Mono',monospace"}}>— brak —</div>
                  : <div style={{display:"flex",flexWrap:"wrap",gap:"2px 8px",marginBottom:4}}>
                      {members.map((m,i)=>(
                        <span key={m.id||i} style={{fontSize:12,color:"var(--white)"}}>
                          <span style={{color:u.color,fontFamily:"'Share Tech Mono',monospace",fontSize:10}}>[{m.badge}]</span>
                          {" "}{m.name}{i<members.length-1?<span style={{color:"var(--dim)"}}>,</span>:""}
                        </span>
                      ))}
                    </div>
                }
                <div style={{fontFamily:"'Share Tech Mono',monospace",fontSize:10,color:"var(--dim)",letterSpacing:0.5}}>{u.method}</div>
              </div>
            </div>
              );
            });
          })()}
        </div>

        {/* Szkoleniowcy FTD — per szkolenie */}
        {(() => {
          const mainTrainers = ftdData?.mainTrainers || {};
          return (
            <div className="card" style={{cursor:"pointer",gridColumn:"span 2"}} onClick={()=>onNavigate("ftd")}>
              <div className="card-title" style={{marginBottom:14}}>Szkoleniowcy <span className="tag">FTD</span></div>
              {ftoList.length === 0
                ? <div style={{color:"var(--dim)",fontSize:12,textAlign:"center",padding:16}}>Brak szkoleniowców</div>
                : <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(220px,1fr))",gap:10}}>
                    {FTD_TRAININGS.map(training => {
                      const qualified = ftoList.filter(o => !!o[training.toLowerCase()]);
                      if(qualified.length === 0) return (
                        <div key={training} style={{background:"rgba(255,255,255,0.02)",border:"1px solid var(--border)",borderRadius:4,padding:"10px 14px",opacity:0.45}}>
                          <div style={{fontFamily:"'Oswald',sans-serif",fontSize:11,letterSpacing:3,color:"var(--dim)",marginBottom:6}}>{training}</div>
                          <div style={{fontSize:10,color:"var(--dim)",fontFamily:"'Share Tech Mono',monospace"}}>— brak FTO —</div>
                        </div>
                      );
                      const mainId  = mainTrainers[training];
                      const mainFto = qualified.find(o => String(o.id) === String(mainId));
                      const rest    = qualified.filter(o => String(o.id) !== String(mainId));
                      return (
                        <div key={training} style={{background:"rgba(30,95,196,0.06)",border:"1px solid rgba(30,95,196,0.2)",borderRadius:4,padding:"10px 14px"}}>
                          {/* Nagłówek szkolenia */}
                          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8,paddingBottom:6,borderBottom:"1px solid rgba(30,95,196,0.15)"}}>
                            <div style={{fontFamily:"'Oswald',sans-serif",fontSize:12,letterSpacing:3,color:"var(--accent)",fontWeight:700}}>{training}</div>
                            <div style={{fontFamily:"'Share Tech Mono',monospace",fontSize:9,color:"var(--gray)"}}>{qualified.length} FTO</div>
                          </div>
                          {/* Główny szkoleniowiec */}
                          {mainFto
                            ? <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:rest.length>0?6:0,padding:"5px 8px",background:"rgba(200,168,75,0.1)",border:"1px solid rgba(200,168,75,0.3)",borderRadius:3}}>
                                <span style={{fontSize:10,color:"var(--gold)"}}>★</span>
                                <div style={{flex:1,minWidth:0}}>
                                  <div style={{fontSize:12,fontWeight:600,color:"var(--gold)",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{mainFto.name}</div>
                                  <div style={{fontSize:9,color:"rgba(200,168,75,0.6)",fontFamily:"'Share Tech Mono',monospace"}}>{getLiveRank(mainFto.name)||mainFto.rank||mainFto.lspdRank}</div>
                                </div>
                              </div>
                            : <div style={{fontSize:9,color:"var(--dim)",fontFamily:"'Share Tech Mono',monospace",marginBottom:rest.length>0?4:0,fontStyle:"italic"}}>brak głównego</div>
                          }
                          {/* Pozostali FTO — max 5, reszta ukryta */}
                          {rest.slice(0, mainFto ? 4 : 5).map(o => (
                            <div key={o.id} style={{display:"flex",alignItems:"center",gap:8,marginTop:4,padding:"4px 8px",background:"rgba(255,255,255,0.02)",borderRadius:3}}>
                              <span style={{fontFamily:"'Share Tech Mono',monospace",fontSize:8,color:"var(--accent)",background:"rgba(30,95,196,0.15)",border:"1px solid rgba(30,95,196,0.25)",padding:"1px 5px",borderRadius:2,whiteSpace:"nowrap"}}>
                                {o.internalRank==="FTD Commander"?"CMD":o.internalRank==="FTO"?"FTO":"TR"}
                              </span>
                              <div style={{flex:1,minWidth:0}}>
                                <div style={{fontSize:12,color:"var(--white)",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{o.name}</div>
                                <div style={{fontSize:9,color:"var(--gray)",fontFamily:"'Share Tech Mono',monospace"}}>{getLiveRank(o.name)||o.rank||o.lspdRank}</div>
                              </div>
                            </div>
                          ))}
                          {rest.length > (mainFto ? 4 : 5) && (
                            <div onClick={e=>e.stopPropagation()} style={{marginTop:6,fontSize:9,color:"var(--accent)",fontFamily:"'Share Tech Mono',monospace",letterSpacing:1,padding:"4px 8px",border:"1px dashed rgba(30,95,196,0.3)",borderRadius:3,background:"rgba(30,95,196,0.05)",cursor:"default",textAlign:"center"}}>
                              +{rest.length - (mainFto ? 4 : 5)} więcej — kliknij kartę aby zobaczyć wszystkich
                            </div>
                          )}
                        </div>
                      );
                    })}
                  </div>
              }
              <div style={{marginTop:10,fontSize:9,color:"var(--dim)",fontFamily:"'Share Tech Mono',monospace",textAlign:"right"}}>kliknij aby przejść do FTD →</div>
            </div>
          );
        })()}

        {/* Wpisy IAD */}
        <div className="card" style={{cursor:"pointer"}} onClick={()=>onNavigate("iad")}>
          <div className="card-title">Ostatnie Wpisy IAD <span className="tag">IAD</span></div>
          {aktaList.length === 0 && <div style={{color:"var(--dim)",fontSize:12,textAlign:"center",padding:16}}>Brak wpisów IAD</div>}
          {aktaList.map(a=>{
            const color = KONS_COLOR[a.konsekwencja] || "#888";
            return (
              <div key={a.id} style={{borderBottom:"1px solid var(--border)",padding:"8px 0"}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:3}}>
                  <span style={{color:"var(--white)",fontWeight:600,fontSize:13}}>{a.imieNazwisko}</span>
                  <span style={{fontFamily:"'Share Tech Mono',monospace",fontSize:9,color,background:`${color}22`,border:`1px solid ${color}55`,padding:"1px 6px",borderRadius:2}}>
                    {a.konsekwencja}
                  </span>
                </div>
                <div style={{fontSize:11,color:"var(--gray)",lineHeight:1.4}}>{(a.powod||"").slice(0,70)}{(a.powod||"").length>70?"…":""}</div>
                <div style={{fontSize:9,color:"var(--dim)",fontFamily:"'Share Tech Mono',monospace",marginTop:2}}>{a.data}</div>
              </div>
            );
          })}
          <div style={{marginTop:8,fontSize:9,color:"var(--dim)",fontFamily:"'Share Tech Mono',monospace",textAlign:"right"}}>kliknij aby przejść do IAD →</div>
        </div>

      </div>
    </div>
  );
}

function BulkEditModal({ officers, selectedIds, onSave, onClose }) {
  const blank = { rank:"", suspended:null, redEntry:null, yellowEntry:null, onLeave:null,
    swat:null, iad:null, ftd:null, fac:null, seu:null, sv:null, nt:null, pwc:null, wu:null, k9:null };
  const [form, setForm] = useState(blank);
  const set = (k,v) => setForm(f=>({...f,[k]:v}));
  const triOpts = [{label:"—",val:null},{label:"✓",val:true},{label:"✗",val:false}];
  const boolFields = [["suspended","Zawieszony"],["redEntry","Czerwony wpis"],["yellowEntry","Żółty wpis"],["onLeave","Urlop"],
    ["swat","SWAT"],["iad","IAD"],["ftd","FTD"],["fac","FAC"],["seu","SEU"],["sv","SV"],["nt","NT"],["pwc","PWC"],["wu","WU"],["k9","K9"],["asu","ASU"],["mary","Mary"]];
  return (
    <div className="overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal">
        <div className="modal-title">EDYTUJ ZAZNACZONYCH ({selectedIds.size})</div>
        <div style={{fontSize:11,color:"var(--gray)",marginBottom:12,fontFamily:"'Share Tech Mono',monospace"}}>
          Tylko wypełnione pola zostaną zmienione. "—" oznacza brak zmiany.
        </div>
        <div className="form-row">
          <div className="fg"><label>Stopień (opcjonalnie)</label>
            <select value={form.rank} onChange={e=>set("rank",e.target.value)}>
              <option value="">— bez zmiany —</option>
              {RANKS.map(r=><option key={r} value={r}>{RANK_BADGES[r]} — {r}</option>)}
            </select>
          </div>
        </div>
        <div style={{fontFamily:"'Oswald',sans-serif",fontSize:13,letterSpacing:2,color:"var(--gold)",margin:"14px 0 6px"}}>STATUSY I JEDNOSTKI</div>
        <div className="checks-grid">
          {boolFields.map(([k,l])=>(
            <div key={k} style={{display:"flex",flexDirection:"column",gap:3}}>
              <label style={{fontSize:11,color:"var(--gray)"}}>{l}</label>
              <div style={{display:"flex",gap:4}}>
                {triOpts.map(({label,val})=>(
                  <button key={label} onClick={()=>set(k,val)}
                    style={{padding:"2px 8px",fontSize:12,cursor:"pointer",borderRadius:3,border:"1px solid var(--border)",
                      background: form[k]===val ? "var(--accent)" : "var(--card)",
                      color: form[k]===val ? "#fff" : "var(--gray)"}}>
                    {label}
                  </button>
                ))}
              </div>
            </div>
          ))}
        </div>
        <div className="modal-footer">
          <button className="btn btn-red btn-sm" onClick={onClose}>ANULUJ</button>
          <button className="btn btn-primary btn-sm" onClick={()=>onSave(form)}>ZASTOSUJ DO ZAZNACZONYCH</button>
        </div>
      </div>
    </div>
  );
}

function OfficersView({ officers, setOfficers, isAdmin, log }) {
  const [search, setSearch] = useState("");
  const [filterUnit,   setFilterUnit]   = useState("ALL");
  const [filterDept,   setFilterDept]   = useState("ALL");
  const [filterStatus, setFilterStatus] = useState("ALL");
  const [filterRank,   setFilterRank]   = useState("ALL");
  const [modal, setModal] = useState(null);
  const [selected, setSelected] = useState(new Set());
  const [bulkModal, setBulkModal] = useState(false);

  // Globalny poziom stopnia (wyższy = ważniejszy, wyświetlany wyżej)
  // LSPD: Chief=14, Cadet=0
  // LSCSO i FIB mapowane na odpowiadające poziomy
  const GLOBAL_RANK_LEVEL = {
    // LSPD
    "Chief of Police": 16, "Assistant Chief": 15, "Deputy Chief": 14, "Commander": 13,
    "Captain": 10,
    "Lieutenant II": 9, "Lieutenant I": 8,
    "Master Sergeant": 7, "Staff Sergeant": 6, "Sergeant": 5,
    "Officer III+1": 4, "Officer III": 3, "Officer II": 2, "Officer I": 1,
    "Cadet": 0,
  };
  const GLOBAL_RANK_LEVEL_LSCSO = {
    "Sheriff":          12,  // między Deputy Chief (14) a Commander (13) → pod Commander, nad Captain
    "Undersheriff":     11,  // pod Sheriff, nad Captain
    "Captain":          10,
    "Staff Lieutenant": 9, "Lieutenant": 8,
    "Sergeant":         5,
    "Corporal 1st.":    4, "Corporal 2nd.":  4,
    "Master Deputy":    3, "Senior Deputy":  3, "Deputy": 2, "Probie Deputy": 1,
  };
  const GLOBAL_RANK_LEVEL_FIB = {
    "Director of FIB": 8,  // poziom Lieutenant I
    "Special Agent":   5,  // poziom Sergeant
    "Agent":           2,  // poziom Officer II
  };

  const getGlobalLevel = (o) => {
    const dept = o.dept || "LSPD";
    if (dept === "LSCSO") return GLOBAL_RANK_LEVEL_LSCSO[o.rank] ?? 0;
    if (dept === "FIB")   return GLOBAL_RANK_LEVEL_FIB[o.rank]   ?? 0;
    return GLOBAL_RANK_LEVEL[o.rank] ?? 0;
  };

  const DEPT_ORDER = { "LSPD": 0, "LSCSO": 1, "FIB": 2 };

  const sortByBadge = arr => [...arr].sort((a, b) => {
    const la = getGlobalLevel(a);
    const lb = getGlobalLevel(b);
    if (la !== lb) return lb - la; // wyższy poziom = wyżej w tabeli
    // Ten sam poziom — jednostka jako tie-breaker (LSPD → LSCSO → FIB)
    const da = DEPT_ORDER[a.dept||"LSPD"] ?? 9;
    const db = DEPT_ORDER[b.dept||"LSPD"] ?? 9;
    if (da !== db) return da - db;
    // Ten sam stopień i jednostka — po numerze odznaki
    const na = parseInt(a.badge);
    const nb = parseInt(b.badge);
    const aEmpty = !a.badge || isNaN(na);
    const bEmpty = !b.badge || isNaN(nb);
    if (aEmpty && bEmpty) return 0;
    if (aEmpty) return 1;
    if (bEmpty) return -1;
    return na - nb;
  });

  const filtered = sortByBadge(officers.filter(o=>{
    const q=search.toLowerCase();
    const okQ = !q||o.name.toLowerCase().includes(q)||(o.badge||"").includes(q)||(o.nick||"").toLowerCase().includes(q);
    const okU = filterUnit==="ALL" || o[filterUnit]===true;
    const okD = filterDept==="ALL" || (o.dept||"LSPD")===filterDept;
    const okS = filterStatus==="ALL" || getStatus(o).label===filterStatus;
    const okR = filterRank==="ALL" || o.rank===filterRank;
    return okQ && okU && okD && okS && okR;
  }));
  const save = (form, discordAnnounce=false, announceReason="") => {
    if(modal.type==="add") {
      const badge = assignBadge(form.rank, officers, form.dept||"LSPD");
      const newOfficer = {...form, badge, id:Date.now()};
      setOfficers(p=>sortByBadge([...p, newOfficer]));
      sendDiscordLog(discordEmbed(
        "➕ Dodano funkcjonariusza",
        null,
        0x2ecc71,
        [
          { name: "Imię i Nazwisko", value: form.name || "—", inline: true },
          { name: "Nick",            value: form.nick || "—", inline: true },
          { name: "Stopień",         value: form.rank || "—", inline: true },
          { name: "Odznaka",         value: badge ? "#"+badge : "—", inline: true },
        ]
      ));
    } else {
      // Edycja — atomic save (pobiera świeży rekord z Supabase, podmienia tylko tego oficera)
      const prevOfficer = officers.find(o=>o.id===modal.officer.id);
      let badge = form.badge;
      if(prevOfficer && (form.rank !== prevOfficer.rank || form.dept !== prevOfficer.dept)) {
        badge = assignBadge(form.rank, officers, form.dept||"LSPD");
      }
      const updated = {...form, badge, id: modal.officer.id};

      // ── Ogłoszenie: zapisz pendingAnnounce do Supabase — bot wyśle z mention ──
      // (pendingAnnounce jest usuwane przez bota po wysłaniu)
      if(prevOfficer && discordAnnounce && form.rank !== prevOfficer.rank) {
        const oIdx    = RANK_ORDER.indexOf(prevOfficer.rank);
        const nIdx    = RANK_ORDER.indexOf(form.rank);
        const isPromo = nIdx > oIdx;
        updated.pendingAnnounce = {
          type:     isPromo ? "AWANS" : "DEGRADACJA",
          oldRank:  prevOfficer.rank,
          newRank:  form.rank,
          oldBadge: prevOfficer.badge || "",
          newBadge: badge || "",
          reason:   announceReason.trim() || "",
        };
      }

      // setOfficers z pendingAnnounce włączonym — debounced save zachowa flagę
      // Dodaj flagę pendingSync — bot wykryje i zsyncuje od razu (co minutę)
      const updatedWithSync = {...updated, pendingSync: true};
      setOfficers(p=>sortByBadge(p.map(o=> o.id!==modal.officer.id ? o : updated)));
      // Atomic save z opóźnieniem 1200ms (po debounce) — nadpisuje wynik debounced save
      // świeżymi danymi tego konkretnego oficera (z pendingAnnounce jeśli potrzeba)
      setTimeout(() => {
        dbApi.saveOfficerAtomic(updatedWithSync).catch(e => console.error("[saveOfficerAtomic]", e));
      }, 1200);
      // Discord log (ogólny)
      if(prevOfficer) {
        const changes = [];
        if(form.name !== prevOfficer.name)       changes.push(`Imię: **${prevOfficer.name}** → **${form.name}**`);
        if(form.nick !== prevOfficer.nick)       changes.push(`Nick: **${prevOfficer.nick}** → **${form.nick}**`);
        if(form.rank !== prevOfficer.rank)       changes.push(`Stopień: **${prevOfficer.rank}** → **${form.rank}**`);
        if(badge !== prevOfficer.badge)          changes.push(`Odznaka: **#${prevOfficer.badge}** → **#${badge}**`);
        if(!!form.commandBureau !== !!prevOfficer.commandBureau) changes.push(`Command Bureau: **${form.commandBureau?"TAK":"NIE"}**`);
        if(!!form.highCommand   !== !!prevOfficer.highCommand)   changes.push(`High Command: **${form.highCommand?"TAK":"NIE"}**`);
        const statusFields = [["suspended","Zawieszony"],["redEntry","Czerwony wpis"],["yellowEntry","Żółty wpis"],["onLeave","Urlop"]];
        statusFields.forEach(([k,l])=>{ if(form[k]!==prevOfficer[k]) changes.push(`${l}: **${prevOfficer[k]?"TAK":"NIE"}** → **${form[k]?"TAK":"NIE"}**`); });
        if(changes.length>0) {
          sendDiscordLog(discordEmbed(
            "✏️ Edytowano funkcjonariusza", null, 0x3498db,
            [
              { name: "Funkcjonariusz", value: `${form.name} (${form.nick||"—"})`, inline: false },
              { name: "Zmiany",         value: changes.join("\n"),                inline: false },
            ]
          ));
        }
      }
    }
    setModal(null);
  };
  const [fireModal, setFireModal] = useState(null); // { officer }
  const [fireDiscord, setFireDiscord] = useState(true);
  const [fireReason, setFireReason] = useState("");

  const remove = id => {
    const officer = officers.find(o => o.id === id);
    if (!officer) return;
    setFireModal({ officer });
    setFireDiscord(true);
    setFireReason("");
  };

  const confirmRemove = async () => {
    const { officer } = fireModal;
    setFireModal(null);

    // Usuń z listy lokalnie
    setOfficers(p => p.filter(o => o.id !== officer.id));
    setSelected(s => { const n = new Set(s); n.delete(officer.id); return n; });

    // Discord log (webhook — ogólny log)
    sendDiscordLog(discordEmbed(
      "🗑️ Usunięto funkcjonariusza", null, 0xe74c3c,
      [
        { name: "Imię i Nazwisko", value: officer.name  || "—", inline: true },
        { name: "Nick",            value: officer.nick  || "—", inline: true },
        { name: "Stopień",         value: officer.rank  || "—", inline: true },
        { name: "Odznaka",         value: officer.badge ? "#"+officer.badge : "—", inline: true },
      ]
    ));

    // Jeśli wypisać na Discordzie — zapisz pendingFire do Supabase
    if (fireDiscord) {
      try {
        // Pobierz świeży rekord
        const freshRes = await fetch(`${SUPABASE_URL}/rest/v1/lspd_data?id=eq.main&select=pendingFire`, {
          headers: { "apikey": SUPABASE_ANON, "Authorization": `Bearer ${SUPABASE_ANON}` }
        });
        const freshRows = freshRes.ok ? await freshRes.json() : [];
        const existing  = freshRows[0]?.pendingFire || [];
        const newEntry  = {
          id:     Date.now(),
          name:   officer.name   || "—",
          nick:   officer.nick   || "",
          badge:  officer.badge  || "",
          rank:   officer.rank   || "—",
          reason: fireReason.trim(),
        };
        await dbApi.saveField("pendingFire", [...existing, newEntry]);
      } catch(e) {
        console.error("[pendingFire] Błąd zapisu:", e);
      }
    }
  };

  const toggleSelect = id => setSelected(s=>{const n=new Set(s); n.has(id)?n.delete(id):n.add(id); return n;});
  const toggleAll = () => setSelected(s => s.size===filtered.length ? new Set() : new Set(filtered.map(o=>o.id)));

  const bulkRemove = () => {
    if(!window.confirm(`Usunąć ${selected.size} zaznaczonych funkcjonariuszy?`)) return;
    const removed = officers.filter(o=>selected.has(o.id));
    setOfficers(p=>p.filter(o=>!selected.has(o.id)));
    setSelected(new Set());
    sendDiscordLog(discordEmbed(
      "🗑️ Usunięto wielu funkcjonariuszy (bulk)",
      null,
      0xe74c3c,
      [{ name: `Usunięto ${removed.length} osób`, value: removed.map(o=>`• ${o.name} (${o.nick||"—"})`).join("\n").slice(0,1000) || "—", inline: false }]
    ));
  };

  const bulkSave = form => {
    const affected = officers.filter(o=>selected.has(o.id));
    setOfficers(p=>sortByBadge(p.map(o=>{
      if(!selected.has(o.id)) return o;
      const updated = {...o};
      if(form.rank) {
        updated.rank = form.rank;
        const ranges = {"Chief of Police":[1,9],"Assistant Chief":[1,9],"Deputy Chief":[1,9],"Commander":[1,9],
          "Captain":[6,19],"Lieutenant II":[20,29],"Lieutenant I":[30,39],"Master Sergeant":[40,49],
          "Staff Sergeant":[50,59],"Sergeant":[60,69],"Officer III+1":[70,79],"Officer III":[80,99],
          "Officer II":[100,129],"Officer I":[130,199],"Cadet":[200,299]};
        const [lo,hi] = ranges[form.rank]||[0,0];
        const badgeNum = parseInt(o.badge)||0;
        if(o.rank !== form.rank || badgeNum<lo || badgeNum>hi) updated.badge = assignBadge(form.rank, p, o.dept||"LSPD");
      }
      Object.keys(form).forEach(k=>{ if(k!=="rank" && form[k]!==null) updated[k]=form[k]; });
      return updated;
    })));
    const changes = [];
    if(form.rank) changes.push(`Stopień → **${form.rank}**`);
    const statusFields = [["suspended","Zawieszony"],["redEntry","Czerwony wpis"],["yellowEntry","Żółty wpis"],["onLeave","Urlop"],["swat","SWAT"],["iad","IAD"],["ftd","FTD"]];
    statusFields.forEach(([k,l])=>{ if(form[k]!==null) changes.push(`${l} → **${form[k]?"TAK":"NIE"}**`); });
    sendDiscordLog(discordEmbed(
      "✏️ Edytowano wielu funkcjonariuszy (bulk)",
      null,
      0xf39c12,
      [
        { name: `Zmieniono ${affected.length} osób`, value: affected.map(o=>`• ${o.name}`).join("\n").slice(0,500) || "—", inline: false },
        { name: "Zastosowane zmiany", value: changes.join("\n") || "Brak zmian", inline: false },
      ]
    ));
    setSelected(new Set());
    setBulkModal(false);
  };
  return (
    <div>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8,flexWrap:"wrap",gap:12}}>
        <div><div className="page-title">BAZA FUNKCJONARIUSZY</div><div className="page-sub">{filtered.length} / {officers.length} REKORDÓW</div></div>
        {isAdmin&&<button className="btn btn-primary" onClick={()=>setModal({type:"add"})}>+ DODAJ FP</button>}
      </div>
      <div className="search-bar">
        <input className="search-input" placeholder="Szukaj: nazwisko, odznaka, nick..." value={search} onChange={e=>setSearch(e.target.value)}/>
        <select className="filter-sel" value={filterRank} onChange={e=>setFilterRank(e.target.value)}>
          <option value="ALL">Wszystkie stopnie</option>
          {RANKS.map(r=><option key={r} value={r}>{RANK_BADGES[r]} — {r}</option>)}
        </select>
        <select className="filter-sel" value={filterDept} onChange={e=>setFilterDept(e.target.value)}>
          <option value="ALL">Wszystkie jednostki</option>
          <option value="LSPD">LSPD</option>
          <option value="LSCSO">LSCSO</option>
          <option value="FIB">FIB</option>
        </select>
        <select className="filter-sel" value={filterUnit} onChange={e=>setFilterUnit(e.target.value)}>
          <option value="ALL">Wszystkie wydziały</option>
          <option value="swat">SWAT</option>
          <option value="iad">IAD</option>
          <option value="ftd">FTD</option>
        </select>
        <select className="filter-sel" value={filterStatus} onChange={e=>setFilterStatus(e.target.value)}>
          <option value="ALL">Wszystkie statusy</option>
          <option>AKTYWNY</option><option>ZAWIESZONY</option><option>URLOP</option><option>ŻÓŁTY</option>
        </select>
      </div>
      {isAdmin&&selected.size>0&&(
        <div style={{display:"flex",alignItems:"center",gap:10,padding:"10px 14px",marginBottom:8,background:"rgba(30,95,196,0.12)",border:"1px solid rgba(30,95,196,0.3)",borderRadius:4}}>
          <span style={{fontFamily:"'Share Tech Mono',monospace",fontSize:12,color:"var(--accent)"}}>Zaznaczono: {selected.size}</span>
          <button className="btn btn-gold btn-sm" onClick={()=>setBulkModal(true)}>✎ EDYTUJ ZAZNACZONE</button>
          <button className="btn btn-red btn-sm" onClick={bulkRemove}>✕ USUŃ ZAZNACZONE</button>
          <button className="btn btn-sm" style={{marginLeft:"auto",background:"transparent",border:"1px solid var(--border)",color:"var(--gray)"}} onClick={()=>setSelected(new Set())}>Odznacz wszystkie</button>
        </div>
      )}
      <div className="tbl-wrap">
        <table>
          <thead><tr>
            {isAdmin&&<th style={{width:32}}><input type="checkbox" checked={filtered.length>0&&selected.size===filtered.length} onChange={toggleAll}/></th>}
            <th>Jednostka</th><th>Odznaka</th><th>Imię i Nazwisko</th><th>Nick</th><th>Stopień</th><th>Status</th>
            <th>SWAT</th><th>IAD</th><th>FTD</th>
            <th style={{borderLeft:"2px solid rgba(200,168,75,0.3)"}}>FAC</th><th>SEU</th><th>SV</th><th>NT</th><th>PWC</th><th>WU</th><th>K9</th><th>ASU</th><th>Mary</th>
            <th style={{borderLeft:"2px solid rgba(200,168,75,0.3)"}}>Godziny</th>
            {isAdmin&&<th>Akcje</th>}
          </tr></thead>
          <tbody>
            {(() => {
              const rows = [];
              filtered.forEach((o, i) => {
                const st = getStatus(o);
                const isAlert = o.suspended || o.redEntry;
                const isCB = o.commandBureau;
                const isHC = !!(o.highCommand) || getRankGroup(o.rank)==="highcommand";
                const dept = o.dept || "LSPD";
                const rc = getRankColor(o.rank);
                const curLevel  = getGlobalLevel(o);
                const prevLevel = i > 0 ? getGlobalLevel(filtered[i-1]) : curLevel;
                const groupBorder = i > 0 && curLevel !== prevLevel
                  ? "3px solid rgba(255,255,255,0.12)"
                  : "1px solid var(--border)";

                // Kolory wiersza — priorytet: dept nadpisuje stopień
                let rowBg, rowShadow, nameCl;
                if (dept === "FIB") {
                  // FIB — czarny
                  rowBg     = "rgba(0,0,0,0.55)";
                  rowShadow = "inset 3px 0 0 #cc2222";
                  nameCl    = "#ff6b6b";
                } else if (dept === "LSCSO") {
                  if (isAlert) {
                    rowBg     = "rgba(231,76,60,0.13)";
                    rowShadow = "inset 3px 0 0 #e74c3c";
                    nameCl    = "#ff4444";
                  } else if (isHC) {
                    // LSCSO + HC — ciemniejszy zielony (leśny)
                    rowBg     = "rgba(20,120,50,0.22)";
                    rowShadow = "inset 3px 0 0 #1a8a3a";
                    nameCl    = "#4ddd7a";
                  } else if (isCB) {
                    // LSCSO + CB — jaśniejszy/limonkowy zielony
                    rowBg     = "rgba(100,200,80,0.15)";
                    rowShadow = "inset 3px 0 0 #7ed348";
                    nameCl    = "#a8f060";
                  } else {
                    // LSCSO zwykły — standardowy zielony
                    rowBg     = "rgba(46,160,90,0.18)";
                    rowShadow = "inset 3px 0 0 #2ea05a";
                    nameCl    = "#3ddc78";
                  }
                } else {
                  // LSPD — oryginalna logika
                  rowBg     = isAlert ? "rgba(231,76,60,0.13)" : isCB ? "rgba(30,95,196,0.10)" : isHC ? "rgba(128,0,128,0.10)" : rc.row;
                  rowShadow = isAlert ? "inset 3px 0 0 #e74c3c" : isCB ? "inset 3px 0 0 #4a7fd4" : isHC ? "inset 3px 0 0 #a064ff" : "none";
                  nameCl    = isAlert ? "#ff4444" : isCB ? "#7fb3ff" : isHC ? "#d4bfff" : rc.name;
                }
                const deptColor = dept==="FIB" ? "#ff4444" : dept==="LSCSO" ? "#f59e0b" : "var(--accent)";
                const deptBg    = dept==="FIB" ? "rgba(220,50,50,0.15)" : dept==="LSCSO" ? "rgba(245,158,11,0.15)" : "rgba(30,95,196,0.15)";
                const deptBorder= dept==="FIB" ? "rgba(220,50,50,0.45)" : dept==="LSCSO" ? "rgba(245,158,11,0.45)" : "rgba(30,95,196,0.4)";
                const rankBadges = getRankBadgesForDept(dept);
                rows.push(
                  <tr key={o.id} style={{background:selected.has(o.id)?"rgba(30,95,196,0.18)":rowBg, borderTop:groupBorder, boxShadow:rowShadow}}>
                    {isAdmin&&<td><input type="checkbox" checked={selected.has(o.id)} onChange={()=>toggleSelect(o.id)}/></td>}
                    <td>
                      <span style={{fontFamily:"'Share Tech Mono',monospace",fontSize:10,fontWeight:700,color:deptColor,background:deptBg,border:`1px solid ${deptBorder}`,borderRadius:3,padding:"1px 6px",letterSpacing:1,whiteSpace:"nowrap"}}>
                        {dept}
                      </span>
                    </td>
                    <td><span className="badge-num" style={isAlert?{color:"#ff4444"}:{}}>{o.badge ? "#"+o.badge : ""}</span></td>
                    <td className="name" style={{color:nameCl, textShadow:isAlert?"0 0 10px rgba(231,76,60,0.5)":"none"}}>
                      <div style={{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}}>
                        {o.name}
                        {isCB&&<span style={{fontFamily:"'Share Tech Mono',monospace",fontSize:10,fontWeight:700,color:"#e8c96a",background:"rgba(200,168,75,0.15)",border:"1px solid rgba(200,168,75,0.4)",borderRadius:3,padding:"1px 5px",letterSpacing:1}}>CB</span>}
                        {isHC&&<span style={{fontFamily:"'Share Tech Mono',monospace",fontSize:10,fontWeight:700,color:"#d4bfff",background:"rgba(30,10,50,0.75)",border:"1px solid rgba(160,100,255,0.35)",borderRadius:3,padding:"1px 5px",letterSpacing:1}}>HC</span>}
                      </div>
                    </td>
                    <td style={{fontFamily:"'Share Tech Mono',monospace",fontSize:11,color:isAlert?"rgba(255,100,100,0.7)":"var(--gray)"}}>{o.nick}</td>
                    <td><div style={{display:"flex",flexDirection:"column",gap:3}}><span className="rk">{rankBadges[o.rank]||o.rank}</span><span style={{fontSize:11,color:"var(--gray)"}}>{o.rank}</span></div></td>
                    <td><span className={`status ${st.cls}`}>{st.label}</span></td>
                    <td><Ck val={o.swat}/></td><td><Ck val={o.iad}/></td><td><Ck val={o.ftd}/></td>
                    <td style={{borderLeft:"2px solid rgba(200,168,75,0.3)"}}><Ck val={o.fac}/></td>
                    <td><Ck val={o.seu}/></td><td><Ck val={o.sv}/></td>
                    <td><Ck val={o.nt}/></td><td><Ck val={o.pwc}/></td><td><Ck val={o.wu}/></td><td><Ck val={o.k9}/></td><td><Ck val={o.asu}/></td><td><Ck val={o.mary}/></td>
                    <td style={{borderLeft:"2px solid rgba(200,168,75,0.3)"}}>{(()=>{
                      const total = (log||[]).filter(l=>l.name===o.name).reduce((s,l)=>s+parseFloat(l.hours||0),0);
                      return total > 0
                        ? <span style={{fontFamily:"'Share Tech Mono',monospace",color:"var(--accent)",fontWeight:700}}>{total%1===0?total:total.toFixed(1)}h</span>
                        : <span style={{color:"var(--dim)",fontFamily:"'Share Tech Mono',monospace",fontSize:10}}>—</span>;
                    })()}</td>
                    {isAdmin&&<td><div className="actions">
                      <button className="btn btn-gold btn-sm" onClick={()=>setModal({type:"edit",officer:o})}>EDYTUJ</button>
                      <button className="btn btn-red btn-sm" onClick={()=>remove(o.id)}>USUŃ</button>
                    </div></td>}
                  </tr>
                );
              });
              return rows;
            })()}
            {filtered.length===0&&<tr><td colSpan={20} style={{textAlign:"center",padding:32,color:"var(--gray)"}}>Brak wyników</td></tr>}
          </tbody>
        </table>
      </div>
      {modal&&<OfficerModal officer={modal.officer} isNew={modal.type==="add"} onSave={save} onClose={()=>setModal(null)}/>}
      {bulkModal&&<BulkEditModal officers={officers} selectedIds={selected} onSave={bulkSave} onClose={()=>setBulkModal(false)}/>}

      {fireModal&&(
        <div className="overlay" onClick={e=>e.target===e.currentTarget&&setFireModal(null)}>
          <div className="modal" style={{maxWidth:480}}>
